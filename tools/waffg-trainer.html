const CARDS = RAW.map((row, i) => {
  const [front, back, details] = row;
  const id = 'c' + i;

  // Split: term — desc
  const splitTerm = back.split(' — ');
  const term = splitTerm[0];
  const desc = splitTerm.slice(1).join(' — ');

  // Section bestimmen
  let section = 'Sonstige';
  if (/^Anl\. ?1/i.test(front)) section = '12 · Anlage 1';
  else if (/^Anl\. ?2/i.test(front)) section = '13 · Anlage 2';
  else {
    const m = front.match(/§+\s*(\d+)([a-z]?)/i);
    if (m) {
      const num = parseInt(m[1], 10);
      if (num >= 1 && num <= 3) section = '1 · Allgemeines';
      else if (num >= 4 && num <= 9) section = '2 · Voraussetzungen';
      else if (num >= 10 && num <= 12) section = '3 · Erlaubnisarten';
      else if (num >= 13 && num <= 20) section = '4 · Personengruppen';
      else if (num >= 21 && num <= 28) section = '5 · Gewerbe';
      else if (num >= 29 && num <= 33) section = '6 · Verbringen';
      else if (num >= 34 && num <= 39) section = '7 · Pflichten';
      else if (num >= 40 && num <= 42) section = '8 · Verbote';
      else if (num >= 43 && num <= 49) section = '9 · Sonstiges';
      else if (num >= 51 && num <= 54) section = '10 · Strafen';
      else if (num >= 55 && num <= 57) section = '11 · Ausnahmen';
    }
  }
  return { id, front, back, term, desc, details, law: section };
});

/* ===== STORAGE ===== */
const STORAGE_KEY = 'waffg_trainer_v1';
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return { progress: {}, settings: { mode: 'forward', filters: null }, todayCount: 0, todayDate: new Date().toDateString() };
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
let state = loadState();
if (!state.settings.filters || !Array.isArray(state.settings.filters)) {
  state.settings.filters = [...new Set(CARDS.map(c => c.law))];
  saveState();
}
const todayStr = new Date().toDateString();
if (state.todayDate !== todayStr) {
  state.todayDate = todayStr;
  state.todayCount = 0;
  saveState();
}

/* ===== SM-2 ===== */
function getProgress(cardId, dir) {
  const key = cardId + '_' + dir;
  if (!state.progress[key]) state.progress[key] = { reps: 0, ease: 2.5, interval: 0, due: 0, lapses: 0 };
  return state.progress[key];
}
function applyRating(cardId, dir, quality) {
  const p = getProgress(cardId, dir);
  if (quality < 3) { p.reps = 0; p.interval = 0; p.lapses++; }
  else {
    if (p.reps === 0) p.interval = 1;
    else if (p.reps === 1) p.interval = quality === 5 ? 4 : 3;
    else {
      const factor = quality === 5 ? p.ease * 1.3 : (quality === 3 ? 1.2 : p.ease);
      p.interval = Math.max(p.interval + 1, Math.round(p.interval * factor));
    }
    p.reps++;
  }
  p.ease = Math.max(1.3, p.ease + (0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02)));
  p.due = Date.now() + p.interval * 24 * 60 * 60 * 1000;
  state.todayCount++;
  saveState();
}
function intervalHint(cardId, dir, quality) {
  const p = getProgress(cardId, dir);
  if (quality < 3) return '<10 min';
  let interval;
  if (p.reps === 0) interval = 1;
  else if (p.reps === 1) interval = quality === 5 ? 4 : 3;
  else {
    const factor = quality === 5 ? p.ease * 1.3 : (quality === 3 ? 1.2 : p.ease);
    interval = Math.max(p.interval + 1, Math.round(p.interval * factor));
  }
  if (interval < 30) return interval + ' Tag' + (interval === 1 ? '' : 'e');
  const months = Math.round(interval / 30);
  return '~' + months + ' Mon';
}

/* ===== QUEUE ===== */
function getAllLaws() {
  const desired = ['1 · Allgemeines','2 · Voraussetzungen','3 · Erlaubnisarten','4 · Personengruppen','5 · Gewerbe','6 · Verbringen','7 · Pflichten','8 · Verbote','9 · Sonstiges','10 · Strafen','11 · Ausnahmen','12 · Anlage 1','13 · Anlage 2'];
  const present = new Set(CARDS.map(c => c.law));
  return desired.filter(d => present.has(d));
}
function getActiveCards() {
  const filters = state.settings.filters;
  if (!filters || !filters.length) return CARDS;
  const set = new Set(filters);
  return CARDS.filter(c => set.has(c.law));
}
function buildQueue() {
  const cards = getActiveCards();
  const now = Date.now();
  const directions = state.settings.mode === 'both' ? ['forward','reverse'] : [state.settings.mode];
  const due = [], newOnes = [];
  for (const card of cards) {
    for (const dir of directions) {
      const p = getProgress(card.id, dir);
      if (p.due === 0) newOnes.push({ card, dir });
      else if (p.due <= now) due.push({ card, dir });
    }
  }
  const queue = [...due, ...newOnes.slice(0, Math.max(0, 15 - due.length))];
  for (let i = queue.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [queue[i], queue[j]] = [queue[j], queue[i]];
  }
  return queue;
}

/* ===== FUZZY ===== */
function normalize(s) {
  return s.toLowerCase().replace(/§/g, '').replace(/[.,;:!?()"„""''–—-]/g, ' ')
    .replace(/ä/g, 'a').replace(/ö/g, 'o').replace(/ü/g, 'u').replace(/ß/g, 'ss')
    .replace(/\s+/g, ' ').trim();
}
function levenshtein(a, b) {
  if (a === b) return 0;
  if (!a.length) return b.length;
  if (!b.length) return a.length;
  let prev = new Array(b.length + 1), curr = new Array(b.length + 1);
  for (let j = 0; j <= b.length; j++) prev[j] = j;
  for (let i = 1; i <= a.length; i++) {
    curr[0] = i;
    for (let j = 1; j <= b.length; j++) {
      const cost = a[i-1] === b[j-1] ? 0 : 1;
      curr[j] = Math.min(curr[j-1]+1, prev[j]+1, prev[j-1]+cost);
    }
    [prev, curr] = [curr, prev];
  }
  return prev[b.length];
}
function extractNumbers(s) {
  const matches = s.toLowerCase().match(/\d+[a-z]?/g);
  return matches ? matches : [];
}
function checkAnswer(input, expected) {
  const a = normalize(input), b = normalize(expected);
  if (!a) return 'red';
  const expectedNums = extractNumbers(expected), inputNums = extractNumbers(input);
  if (expectedNums.length > 0) {
    if (inputNums.length !== expectedNums.length) return 'red';
    for (let i = 0; i < expectedNums.length; i++) {
      if (inputNums[i] !== expectedNums[i]) return 'red';
    }
  } else if (inputNums.length > 0) { return 'red'; }
  if (a === b) return 'green';
  if (b.includes(a) && a.length >= b.length * 0.6) return 'green';
  const dist = levenshtein(a, b);
  const ratio = dist / Math.max(a.length, b.length);
  if (ratio <= 0.2) return 'green';
  if (ratio <= 0.4) return 'yellow';
  return 'red';
}

/* ===== RENDER ===== */
const main = document.getElementById('main');
let currentItem = null, revealed = false, queue = [];

function refreshStats() {
  const cards = getActiveCards();
  const directions = state.settings.mode === 'both' ? ['forward','reverse'] : [state.settings.mode];
  const now = Date.now();
  let due = 0, total = 0, newC = 0, learn = 0, mature = 0;
  for (const card of cards) {
    for (const dir of directions) {
      total++;
      const p = getProgress(card.id, dir);
      if (p.due === 0) newC++;
      else if (p.due <= now) due++;
      if (p.due > 0 && p.interval < 21) learn++;
      else if (p.interval >= 21) mature++;
    }
  }
  document.getElementById('stat-due').textContent = due + newC;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('d-new').textContent = newC;
  document.getElementById('d-learn').textContent = learn;
  document.getElementById('d-mature').textContent = mature;
  document.getElementById('d-today').textContent = state.todayCount;
}

function renderDone() {
  main.innerHTML = `<div class="done-state"><h2>Alles fällig durchgelernt.</h2><p>Öffne die Einstellungen, wenn du Modus oder Abschnittsfilter ändern willst — oder komm später wieder.</p></div>`;
}
function renderEmptyFilters() {
  main.innerHTML = `<div class="done-state"><h2>Kein Abschnitt ausgewählt.</h2><p>Öffne die Einstellungen und wähle mindestens einen Abschnitt aus.</p></div>`;
}

function renderCard() {
  if (!state.settings.filters || state.settings.filters.length === 0) { renderEmptyFilters(); return; }
  if (!queue.length) queue = buildQueue();
  if (!queue.length) { renderDone(); return; }
  currentItem = queue.shift();
  revealed = false;
  const { card, dir } = currentItem;
  const isForward = dir === 'forward';
  const question = isForward ? card.front : card.term;
  const expected = isForward ? card.back : card.front;
  const directionLabel = isForward ? 'Paragraph → Begriff' : 'Begriff → Paragraph';

  main.innerHTML = `
    <div class="deck-tag">Abschnitt ${card.law}</div>
    <span class="direction-tag">${directionLabel}</span>
    <div class="question ${question.length > 28 ? 'smaller' : ''}">${question}</div>
    <div class="input-wrap">
      <input class="answer-input" id="answer" type="text" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="${isForward ? 'Begriff eintippen…' : 'z.B. § 28 WaffG …'}" />
    </div>
    <button class="primary-btn" id="submit-btn">Prüfen</button>
    <div id="reveal-container"></div>
  `;

  const input = document.getElementById('answer');
  const submit = document.getElementById('submit-btn');
  setTimeout(() => input.focus(), 50);

  function reveal(verdict) {
    revealed = true;
    input.disabled = true;
    input.classList.remove('r-green','r-yellow','r-red');
    if (verdict) input.classList.add('r-' + verdict);
    submit.style.display = 'none';
    const autoMapping = { green: 4, yellow: 3, red: 0 };
    const autoQ = autoMapping[verdict] !== undefined ? autoMapping[verdict] : 4;
    const labelMap = { 0: 'Nochmal', 3: 'Schwer', 4: 'Gut', 5: 'Einfach' };
    const autoLabel = labelMap[autoQ];
    const others = [0,3,4,5].filter(q => q !== autoQ);

    document.getElementById('reveal-container').innerHTML = `
      <div class="reveal">
        <div class="reveal-label">Antwort</div>
        <div class="reveal-term ${verdict === 'green' ? 'green' : ''}">${isForward ? card.term : card.front}</div>
        ${(isForward && card.desc) ? `<div class="reveal-desc">${card.desc}</div>` : ''}
        ${(!isForward && card.desc) ? `<div class="reveal-desc">${card.term} — ${card.desc}</div>` : ''}
        ${card.details ? `<div class="reveal-details">${card.details}</div>` : ''}
      </div>
      <button class="primary-btn rate-primary" data-q="${autoQ}" data-verdict="${verdict}">
        <span class="primary-label">Weiter <span style="opacity:.6">·</span> ${autoLabel}</span>
        <span class="primary-hint">nächste Wiederholung in ${intervalHint(card.id, dir, autoQ)}</span>
      </button>
      <div class="override-label">War's anders?</div>
      <div class="overrides">
        ${others.map(q => `<button class="rate-btn-small" data-q="${q}">${labelMap[q]}<span class="interval-hint">${intervalHint(card.id, dir, q)}</span></button>`).join('')}
      </div>
    `;

    const handleRating = (q) => {
      document.removeEventListener('keydown', enterHandler);
      applyRating(card.id, dir, q);
      if (q < 3) queue.push({ card, dir });
      refreshStats();
      renderCard();
    };
    const enterHandler = (e) => { if (e.key === 'Enter') { e.preventDefault(); handleRating(autoQ); } };
    document.addEventListener('keydown', enterHandler);
    document.querySelector('.rate-primary').addEventListener('click', () => handleRating(autoQ));
    document.querySelectorAll('.rate-btn-small').forEach(b => b.addEventListener('click', () => handleRating(parseInt(b.dataset.q, 10))));
  }

  submit.addEventListener('click', () => {
    if (revealed) return;
    reveal(checkAnswer(input.value, expected));
  });
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !revealed) { e.preventDefault(); submit.click(); }
  });
}

/* ===== SETTINGS ===== */
const sheet = document.getElementById('sheet'), sheetBg = document.getElementById('sheet-bg');
function openSheet() { buildFilterChips(); refreshChips(); refreshStats(); sheet.classList.add('open'); sheetBg.classList.add('open'); }
function closeSheet() { sheet.classList.remove('open'); sheetBg.classList.remove('open'); }
document.getElementById('open-settings').addEventListener('click', openSheet);
sheetBg.addEventListener('click', closeSheet);

function buildFilterChips() {
  const laws = getAllLaws();
  const container = document.getElementById('filter-chips');
  const allActive = state.settings.filters.length === laws.length;
  container.innerHTML = `<button class="chip chip-all" data-action="all">${allActive ? 'Alle abwählen' : 'Alle wählen'}</button>` +
    laws.map(l => {
      const count = CARDS.filter(c => c.law === l).length;
      return `<button class="chip" data-filter="${l}">${l} <span style="opacity:.5;font-size:10px">${count}</span></button>`;
    }).join('');
  container.querySelector('[data-action="all"]').addEventListener('click', () => {
    state.settings.filters = allActive ? [] : [...laws];
    saveState(); buildFilterChips(); refreshChips(); refreshStats(); queue = []; renderCard();
  });
  container.querySelectorAll('[data-filter]').forEach(c => {
    c.addEventListener('click', () => {
      const law = c.dataset.filter;
      const idx = state.settings.filters.indexOf(law);
      if (idx >= 0) state.settings.filters.splice(idx, 1);
      else state.settings.filters.push(law);
      saveState(); buildFilterChips(); refreshChips(); refreshStats(); queue = []; renderCard();
    });
  });
}
function refreshChips() {
  document.querySelectorAll('#mode-chips .chip').forEach(c => c.classList.toggle('active', c.dataset.mode === state.settings.mode));
  const activeSet = new Set(state.settings.filters);
  document.querySelectorAll('#filter-chips [data-filter]').forEach(c => c.classList.toggle('active', activeSet.has(c.dataset.filter)));
}
document.querySelectorAll('#mode-chips .chip').forEach(c => {
  c.addEventListener('click', () => {
    state.settings.mode = c.dataset.mode;
    saveState(); refreshChips(); refreshStats(); queue = []; renderCard();
  });
});
document.getElementById('reset-btn').addEventListener('click', () => {
  if (confirm('Wirklich allen Lernfortschritt löschen?')) {
    state = { progress: {}, settings: state.settings, todayCount: 0, todayDate: new Date().toDateString() };
    saveState(); refreshStats(); queue = []; closeSheet(); renderCard();
  }
});

buildFilterChips(); refreshChips(); refreshStats(); renderCard();

b von Munition...","a":[{"t":"auch im Kaliber. 38 Special.","c":true},{"t":"nur im Kaliber. 357 Magnum.","c":false},{"t":"auch im Kaliber 9 mm Luger.","c":false}]},{"n":"2.45","k":"I","q":"Ihre WBK lässt den Erwerb von Munition im Kaliber. 357 Magnum zu. Dürfen Sie damit auch Munition 9 mm Luger erwerben?","a":[{"t":"Ja, weil der Durchmesser nur einen minimalen Unterschied aufweist.","c":false},{"t":"Nein","c":true},{"t":"Ja, aber ich muss später die Behörde informieren.","c":false}]},{"n":"2.46","k":"I","q":"Ihre WBK lässt den Erwerb von Munition im Kaliber 9 mm Luger zu. Dürfen Sie dann auch Munition im Kaliber 9 mm kurz erwerben?","a":[{"t":"Ja, der Kaliberdurchmesser ist ja identisch.","c":false},{"t":"Nur, wenn der Händler mir die Munition überlässt.","c":false},{"t":"Nein, nur Patronen im Kaliber 9 mm Luger.","c":true}]},{"n":"2.47","k":"I","q":"Für welche Patronenmunition erhält der Pistolenschütze eine Erlaubnis?","a":[{"t":"Für Munition mit Hohlspitzgeschossen","c":true},{"t":"Für Leuchtspurmunition","c":false},{"t":"Für Betäubungsmunition zu Angriffszwecken","c":false}]},{"n":"2.48","k":"I","q":"Ist der Erwerb von Presslingen erlaubnispflichtig?","a":[{"t":"Ja, Sprengstofferlaubnis erforderlich","c":false},{"t":"Ja, Munitionserwerbsberechtigung erforderlich","c":true},{"t":"Nein","c":false}]},{"n":"2.49","k":"I","q":"Darf man Schrotmunition in unbeschränkter Menge erwerben?","a":[{"t":"Ja, auf dem Schießstand zum sofortigen Verbrauch lediglich auf dieser Schießstätte.","c":true},{"t":"Ja, mit Erwerbsberechtigung","c":true},{"t":"Nein","c":false}]},{"n":"2.50","k":"I","q":"Sie überlassen Ihre WBK-pflichtigen Schusswaffen Ihrem Vereinskollegen für die Dauer von 2 Monaten. Er will die Waffen ausprobieren und Ihnen gegebenenfalls abkaufen.","a":[{"t":"Das ist waffenrechtlich erlaubt.","c":false},{"t":"Das ist waffenrechtlich nicht erlaubt.","c":true},{"t":"WBK-Inhaber dürfen ihre Schusswaffen grundsätzlich immer tauschen.","c":false}]},{"n":"2.51","k":"I","q":"Sie überlassen einem Berechtigten auf Dauer Ihr Großkaliber-Sportgewehr. Innerhalb welcher Frist müssen Sie Ihrer Behörde das Überlassen anzeigen?","a":[{"t":"2 Wochen","c":true},{"t":"4 Wochen","c":false},{"t":"1 Woche","c":false}]},{"n":"2.52","k":"I","q":"Darf man einem anderen Waffenbesitzkarteninhaber eine Waffe leihen?","a":[{"t":"Ja, für einen von seinem Bedürfnis umfassten Zweck, aber nur vorübergehend, höchstens für einen Monat.","c":true},{"t":"Ja, ohne Zweckbindung, aber nur vorübergehend, für die Dauer von maximal einen Monat.","c":false},{"t":"Nein, es ist grundsätzlich eine behördliche Genehmigung erforderlich.","c":false}]},{"n":"2.53","k":"I","q":"Unter welchen Voraussetzungen darf Ihnen ein Waffenhändler eine erlaubnispflichtige Schusswaffe zum Ausprobieren ohne vorherige Erlaubnis der zuständigen Behörde überlassen?","a":[{"t":"Überhaupt nicht. Ohne vorherige Erlaubnis ist das immer verboten.","c":false},{"t":"Das ist waffenrechtlich für die Dauer von bis zu sechs Wochen ohne weitere Voraussetzung erlaubt.","c":false},{"t":"Das ist nur erlaubt, wenn man bereits eine WBK besitzt und der Erwerb vorübergehend ist (höchstens einen Monat).","c":true}]},{"n":"2.54","k":"I","q":"Was hat der Erbe einer Schusswaffe zu veranlassen?","a":[{"t":"Benachrichtigung des Nachlassgerichts","c":false},{"t":"Änderung der WBK des Verstorbenen","c":false},{"t":"Beantragung einer WBK bei der zuständigen Waffenbehörde binnen eines Monats nach Annahme der Erbschaft","c":true}]},{"n":"2.55","k":"I","q":"Was muss ein gesetzlicher Erbe einer Schusswaffe tun?","a":[{"t":"Innerhalb eines Monats nach Annahme der Erbschaft die Ausstellung einer WBK beantragen, sofern die Schusswaffe nicht vorher einem Berechtigten überlassen oder unbrauchbar gemacht wird.","c":true},{"t":"Änderung der WBK des Verstorbenen beantragen.","c":false},{"t":"Ein Erbe ohne waffenrechtliches Bedürfnis muss die geerbte Waffe blockieren lassen, soweit ein geeignetes Blockiersystem verfügbar ist.","c":true}]},{"n":"2.56","k":"I","q":"Sie wollen eine Waffe mit einem anderen Berechtigten dauerhaft tauschen, was müssen Sie berücksichtigen?","a":[{"t":"Ein Waffentausch ist gesetzlich nicht vorgesehen, jeder muss für die angestrebte Waffe erwerbsberechtigt sein und den Erwerb, sowie das Überlassen der anderen Waffe seiner zuständigen Behörde fristgerecht melden.","c":true},{"t":"Ein Waffentausch ist nur dann waffenrechtlich zulässig, wenn die Waffenart und das Kaliber gleich bleiben Anschließend ist die zuständige Behörde binnen von 14 Tagen zu informieren.","c":false},{"t":"Ein Waffentausch darf nur zwischen den Inhabern zweier gleichartiger Erlaubnisse im Rahmen des von ihrem Bedürfnis umfassten Zweckes erfolgen (z.B. nur zwei Sportschützen).","c":false}]},{"n":"2.57","k":"I","q":"Welcher Sportschütze muss sich einer amts- oder fachärztlichen oder fachpsychologischen Untersuchung unterziehen, um seine persönliche Eignung zum Waffenerwerb nachzuweisen?","a":[{"t":"18-jähriger Sportschütze für eine Kleinkaliberpistole (KK-Pistole)","c":false},{"t":"21-jähriger Sportschütze für ein Kleinkalibergewehr (KK-Gewehr)","c":false},{"t":"24-jähriger Sportschütze für eine als erste Großkaliberwaffe zu erwerbende halbautomatische Pistole im Kaliber. 45 ACP","c":true}]},{"n":"2.58","k":"I","q":"Für den Erwerb welcher Schusswaffe bedarf es einer Waffenbesitzkarte?","a":[{"t":"mehrschüssiger Vorderlader-Revolver","c":true},{"t":"CO₂-Pistole mit Zeichen","c":false},{"t":"Gaspistole mit Zulassungszeichen","c":false}]},{"n":"2.59","k":"I","q":"Für den Erwerb welcher der nachfolgend genannten Waffen bedarf es einer Waffenbesitzkarte?","a":[{"t":"Druckluftgewehre ohne Zulassungszeichen „F im Fünfeck“, die nach dem 01.01.1970 hergestellt wurden (ausgenommen DDR-Produktion).","c":true},{"t":"Perkussionsrevolver, deren Modell vor dem 01.01.1871 entwickelt wurde.","c":true},{"t":"Waffen in 4 mm M20 mit den Zulassungszeichen „F im Fünfeck“ und „PTB im Viereck“.","c":true}]},{"n":"2.60","k":"I","q":"Schusswaffen können vorübergehend überlassen werden:","a":[{"t":"dem Inhaber einer WBK.","c":true},{"t":"einer Person des persönlichen Vertrauens.","c":false},{"t":"einer Person mit bestandener Sachkundeprüfung.","c":false}]},{"n":"2.61","k":"I","q":"Wem darf auf einer Schießstätte eine Kleinkaliber-Pistole überlassen werden, wenn eine für die Jugendarbeit geeignete Aufsichtsperson zur Verfügung steht?","a":[{"t":"Einem 12-jährigen, wenn eine schriftliche oder elektronische Einverständniserklärung des Sorgeberechtigten vorliegt.","c":false},{"t":"Einem 14-jährigen, wenn eine schriftliche oder elektronische Einverständniserklärung des Sorgeberechtigten vorliegt.","c":true},{"t":"Einem 14-jährigen, aber nur wenn er Mitglied der Schützenjugend ist.","c":false}]},{"n":"2.62","k":"I","q":"Wem dürfen Sie während Ihres 3-wöchigen Urlaubs ihre erlaubnispflichtigen Schusswaffen zur Aufbewahrung überlassen?","a":[{"t":"befreundeten Polizeibeamten","c":false},{"t":"Inhabern einer Waffenbesitzkarte","c":true},{"t":"besonders vertrauenswürdigen Personen (z.B. Notar, Pfarrer)","c":false}]},{"n":"2.63","k":"I","q":"Wer benötigt keinen Waffenschein?","a":[{"t":"Derjenige, der eine erlaubnispflichtige Kurzwaffe als Bewachungsunternehmer im Rahmen seiner Tätigkeit führt.","c":false},{"t":"Derjenige, der eine erlaubnispflichtige Kurzwaffe während einer traditionellen Brauchtumsveranstaltung (z.B. Schützenaufmarsch) führt.","c":false},{"t":"Derjenige, der als Inhaber eines gültigen Jagdscheins eine erlaubnispflichtige Kurzwaffe während der berechtigten Jagdausübung führt.","c":true}]},{"n":"2.64","k":"I","q":"Was darf der Inhaber eines Kleinen Waffenscheins?","a":[{"t":"Schreckschuss-, Reizstoff- und Signalwaffen mit dem Zulassungszeichen „PTB im Kreis“ in der Öffentlichkeit (ausgenommen öffentliche Veranstaltungen) führen.","c":true},{"t":"Druckluft- und CO₂-Waffen mit dem Zulassungszeichen „F im Fünfeck“ in der Öffentlichkeit (ausgenommen öffentliche Veranstaltungen) führen.","c":false},{"t":"Erlaubnispflichtige Schusswaffen lediglich vorübergehend, höchstens aber für einen Monat von einem Berechtigen zur sicheren Lagerung übernehmen.","c":false}]},{"n":"2.65","k":"I","q":"Wozu berechtigt der Kleine Waffenschein?","a":[{"t":"Zum Erwerb von Schreckschuss-, Reizstoff- und Signalwaffen, sofern diese das Zulassungszeichen „PTB im Kreis“ tragen.","c":false},{"t":"Zum Besitz von Schreckschuss-, Reizstoff- und Signalwaffen, sofern diese das Zulassungszeichen „PTB im Kreis“ tragen.","c":false},{"t":"Zum Führen von Schreckschuss-, Reizstoff- und Signalwaffen, sofern diese das Zulassungszeichen „PTB im Kreis“ tragen.","c":true}]},{"n":"2.66","k":"I","q":"Welche Erlaubnisse berechtigen zum zugriffsbereiten Führen außerhalb der eigenen Wohnung, der eigenen Geschäftsräume und des eigenen befriedeten Besitztums einer Druckluftwaffe (mit Zulassungszeichen „F im Fünfeck“)?","a":[{"t":"Kleiner Waffenschein in Verbindung mit einem gültigen Ausweis","c":false},{"t":"Waffenbesitzkarte in Verbindung mit Sportschützenausweis","c":false},{"t":"Waffenschein oder behördliche Ausnahmegenehmigung","c":true}]},{"n":"2.67","k":"I","q":"Welche Gegenstände dürfen grundsätzlich nicht in der Öffentlichkeit geführt werden?","a":[{"t":"Anscheinswaffen (originalgetreue Imitate von Feuerwaffen)","c":true},{"t":"Schweizer Taschenmesser und Gurtschneider","c":false},{"t":"Feststehende Messer mit einer Klingenlänge über 12 cm und Einhandmesser","c":true}]},{"n":"2.68","k":"I","q":"Unter welchen Voraussetzungen dürfen Hieb- und Stoßwaffen, feststehende Messer mit einer Klingenlänge über 12 cm und Einhandmesser ausnahmsweise in der Öffentlichkeit geführt werden?","a":[{"t":"Für den Fall, dass man sich irgendwann einmal selbst verteidigen muss.","c":false},{"t":"Beim Transport in einem verschlossenen Behältnis.","c":true},{"t":"Sofern ein berechtigtes Interesse am Führen vorliegt (z. B. im Zusammenhang mit der Berufsausübung, der Brauchtumspflege, dem Sport oder einem allgemein anerkannten Zweck).","c":true}]},{"n":"2.69","k":"I","q":"Wer benötigt einen Waffenschein?","a":[{"t":"Wer eine erlaubnispflichtige Schusswaffe besitzt.","c":false},{"t":"Wer als Berechtigter mehr als drei Waffen zum Schießstand transportieren will.","c":false},{"t":"Wer eine Schusswaffe außerhalb der eigenen Wohnung, Geschäftsräume, des befriedeten Besitztums oder der Schießstätte zugriffsbereit führen möchte.","c":true}]},{"n":"2.70","k":"I","q":"Zum Führen welcher Waffen benötigt man keine Erlaubnis?","a":[{"t":"Waffen mit dem Zeichen","c":false},{"t":"Reizstoff-Sprühdosen mit dem Zeichen","c":true},{"t":"Waffen mit dem Zeichen","c":false}]},{"n":"2.71","k":"I","q":"Für welche Art des Umgangs mit Schusswaffen benötigt man einen Waffenschein?","a":[{"t":"Transport einer erlaubnispflichtigen Waffe zum Schießstand","c":false},{"t":"Selbstschutz zu Hause","c":false},{"t":"Zugriffsbereites Führen einer erlaubnispflichtigen Waffe auf der Straße","c":true}]},{"n":"2.72","k":"I","q":"Als Erlaubnis zum zugriffsbereiten Führen einer Waffe braucht man den Kleinen Waffenschein für...","a":[{"t":"Druckluft-, Federdruck-, CO₂-Waffen.","c":false},{"t":"Schreckschuss-, Reizstoff-, Signalwaffen mit dem Zeichen „PTB im Kreis“ (PTB = Physikalisch-Technische Bundesanstalt).","c":true},{"t":"Feuerwaffen, die nicht zugriffs- und nicht schussbereit transportiert werden.","c":false}]},{"n":"2.76","k":"I","q":"Wer benötigt einen Waffenschein?","a":[{"t":"Wer eine „scharfe“ Waffe zu Hause führt.","c":false},{"t":"Wer eine Druckluftpistole unverpackt auf dem Rücksitz im PKW mitnimmt.","c":true},{"t":"Wer mit der Armbrust auf einem Feld schießt.","c":false}]},{"n":"2.77","k":"I","q":"Bei welcher der nebenstehend aufgeführten Schusswaffen benötigt man einen Waffenschein, wenn man sie außerhalb der Wohnung zugriffsbereit „bei sich“ hat?","a":[{"t":"doppelläufiges Steinschlossgewehr (Modell vor 1871)","c":false},{"t":"Druckluftpistole mit einer Mündungsenergie bis zu 7,5 Joule","c":true},{"t":"Steinschloss-Duellpistole (Modell vor 1871)","c":false}]},{"n":"2.78","k":"I","q":"Einer Erlaubnis zum Führen einer erlaubnispflichtigen Schusswaffe bedarf nicht,","a":[{"t":"wer diese beim Schießen auf Schießstätten zu einem vom Bedürfnis umfassten Zweck oder im Zusammenhang damit verwendet.","c":true},{"t":"wer die Waffe als Sportschütze unverpackt auf dem PKW-Rücksitz zum Büchsenmacher bringt.","c":false},{"t":"wer die Waffe seinen Freunden auf der Straße zeigt.","c":false}]},{"n":"2.79","k":"I","q":"Benötigen Sie zum Führen einer Druckluftpistole (mit Kennzeichnung „F im Fünfeck“) im Gürtelholster einen Waffenschein?","a":[{"t":"Ja","c":true},{"t":"Nein","c":false},{"t":"Nur, wenn ich noch nicht volljährig bin.","c":false}]},{"n":"2.80","k":"I","q":"Welcher der genannten Gegenstände darf nicht ohne weiteres geführt werden?","a":[{"t":"Baseballschläger","c":false},{"t":"Klappmesser mit 14 cm langer, nicht feststellbarer einseitig geschliffener Klinge.","c":false},{"t":"Kochmesser mit 14 cm langer Klinge.","c":true},{"t":"Samuraischwert","c":true},{"t":"Schlagstock","c":true}]},{"n":"2.81","k":"I","q":"Ist der Umgang mit sogenannten Pfeilabschussgeräten im Sinne des Waffengesetzes erlaubnispflichtig und der Eintrag in eine Waffenbesitzkarte erforderlich?","a":[{"t":"Ja, da Pfeilabschussgeräte nicht in der Anlage 2 Unterabschnitt 2 -erlaubnisfreie Arten des Umgangsgenannt sind.","c":true},{"t":"Nein, sie sind waffenrechtlich wie Armbrüste einzuordnen.","c":false}]},{"n":"2.82","k":"I","q":"Um Ihre Vorderschaftrepetierflinte leichter transportieren zu können ersetzen Sie den normalen Schaft durch einen Pistolengriff.","a":[{"t":"Das ist verboten.","c":true},{"t":"Änderungen am Schaft sind zulässig, wenn die Waffe danach noch mindestens 61 cm lang ist.","c":false},{"t":"Das ist nur Jägern erlaubt.","c":false}]},{"n":"2.83","k":"I","q":"Welche Legitimationspapiere sind beim Transport einer erlaubnispflichtigen Schusswaffe durch einen Sportschützen mitzuführen?","a":[{"t":"Personal-/Reisepass und Schützenausweis","c":false},{"t":"Waffenbesitzkarte und Waffenschein","c":false},{"t":"Personalausweis oder Reisepass und Waffenbesitzkarte","c":true}]},{"n":"2.85","k":"I","q":"Welche Dokumente benötigen Sie zum zugriffsbereiten Führen einer bauartzugelassenen Schreckschusswaffe?","a":[{"t":"Keine Dokumente erforderlich, da der Erwerb ja auch genehmigungsfrei ist.","c":false},{"t":"Kleiner Waffenschein und Personalausweis oder Reisepass","c":true},{"t":"Waffenbesitzkarte und Personalausweis oder Reisepass","c":false}]},{"n":"2.86","k":"I","q":"Der Transport einer Kleinkaliber- Sportpistole durch einen WBK-Inhaber bedarf keiner Erlaubnis, wenn diese…","a":[{"t":"im nicht einsehbaren Handschuhfach eines Pkw befördert wird.","c":false},{"t":"versteckt am Körper getragen wird.","c":false},{"t":"ungeladen im verschlossenen Waffenkoffer befördert wird, wenn der Transport zu einem vom Bedürfnis umfassten Zweck erfolgt.","c":true}]},{"n":"2.87","k":"I","q":"Darf ein Anderer als der WBK-Inhaber dessen Kurzwaffe zur Instandsetzung zum Waffengeschäft bringen?","a":[{"t":"Ja, wenn er Inhaber einer WBK ist oder die Waffe gewerblich transportiert.","c":true},{"t":"Nein, das ist nicht erlaubt.","c":false},{"t":"Das muss immer erst bei der Behörde beantragt werden.","c":false}]},{"n":"2.90","k":"I","q":"Erlaubnisfreies Führen im Sinne des Waffengesetzes liegt vor, wenn man als WBK-Inhaber die Waffe...","a":[{"t":"bei einer Schützenhochzeit zum Spalier stehen verwendet.","c":false},{"t":"im verschlossenen Kofferraum des PKW, ungeladen und verpackt zum Schießstand fährt.","c":true},{"t":"im verschlossenen Waffenkoffer zum Büchsenmacher transportiert.","c":true}]},{"n":"2.95","k":"I","q":"Ist der Transport einer erlaubnispflichtigen Schusswaffe durch den WBK-Inhaber von der Wohnung zum Schießstand zulässig?","a":[{"t":"Nur mit Waffenschein.","c":false},{"t":"Ja, wenn sie ungeladen und gesichert im Holster am Körper getragen wird.","c":false},{"t":"Ja, wenn sie nicht zugriffsbereit und nicht schussbereit transportiert wird und dies vom Bedürfnis umfasst ist.","c":true}]},{"n":"2.96","k":"I","q":"Eine Erlaubnis zum Führen einer Schusswaffe im Sinne des Waffengesetzes ist erforderlich, wenn","a":[{"t":"... sie entladen in der unverschlossenen Aktentasche mitgeführt wird.","c":true},{"t":"... sie geladen in einer verschlossenen Aktentasche mitgeführt wird.","c":true},{"t":"... sie sich entladen im unverschlossenen Handschuhfach eines PKW befindet und die Munition in einem Metallbehältnis mit Schwenkriegelschloss im Kofferraum mitgeführt wird.","c":true}]},{"n":"2.98","k":"I","q":"Welche Schusswaffen bzw. sonstigen Waffen dürfen Sie bei öffentlichen Veranstaltungen „bei sich“ haben?","a":[{"t":"Erlaubt ist das Führen eines Schreckschussrevolvers, wenn ich den Kleinen Waffenschein habe.","c":false},{"t":"Steinschlosspistole, weil diese nach dem WaffG ohnehin geführt werden darf.","c":false},{"t":"Es dürfen keine Waffen im Sinne des § 1 Abs. 2 WaffG bei sich geführt werden.","c":true}]},{"n":"2.99","k":"I","q":"Kann man eine im Ausland erworbene erlaubnispflichtige Schusswaffe in die Bundesrepublik einführen/verbringen?","a":[{"t":"Ja, ohne Einschränkung.","c":false},{"t":"Ja, mit Waffenbesitzkarte.","c":false},{"t":"Ja, mit Verbringungserlaubnissen der zuständigen Behörden.","c":true}]},{"n":"2.100","k":"I","q":"Unter welchen Voraussetzungen darf man eine im Ausland erworbene Schusswaffe, die in der Bundesrepublik Deutschland erlaubnispflichtig ist, in das Bundesgebiet einführen?","a":[{"t":"Nur, wenn man im Besitz einer in Deutschland gültigen Waffenbesitzkarte mit Voreintrag ist.","c":false},{"t":"Nur, wenn man im Besitz eines Europäischen Feuerwaffenpasses ist.","c":false},{"t":"Nur, wenn man im Besitz der entsprechenden Verbringungserlaubnisse ist.","c":true}]},{"n":"2.101","k":"I","q":"Was ist beim Verbringen von Schusswaffen über Staatsgrenzen immer zu beachten?","a":[{"t":"Beim Verbringen von Waffen nach Deutschland müssen vor Grenzübertritt die erforderlichen Erlaubnisse (z.B. Verbringungserlaubnis) vorliegen.","c":true},{"t":"Beim Verbringen von Waffen aus Deutschland müssen vor Grenzübertritt die erforderlichen Erlaubnisse des Ziellandes, der Bundesrepublik Deutschland und ggf. aller Transitländer vorliegen.","c":true},{"t":"Es genügt immer eine deutsche WBK.","c":false}]},{"n":"2.102","k":"I","q":"Was muss ein Waffenbesitzer veranlassen, wenn er seine erlaubnispflichtige Schusswaffe in einem anderen Mitgliedsstaat der Europäischen Union verkaufen möchte?","a":[{"t":"Nichts, der Verkauf von erlaubnispflichtigen Schusswaffen in das europäische Ausland ist generell erlaubnisfrei.","c":false},{"t":"Der Waffenbesitzer lässt sich die Erwerbserlaubnis des Käufers vorlegen und überlässt diesem dann die Waffe. Der Käufer meldet die Waffe nach Erhalt in seinem Heimatland an. Anschließend schickt er dem Verkäufer eine Kopie der Anmeldung, damit dieser die Waffe bei seiner Behörde abmelden kann.","c":false},{"t":"Er bittet den Käufer um Übersendung einer Erlaubnis des Empfängerlandes zur Einfuhr der Waffe. Anschließend beantragt der Verkäufer bei seiner zuständigen Behörde eine Erlaubnis zum dauerhaften Verbringen der Waffe ins Ausland. Erst nach Erlaubniserteilung darf die Waffe verbracht werden. (Die Behörde meldet die Erteilung der Ausfuhrerlaubnis dem Bundesverwaltungsamt, EU-Meldedienst)","c":true}]},{"n":"2.103","k":"I","q":"Darf man als Inhaber einer Waffenbesitzkarte eine im Ausland erworbene Schusswaffe in die Bundesrepublik Deutschland einführen?","a":[{"t":"Ja, aber nur wenn sich in der Waffenbesitzkarte ein entsprechender Voreintrag der zuständigen Erlaubnisbehörde befindet.","c":false},{"t":"Ja, die Waffe ist innerhalb von 14 Tagen bei der zuständigen Erlaubnisbehörde anzumelden.","c":false},{"t":"Nein, man benötigt vor der Einfuhr zunächst eine Verbringungserlaubnis seiner zuständigen Waffenbehörde und dann eine Verbringungserlaubnis des ausländischen Staates.","c":true}]},{"n":"2.105","k":"I","q":"Wozu berechtigt mich der Europäische Feuerwaffenpass?","a":[{"t":"Zum dauerhaften Verbringen von Feuerwaffen in Mitgliedstaaten.","c":false},{"t":"Zur Feuerwaffenmitnahme bei Reisen in Mitgliedstaaten, beispielsweise zur Teilnahme an schießsportlichen Veranstaltungen oder zur Jagd.","c":true},{"t":"Zur Feuerwaffenmitnahme bei Reisen in Mitgliedstaaten, muss ich die Reise mindestens 14 Tage vorher meiner zuständigen Erlaubnisbehörde schriftlich anzeigen.","c":false}]},{"n":"2.106","k":"I","q":"Wie können Feuerwaffen dauerhaft in einen anderen Mitgliedstaat verbracht werden?","a":[{"t":"Die Feuerwaffen können mit einem Europäischen Feuerwaffenpass verbracht werden.","c":false},{"t":"Eine Verbringungserlaubnis zum Verbringen in einen Mitgliedstaat ist nicht erforderlich.","c":false},{"t":"Durch vorherige Verbringungserlaubnis des Mitgliedsstaates und darauf folgend einer Verbringungserlaubnis der zuständigen deutschen Waffenbehörde.","c":true}]},{"n":"2.107","k":"I","q":"Welche Handlung erfüllt einen Straftatbestand im Sinne des Waffengesetzes?","a":[{"t":"Feuerwaffen werden dauerhaft ohne entsprechende Erlaubnisse zum Verbringen in einen Mitgliedstaat verbracht.","c":true},{"t":"Feuerwaffen werden ohne eine waffenrechtliche Erlaubnis zur Ausfuhr in einen Drittstaat verbracht.","c":false},{"t":"Feuerwaffen werden mit einem Europäischen Feuerwaffenpasses dauerhaft in einen Mitgliedstaat verbracht.","c":true}]},{"n":"2.108","k":"I","q":"Was ist bei einer dauerhaften Ausfuhr von Schusswaffen in einen Drittstaat zu beachten?","a":[{"t":"Es ist nichts zu beachten.","c":false},{"t":"Es ist eine Ausfuhrerlaubnis der zuständigen Waffenbehörde erforderlich.","c":false},{"t":"Außenwirtschaftsrechtliche Bestimmungen sind zu beachten (Bundesamt für Wirtschaft und Ausfuhrkontrolle (BAFA).","c":true}]},{"n":"2.109","k":"I","q":"Berechtigt der Europäische Feuerwaffenpass zur Einfuhr von erlaubnispflichtiger Munition aus einem Mitgliedstaat, sofern die Munition dort von Ihnen berechtigterweise erworben wurde?","a":[{"t":"Ja","c":false},{"t":"Nein. Eine Verbringungserlaubnis ist erforderlich.","c":true},{"t":"Ja, aber nur wenn eine Waffe entsprechenden Kalibers in den EFP eingetragen ist.","c":false}]},{"n":"2.110","k":"I","q":"Welche Waffen dürfen ohne Beschusszeichen einem anderen zum Schießen überlassen werden?","a":[{"t":"alle Schusswaffen","c":false},{"t":"Grundsätzlich keine Schusswaffen, außer diejenigen, die vor dem 1. Januar 1891 hergestellt wurden oder für die von einem Beschussamt eine Bescheinigung darüber ausgestellt wurde, dass der Beschuss der Waffe nicht durchgeführt werden kann.","c":true},{"t":"Doppelflinten","c":false}]},{"n":"2.111","k":"I","q":"Dürfen Sie als Sportschütze mit einer Schusswaffe, die der Beschusspflicht unterliegt, auf dem Schießstand „Probeschüsse“ abgeben, wenn kein Beschussstempel angebracht ist?","a":[{"t":"Ja, das Probeschießen ist gestattet.","c":false},{"t":"Nein, das ist niemals gestattet.","c":true},{"t":"Solche Schüsse sind nur durch die verantwortliche Aufsicht zulässig.","c":false}]},{"n":"2.112","k":"I","q":"Wann ist eine Waffe erneut zu beschießen?","a":[{"t":"Neuwaffen nach 15 Jahren, bei Gebrauchtwaffen nach 10 Jahren.","c":false},{"t":"Ein Beschuss ist unter anderem dann erforderlich, wenn eine Waffe von einem gewerblichen Waffenhändler an einen Kunden verkauft wird.","c":false},{"t":"Ein erneuter Beschuss muss immer dann erfolgen, wenn wesentliche Teile der Waffe verändert oder instand gesetzt wurden.","c":true}]},{"n":"2.113","k":"I","q":"Ist die zuständige Erlaubnisbehörde zu unterrichten, wenn durch einen Büchsenmacher der Lauf ersetzt und die Waffe anschließend neu beschossen wurde?","a":[{"t":"Die Erlaubnisbehörde ist immer zu unterrichten.","c":false},{"t":"Die Erlaubnisbehörde ist zu unterrichten, wenn ein wesentliches Teil erworben wurde.","c":true},{"t":"Die Erlaubnisbehörde ist nie zu unterrichten.","c":false}]},{"n":"2.114","k":"I","q":"Was bedeutet die Überstempelung eines Beschusszeichens mit einem „X“?","a":[{"t":"Die Waffe wurde in England erneut beschossen, es ist nur noch der englische Beschuss gültig.","c":false},{"t":"Die Waffe wurde bei einer erneuten Beschussprüfung als nicht mehr beschusstauglich befunden, der bereits vorhandene Beschussstempel ist ungültig.","c":true},{"t":"Die Waffe wurde für den Export nach Großbritannien erneut beschossen, da dort der deutsche Beschuss nicht gültig ist.","c":false}]},{"n":"2.115","k":"I","q":"Wann ist eine Waffe erneut zum Beschuss vorzulegen?","a":[{"t":"ein neuer Lauf (kein Austauschlauf) wurde eingebaut","c":true},{"t":"Sportgriffschalen wurden montiert","c":false},{"t":"der Verschluss wurde erneuert","c":true},{"t":"die Schussfolge wurde geändert","c":true},{"t":"der Lauf wurde mit Kompensatoröffnungen versehen","c":true},{"t":"das Abzugsgewicht wurde durch Einbau einer anderen Feder verringert","c":false}]},{"n":"2.116","k":"I","q":"Darf mit einer amerikanischen Schusswaffe mit französischem Beschusszeichen in der Bundesrepublik geschossen werden?","a":[{"t":"Nein, die Waffe braucht ein deutsches Beschusszeichen.","c":false},{"t":"Ja, das französische Beschusszeichen ist anerkannt.","c":true},{"t":"Nein, die Waffe braucht ein amerikanisches Beschusszeichen.","c":false}]},{"n":"2.117","k":"I","q":"Eine Feuerwaffe wird aus einem der nebenstehenden Länder eingeführt. Bei welchem Land muss die Feuerwaffe einem Beschussamt der C.I.P. (Internationale Kommission zur Prüfung von Handfeuerwaffen und Munition) vorgelegt werden?","a":[{"t":"USA","c":true},{"t":"Ungarn","c":false},{"t":"Chile","c":false}]},{"n":"2.118","k":"I","q":"Wo dürfen Sie mit Druckluftwaffen, die das Zeichen „F im Fünfeck“ tragen, schießen?","a":[{"t":"In Ihrem eingezäunten Garten, wenn sichergestellt ist, dass die Geschosse den Garten nicht verlassen können.","c":true},{"t":"In einem verlassenen Steinbruch (kein Geschoss kann das Gelände verlassen).","c":false},{"t":"Nur auf zugelassenen Schießständen.","c":false},{"t":"Im eigenen Keller, wenn hierbei niemand gefährdet werden kann.","c":true}]},{"n":"2.119","k":"I","q":"Benötigen Sie zum Schießen mit einer Waffe im Kaliber 6 mm Flobert (kein F im Fünfeck auf der Waffe vorhanden) eine behördliche Erlaubnis?","a":[{"t":"Nein","c":false},{"t":"Ja, außerhalb von Schießstätten.","c":true},{"t":"Nicht auf dafür zugelassenen Schießstätten.","c":true}]},{"n":"2.120","k":"I","q":"Wo darf man ohne Erlaubnis mit einem Gewehr im Kaliber. 22lr schießen?","a":[{"t":"Im Wald","c":false},{"t":"Außerhalb des befriedeten Besitztums","c":false},{"t":"Auf dafür zugelassenen Schießstätten","c":true}]},{"n":"2.121","k":"I","q":"Wann darf ein 14-jähriger mit dem Einverständnis des/der Sorgeberechtigten auf dem Schießstand mit einer Waffe für Randfeuerpatronen bis Kaliber 5,6 mm lfB (.22lr) und einer Mündungsenergie von maximal 200 Joule schießen?","a":[{"t":"Wenn der Schießstandbetreiber zustimmt.","c":false},{"t":"Wenn der erforderlichen Aufsichtsperson das Einverständnis des/der Sorgeberechtigten vorliegt.","c":true},{"t":"Wenn die behördliche Ausnahmegenehmigung vorliegt.","c":false}]},{"n":"2.122","k":"I","q":"In welchem Alter darf ein Jugendlicher auf dem Schießstand, ohne unter einer besonderen Obhut (durch den/die Sorgeberechtigten oder der zur Kinder- und Jugendarbeit für das Schießen geeigneten Aufsichtsperson) zu stehen, mit einem Kleinkaliber-Match-Gewehr schießen?","a":[{"t":"mit 12 Jahren","c":false},{"t":"mit 14 Jahren","c":false},{"t":"mit 17 Jahren","c":true}]},{"n":"2.123","k":"I","q":"Mit welchen Waffen dürfen ein 13- jähriger und ein 15-jähriger auf einer zugelassenen Schießstätte schießen?","a":[{"t":"Ein 13-jähriger darf mit Druckluft-, Federdruck- und CO₂-Waffen schießen, wenn der/die Sorgeberechtigte/n schriftlich oder elektronisch sein/ihr Einverständnis erklärt hat/haben und eine geeignete Aufsichtsperson ständig anwesend ist.","c":true},{"t":"Ein 15-jähriger darf mit halbautomatischen Waffen bis Kaliber 9mm schießen, wenn der/die Sorgeberechtigte/n schriftlich oder elektronisch sein/ihr Einverständnis er-klärt hat/haben und eine geeignete Aufsichtsperson ständig anwesend.","c":false},{"t":"Ein 15-jähriger darf mit Waffen für Randfeuerpatronen bis Kaliber 5,6 mm lfB (.22 l. r.) und einer Mündungsenergie von maximal 200 Joule und mit Einzellader-Langwaffen mit glatten Läufen im Kaliber 12 oder kleiner schießen, wenn der/die Sorgeberechtigte/n schriftlich oder elektronisch sein/ihr Einverständnis erklärt hat/haben und eine geeignete Aufsichtsperson ständig anwesend ist.","c":true}]},{"n":"2.124","k":"I","q":"Darf ein 16-jähriger Schütze auf einer dafür zugelassenen Schießstätte mit einer halbautomatischen Pistole im Kaliber. 40 S&W schießen?","a":[{"t":"Wenn eine verantwortliche Aufsichtsperson anwesend ist, ist dies möglich.","c":false},{"t":"Nur unter Aufsicht eines Behördenvertreters.","c":false},{"t":"Nein, der Schütze muss dafür mindestens 18 Jahre alt sein.","c":true}]},{"n":"2.125","k":"I","q":"Unter welchen Voraussetzungen darf ein Jugendlicher nach Vollendung des 15. Lebensjahres und noch nicht vollendetem 16. Lebensjahr auf dem Schießstand eines Vereins schießen?","a":[{"t":"Mit schriftlichem Einverständnis der Sorgeberechtigten bei Druckluftwaffen bis zu 7,5 Joule Bewegungsenergie.","c":true},{"t":"Hierfür ist die behördliche Genehmigung (§3 WaffG) erforderlich.","c":false},{"t":"Mit schriftlichem Einverständnis der Sorgeberechtigten und unter Aufsicht einer hierfür geeigneten Person beim Schießen mit einem Kleinkalibergewehr (.22lr) mit maximal 200 Joule Mündungsenergie.","c":true}]},{"n":"2.126","k":"I","q":"Unter welchen Voraussetzungen darf ein Kind nach Vollendung seines 12. Lebensjahres mit einer Druckluftpistole auf dem Schießstand eines Vereins schießen?","a":[{"t":"Das Kind darf nur mit der vereinseigenen Druckluftpistole schießen.","c":false},{"t":"Hierfür ist die behördliche Genehmigung (§3 WaffG) erforderlich.","c":false},{"t":"Das Kind darf mit schriftlichem Einverständnis seiner Eltern und unter Aufsicht einer hierfür geeigneten Person schießen.","c":true}]},{"n":"2.127","k":"I","q":"Darf eine kombinierte Langwaffe (z.B. Drilling) zum sportlichen Schießen benutzt werden?","a":[{"t":"Ja, nur wenn es die Sportordnung und die Schießstandzulassung erlauben.","c":true},{"t":"Nein, kombinierte Waffen sind vom sportlichen Schießen ausgeschlossen.","c":false},{"t":"Ja, ohne jede Einschränkung.","c":false}]},{"n":"2.128","k":"I","q":"Wo darf der Sportschütze Patronen mit Hohlspitzgeschossen aus Kurzwaffen im Kaliber. 22lr verschießen?","a":[{"t":"Auf dem eigenen Grundstück.","c":false},{"t":"Auf dafür zugelassenen Schießständen.","c":true},{"t":"Nirgends, das ist gesetzlich verboten.","c":false}]},{"n":"2.129","k":"I","q":"Welche Dokumente benötigt ein Brauchtumsschütze beim Schießen in der Öffentlichkeit?","a":[{"t":"Waffenschein und Pass","c":false},{"t":"Waffenbesitzkarte und Sportschützenausweis","c":false},{"t":"Schießerlaubnis, evtl. Waffenbesitzkarte und Personalausweis, bei Vorderladern: „Erlaubnis nach dem Sprengstoffgesetz“.","c":true}]},{"n":"2.130","k":"I","q":"Ist für das Schießen mit einem Gewehr im Kaliber. 22lr im Keller eines Wohnhauses eine behördliche Erlaubnis erforderlich?","a":[{"t":"Nein, wenn die Sicherheit gewährleistet ist.","c":false},{"t":"Ja, eine Erlaubnis zum Betrieb einer Schießstätte oder eine Schießerlaubnis.","c":true},{"t":"Nein, die des Hauseigentümers reicht aus.","c":false}]},{"n":"2.131","k":"I","q":"Sie wollen an Silvester mit Ihrer Repetierbüchse auf der öffentlichen Straße vor Ihrem Haus Kartuschenmunition verschießen. Was ist dabei zu beachten?","a":[{"t":"Ich benötige einen kleinen Waffenschein.","c":false},{"t":"Es sind lediglich die Zeiten an Silvester zu beachten, an denen Pyrotechnisches Material gezündet werden darf.","c":false},{"t":"Ich benötige einen Waffenschein und eine Schießerlaubnis.","c":true}]},{"n":"2.132","k":"I","q":"Darf man zu Silvester mit einem Revolver im Kaliber. 38 Spezial ohne behördliche Erlaubnis Platzpatronen (Kartuschenmunition) verschießen?","a":[{"t":"Nein","c":true},{"t":"Ja. Dies ist aber nur innerhalb der behördlich genehmigten „Knallzeit“ zulässig, wenn man sich zudem auf einem befriedeten Grundstück befindet.","c":false},{"t":"Ja. Dies ist aber nur innerhalb der behördlich genehmigten „Knallzeit“ zulässig, wenn man sich zudem auf seinem eigenen, befriedeten Grundstück befindet.","c":false}]},{"n":"2.133","k":"I","q":"Ist das nichtgewerbliche Wiederladen von Patronenhülsen erlaubt?","a":[{"t":"Ja, für Inhaber einer Munitionserwerbserlaubnis.","c":false},{"t":"Ja, nur mit einer Erlaubnis nach § 27 Sprengstoffgesetz.","c":true},{"t":"Nein","c":false}]},{"n":"2.134","k":"I","q":"Das nichtgewerbliche Wiederladen von Patronenmunition ist...","a":[{"t":"für jeden erlaubt, der eine Waffensachkundeprüfung bestanden hat.","c":false},{"t":"für jeden erlaubt, der gefahrlos mit Schwarzpulver umgehen kann.","c":false},{"t":"für jeden erlaubt, der die Fachkundeprüfung nach dem Sprengstoffgesetz nachgewiesen hat und dem durch die Behörde eine entsprechende Erlaubnis nach § 27 SprengG erteilt wurde.","c":true}]},{"n":"2.136","k":"I","q":"Berechtigt die abgelegte Sachkundeprüfung zum nichtgewerblichen Wiederladen von Hülsen?","a":[{"t":"Ja, durch die Sachkundeprüfung ist man berechtigt Hülsen wiederzuladen.","c":false},{"t":"Nein, es ist eine Erlaubnis nach § 27 Sprengstoffgesetz erforderlich.","c":true},{"t":"Das Wiederladen von Hülsen ist immer erlaubt.","c":false}]},{"n":"2.137","k":"I","q":"Welche Änderung an einer Schusswaffe dürfen nur von hierzu berechtigten Personen durchgeführt werden?","a":[{"t":"Schaftmodifizierung","c":false},{"t":"Änderung am Visier","c":false},{"t":"Anbringen von Bohrungen an der Systemhülse zur Zielfernrohrmontage","c":true}]},{"n":"2.138","k":"I","q":"Welche Änderung an einer Schusswaffe dürfen nur von hierzu berechtigten Personen durchgeführt werden?","a":[{"t":"Änderung des Verschlusses von Randauf Zentralfeuer","c":true},{"t":"Aufsetzen eines Wechselsystems","c":false},{"t":"Anbringen von Sportgriffschalen","c":false}]},{"n":"2.139","k":"I","q":"Welche Änderungen an Schusswaffen dürfen nur von hierzu berechtigten Personen durchgeführt werden?","a":[{"t":"Verkürzung des Laufes","c":true},{"t":"Die Schussfolge der Waffe wird verändert.","c":true},{"t":"Die Schusswaffe wird so geändert, dass andere Munition oder Geschosse mit anderem Kaliber aus ihr verschossen werden können.","c":true},{"t":"Wesentliche Teile, zu deren Einpassung eine Nacharbeit erforderlich ist, werden ausgewechselt.","c":true},{"t":"Der gesamte Schaft wird getauscht.","c":false}]},{"n":"2.140","k":"I","q":"Sie brauchen eine behördliche Erlaubnis...","a":[{"t":"zum Austausch eines Trainingsabzuges.","c":false},{"t":"zur Verwendung eines 10 Schussanstelle eines 5 Schuss- Magazins.","c":false},{"t":"zur Änderung des Patronenlagers / Laufinneren auf ein größeres Kaliber.","c":true}]},{"n":"2.141","k":"I","q":"Dürfen Sie Schusswaffen für bessere Ergebnisse ohne Erlaubnis bearbeiten?","a":[{"t":"Nur, wenn ich in der Metallbearbeitung erfahren bin.","c":false},{"t":"Abzug, Visierung und Schaft dürfen von mir bearbeitet werden.","c":true},{"t":"Auch wesentliche Teile dürfen von mir geändert werden.","c":false}]},{"n":"2.142","k":"I","q":"Eine Langwaffe wird unzulässigerweise bearbeitet, wenn Sie ohne Erlaubnis...","a":[{"t":"den Gewehrlauf kürzen.","c":true},{"t":"eine Schaftkappe montieren.","c":false},{"t":"die Griffschalen austauschen.","c":false}]},{"n":"2.143","k":"I","q":"Eine Kurzwaffe wird von Ihnen unzulässigerweise bearbeitet, wenn ohne Erlaubnis...","a":[{"t":"der Lauf mit Kompensatorbohrungen versehen wird.","c":true},{"t":"ein Balkenkorn eingesetzt wird.","c":false}]},{"n":"2.145","k":"I","q":"Wenn ein Mitglied, das als Sportschütze eine waffenrechtliche Erlaubnis besitzt, aus dem Schießsportverein austritt, muss der Verein. ..","a":[{"t":"den Austritt unverzüglich der zuständigen Behörde melden.","c":true},{"t":"die Waffen des Mitgliedes in Verwahrung nehmen.","c":false},{"t":"nichts tun.","c":false}]},{"n":"2.147","k":"I","q":"Was hat ein schießsportlicher Verein eines anerkannten Schießsportverbandes im Hinblick auf die Aufsicht zu beachten?","a":[{"t":"Aufsichtspersonen im Verein registrieren.","c":true},{"t":"Voraussetzungen der Sachkunde prüfen.","c":true},{"t":"Ein Nachweisdokument ausstellen.","c":true}]},{"n":"2.148","k":"I","q":"Ab welchem Alter dürfen Kinder und Jugendliche mit Druckluft-, Federdruck- oder CO₂-Waffen schießen und was ist dabei zu beachten?","a":[{"t":"Ab 12 Jahren, wenn die Sorgeberechtigten schriftlich oder elektronisch dabei sind.","c":false},{"t":"Ab 12 Jahren, sofern die Personensorgeberechtigten ihr Einverständnis erklärt haben und eine geeignete Aufsichtsperson zur Betreuung vorhanden ist.","c":true},{"t":"Ab 12 Jahren, wenn die Sorgeberechtigten schriftlich oder elektronisch ihr Einverständnis erklärt haben.","c":false}]},{"n":"2.149","k":"I","q":"Wer darf auf einer Schießstätte Aufsicht führen?","a":[{"t":"Alle Vereinsmitglieder","c":false},{"t":"Der Eigentümer der Schießstätte","c":false},{"t":"Alle vom Betreiber bestellten Personen.","c":true}]},{"n":"2.152","k":"I","q":"Welche Anforderungen werden an die verantwortliche Aufsichtsperson gestellt?","a":[{"t":"Volljährigkeit, persönliche Eignung","c":true},{"t":"Zuverlässigkeit, Sachkunde","c":true},{"t":"Bei Aufsicht über Minderjährige die Eignung für Kinder- und Jugendarbeit","c":true}]},{"n":"2.153","k":"I","q":"Was zählt zu den Aufgaben der verantwortlichen Aufsichtsperson?","a":[{"t":"Dafür Sorge zu tragen, dass von den Schützen und ihren Waffen keine Gefahr ausgeht.","c":true},{"t":"Die Betreuung von Zuschauern und Gästen.","c":false},{"t":"Überprüfen, ob der Verbandskasten aufgefüllt ist.","c":false}]},{"n":"3.01","k":"I","q":"Bei welchen Dekorationswaffen ist kein Zulassungszeichen (Ortszeichen des Beschussamtes in der Raute) erforderlich?","a":[{"t":"Bei allen offensichtlich unbrauchbaren und nicht mehr schussfähigen Waffen, die vor dem 01.01.1970 hergestellt wurden.","c":false},{"t":"Bei allen Schusswaffen, die vor dem 01.04.2003 nach dem damals geltenden Waffenrecht unbrauchbar gemacht wurden.","c":true},{"t":"Bei allen Schusswaffen, deren Modell vor dem 01.01.1871 hergestellt oder entwickelt wurde.","c":false}]},{"n":"3.02","k":"I","q":"Welches Kennzeichen muss u.a. auf einem Großkaliber-Revolver angebracht sein?","a":[{"t":"Bezeichnung der Munition","c":true},{"t":"Herstellerzeichen","c":true},{"t":"Warnhinweis „Gefährlich…“","c":false}]},{"n":"3.03","k":"I","q":"Welche Kennzeichnung trägt üblicherweise eine Feuerwaffe?","a":[{"t":"Name des Besitzers","c":false},{"t":"Beschusszeichen","c":true},{"t":"Lauflänge","c":false}]},{"n":"3.04","k":"I","q":"Welche Kennzeichnung trägt üblicherweise eine Schusswaffe?","a":[{"t":"Name, Firma oder Marke eines Waffenherstellers oder -händlers, der im Geltungsbereich dieses Gesetzes eine gewerbliche Niederlassung hat.","c":true},{"t":"Landeskürzel des Herstellungslandes","c":true},{"t":"die Bezeichnung der Munition; sofern keine Munition verwendet wird, die Bezeichnung der Geschosse","c":true},{"t":"Beschusszeichen","c":true},{"t":"Herstellungsnummer","c":true},{"t":"bei Importwaffen unter anderem auch Einfuhrland (Länderkürzel) und Einfuhrjahr.","c":true}]},{"n":"3.05","k":"I","q":"Welche der nebenstehenden Kennzeichen sind nicht auf einer waffenbesitzkartenpflichtigen Schusswaffe zu finden?","a":[{"t":"","c":true},{"t":"seit 20.10.2014:","c":false},{"t":"","c":true}]},{"n":"3.07","k":"I","q":"Welche Kennzeichnung muss eine erlaubnispflichtige Feuerwaffe mindestens aufweisen?","a":[{"t":"Hersteller- oder Händlerzeichen, Seriennummer, Modell, Bezeichnung der Munition","c":false},{"t":"Hersteller- oder Händlerzeichen, Herstellungsland (Länderkürzel), Seriennummer, Beschusszeichen, Bezeichnung der Munition, bei Importwaffen unter anderem auch Einfuhrland (Landeskürzel) und Einfuhrjahr","c":true},{"t":"Hersteller- oder Händlerzeichen, Seriennummer, Herstellungsjahr, Bezeichnung der Munition","c":false}]},{"n":"3.08","k":"I","q":"Welche Kennzeichen müssen auf der kleinsten Verpackungseinheit von Patronen angebracht sein?","a":[{"t":"Hersteller- oder Fertigungszeichen, Fertigungsserie, Patronendaten, Zulassungszeichen","c":true},{"t":"Herstellungsdatum, Patronenkaliber","c":false},{"t":"keine","c":false}]},{"n":"3.10","k":"I","q":"Welche Waffenteile unterliegen, bei Einfuhr in den Geltungsbereich des Waffengesetzes, der Kennzeichnungspflicht des § 24 Abs. 1 des Waffengesetzes?","a":[{"t":"Mindestens ein wesentliches Waffenteil muss entsprechend den gesetzlichen Vorgaben gekennzeichnet sein.","c":false},{"t":"Alle wesentlichen Waffenteile müssen entsprechend den gesetzlichen Vorgaben gekennzeichnet sein.","c":true},{"t":"Es ist ausreichend wenn sich eine Seriennummer auf dem Lauf der Waffe befindet.","c":false}]},{"n":"3.11","k":"I","q":"Welche Kennzeichnung muss die Randfeuerpatrone aufweisen?","a":[{"t":"Kaliberangabe auf der Hülse","c":false},{"t":"Herstellerzeichen auf der Hülse","c":true},{"t":"Kaliber und Herstellerzeichen auf der Hülse","c":false}]},{"n":"3.12","k":"I","q":"Welche Kennzeichnung muss die Zentralfeuerpatrone aufweisen?","a":[{"t":"Kaliberangabe und Geschossart auf dem Hülsenboden","c":false},{"t":"Herstellerzeichen auf dem Hülsenhals","c":false},{"t":"Herstellerzeichen und Bezeichnung der Munition auf der Hülse","c":true}]},{"n":"3.13","k":"I","q":"Was bedeutet der Zusatz „R“ in der Munitionsbezeichnung?","a":[{"t":"Patrone mit Rand","c":true},{"t":"Randfeuerpatrone","c":false},{"t":"Patrone für Revolver (R = Revolver)","c":false}]},{"n":"3.14","k":"I","q":"Welche zusätzlichen Angaben müssen Schrotpatronen im Kaliber 12/70 aufweisen?","a":[{"t":"keine zusätzlichen Angaben erforderlich","c":false},{"t":"auf der Hülse die Längenangabe 70","c":true},{"t":"Angabe der Anzahl der Schrote","c":false}]},{"n":"3.17","k":"I","q":"Welche Kennzeichnung muss auf einer Randfeuerpatrone angebracht sein?","a":[{"t":"Bezeichnung der Munition","c":false},{"t":"Randfeuer","c":false},{"t":"Herstellerzeichen","c":true}]},{"n":"3.18","k":"I","q":"Welche Kennzeichen müssen auf der kleinsten Munitionsverpackungseinheit angebracht sein?","a":[{"t":"Herstellerzeichen, Bezeichnung der Munition, Anzahl der Patronen in der Packung, Fertigungsserie (Losnummer), Zulassungszeichen","c":true},{"t":"Herstellerzeichen, Bezeichnung der Munition, Anzahl der Patronen in der Packung, Herstellungsjahr, Zulassungszeichen","c":false},{"t":"Herstellerzeichen, Bezeichnung der Munition, Anzahl der Patronen in der Packung, Fertigungsserie (Losnummer), Herstellungsdatum","c":false}]},{"n":"3.19","k":"I","q":"Welche Kennzeichnung muss auf einer Zentralfeuerpatrone angebracht sein?","a":[{"t":"Bezeichnung der Munition und Geschossart","c":false},{"t":"Bezeichnung der Munition und Herstellerzeichen","c":true},{"t":"Bezeichnung der Munition und Losnummer","c":false}]},{"n":"3.20","k":"I","q":"Welche Bedeutung hat ein Beschusszeichen?","a":[{"t":"Sicherheitsüberprüfung der Waffe beim zuständigen TÜV","c":false},{"t":"Die Waffe ist durch die Physikalisch- Technische Bundesanstalt auf Funktionsfähigkeit geprüft.","c":false},{"t":"Die Waffe ist auf Haltbarkeit, Funktionssicherheit, Maßhaltigkeit und richtige Kennzeichnung durch ein anerkanntes Beschussamt geprüft.","c":true}]},{"n":"3.23","k":"I","q":"Auf welchem Waffenteil muss das Beschusszeichen auch angebracht sein?","a":[{"t":"Auf dem Lauf","c":true},{"t":"Auf dem Schaft","c":false},{"t":"Auf dem Visier","c":false}]},{"n":"3.24","k":"I","q":"Welches Beschusszeichen trägt ein in der Bundesrepublik beschossener Revolver. 357 Magnum?","a":[{"t":"Bundesadler V / CIP S seit 20.10.2014","c":false},{"t":"Bundesadler N / CIP N seit 20.10.2014","c":true},{"t":"Bundesadler SP / CIP PN seit 20.10.2014","c":false}]},{"n":"3.25","k":"I","q":"Was bedeutet das Beschusszeichen Bundesadler N bzw. CIP N? seit 20.10.2014","a":[{"t":"Die Waffe ist behördlich geprüft und zum Schießen zugelassen.","c":true},{"t":"Die Gebühren sind bezahlt.","c":false},{"t":"Die Waffe ist gebraucht.","c":false}]},{"n":"3.26","k":"I","q":"Welche Schusswaffe muss ein amtliches Beschusszeichen tragen?","a":[{"t":"Ein jetzt hergestellter Nachbau einer Steinschlosspistole (Original 18. Jhdt.)","c":true},{"t":"Ein Druckluftgewehr, das dem Geschoss eine Energie von ca. 10 Joule erteilt.","c":false},{"t":"Ordonnanzgewehr aus dem 2. Weltkrieg","c":true},{"t":"Bauartgeprüfter Schreckschussrevolver im Kaliber bis 6 mm","c":false}]},{"n":"3.27","k":"I","q":"Welche Beschussstempelung trägt üblicherweise eine in der Bundesrepublik Deutschland beschossene Schusswaffe?","a":[{"t":"Beschusszeichen in Form eines Bundesadlers (seit 20.10.2014 CIP-Zeichen) mit darunter liegendem Kennbuchstaben für die Art des Beschusses.","c":true},{"t":"Ortszeichen für das Beschussamt","c":true},{"t":"Zahlen oder Buchstabencodierung für das Beschussdatum","c":true}]},{"n":"3.28","k":"I","q":"Welche Bedeutung hat ein Beschusszeichen, bei dem ein Bundesadler (seit 20.10.2014 CIP-Zeichen) mit den darunter liegenden Buchstaben „PN“ abgebildet ist?","a":[{"t":"Die Waffe ist für das Schießen mit allen Munitionssorten (Schwarzpulver und rauchloses Pulver) im entsprechenden Kaliber zugelassen. (PN = Prüfung Normal)","c":false},{"t":"Die Waffe ist für das Schießen mit allen Munitionssorten im entsprechenden Kaliber zugelassen, die mit rauchlosem Pulver geladen sind. (PN = Prüfung Nitro)","c":false},{"t":"Die Waffe ist für das Schießen mit allen Munitionssorten im entsprechenden Kaliber zugelassen, die mit Schwarzpulver geladen sind. (PN = poudre noir)","c":true}]},{"n":"3.29","k":"I","q":"Was wird bei einem amtlichen Beschuss geprüft?","a":[{"t":"Die Waffe wird auf Haltbarkeit, Funktionssicherheit, Maßhaltigkeit und Kennzeichnung geprüft.","c":true},{"t":"Die Waffe wird auf Lebensdauer, Konstruktionsschlüssigkeit und Funktionstauglichkeit geprüft.","c":false},{"t":"Die Waffe wird auf Präzision, Fertigungstoleranzen und Materialhärte geprüft.","c":false}]},{"n":"3.30","k":"I","q":"Auf welchen Waffenteilen muss das Beschusszeichen (auch) angebracht sein?","a":[{"t":"Lauf, Verschluss","c":true},{"t":"Schaft, Visier","c":false},{"t":"Sicherung, Magazin","c":false}]},{"n":"3.31","k":"I","q":"Welche der folgenden Waffenteile unterliegen der Beschusspflicht?","a":[{"t":"Einsteckläufe für Zentralfeuerpatronen","c":true},{"t":"Wechseltrommeln","c":true},{"t":"Wechselsysteme","c":true}]},{"n":"3.32","k":"I","q":"Werden in Deutschland auch Beschusszeichen anderer Staaten anerkannt?","a":[{"t":"Ja, aller Staaten, die eine Sicherheitsprüfung vorschreiben.","c":false},{"t":"Ja, aber nur Staaten, die dem Übereinkommen über die gegenseitige Anerkennung von Beschusszeichen und Prüfzeichen beigetreten sind (C.I.P.).","c":true},{"t":"Nein, alle Schusswaffen müssen vor ihrem Gebrauch von deutschen Beschussämtern geprüft sein.","c":false}]},{"n":"3.33","k":"I","q":"Bei welchen der folgenden ehemaligen Staaten ist der dortige amtliche Beschuss auch in der Bundesrepublik Deutschland weiterhin gültig? (D.h. die dort beschossenen Waffen müssen nicht von einem deutschen Beschussamt erneut beschossen werden.)","a":[{"t":"CSSR","c":true},{"t":"DDR","c":true},{"t":"Deutsches Reich (sollte sich ein Hakenkreuz auf der Waffe befinden, müsste das Hakenkreuz vom Beschussamt mit einem „X“ versehen werden)","c":true}]},{"n":"3.34","k":"I","q":"Welche Schusswaffe muss neben dem Zulassungszeichen „F im Fünfeck“ noch als weiteres Zulassungszeichen „PTB im Quadrat“ tragen? (PTB = Physikalisch-Technische Bundesanstalt)","a":[{"t":"Druckluftwaffen mit einer Bewegungsenergie bis zu 7,5 Joule.","c":false},{"t":"Schusswaffen mit kleinerem Kaliber als. 22lr und einer Bewegungsenergie bis zu 10 Joule.","c":false},{"t":"Feuerwaffen, deren Geschossen eine Bewegungsenergie von nicht mehr als 7,5 Joule erteilt wird.","c":true}]},{"n":"3.35","k":"I","q":"Welche Bedeutung hat das Zeichen „F im Fünfeck“?","a":[{"t":"Das Zeichen „F im Fünfeck“ kennzeichnet Waffen, die von volljährigen Personen erlaubnisfrei erworben werden dürfen.","c":false},{"t":"Das Zeichen „F im Fünfeck“ kennzeichnet Waffen, deren Geschossenergie E₀ maximal 7,5 Joule beträgt.","c":true},{"t":"Das Zeichen „F im Fünfeck“ kennzeichnet Waffen, deren Mündungsgeschwindigkeit unter 7,5 m/s. liegt.","c":false}]},{"n":"4.01","k":"I","q":"Wo darf eine erlaubnispflichtige Kurzwaffe gelagert werden?","a":[{"t":"In einem Waffenschrank der Sicherheitsstufe A nach VDMA 24992, sofern sich keine dazu passende Munition im Schrank befindet.","c":false},{"t":"In einem Waffenschrank der Sicherheitsstufe B nach VDMA 24992, sofern sich keine dazu passende Munition im Schrank befindet wenn der Schrank bereits vor dem 06.07.2017 rechtmäßig vom Betroffenen zur Waffenaufbewahrung genutzt wurde.","c":true},{"t":"In einem Waffenschrank der Norm DIN/EN 1143- 1 mit dem Widerstandsgrad 0.","c":true}]},{"n":"4.02","k":"I","q":"Welchem Sicherheitsstandard muss ein Waffenschrank mindestens entsprechen, damit Waffen und dazu passende Munition zusammen darin aufbewahrt werden dürfen?","a":[{"t":"Sicherheitsstufe B nach VDMA 24992, Schrankgewicht über 200kg","c":false},{"t":"DIN/EN 1143- 1 Widerstandsgrad 0","c":true},{"t":"DIN/EN 1143- 1 Widerstandsgrad I","c":false}]},{"n":"4.03","k":"I","q":"In welchem Behältnis darf erlaubnispflichtige Munition gelagert werden?","a":[{"t":"Wohnzimmerschrank mit Sicherheitsschloss","c":false},{"t":"Blechschrank mit Vorhängeschloss","c":false},{"t":"Stahlblechbehältnis mit Schwenkriegelschloss","c":true}]},{"n":"4.04","k":"I","q":"Darf die Erlaubnisbehörde gegen den Willen des Erlaubnisinhabers dessen Wohnräume betreten, um die ordnungsgemäße Waffenaufbewahrung zu überprüfen?","a":[{"t":"Ja, dies ist stets zulässig.","c":false},{"t":"Ja, sofern eine dringende Gefahr für die öffentliche Sicherheit besteht.","c":true},{"t":"Ja, aber nur mit einem richterlichen Durchsuchungsbefehl.","c":false}]},{"n":"4.05","k":"I","q":"Schusswaffen sind aufzubewahren...","a":[{"t":"an einem versteckten Ort.","c":false},{"t":"nur bei der Erlaubnisbehörde.","c":false},{"t":"in einem Behältnis der entsprechenden Sicherheitsstufe.","c":true}]},{"n":"4.06","k":"I","q":"Wo müssen erlaubnispflichtige Schusswaffen und Munition aufbewahrt werden?","a":[{"t":"Im Kleiderschrank","c":false},{"t":"In einer verschlossenen und alarmgesicherten Familienwohnung.","c":false},{"t":"In einem Behältnis der entsprechenden Sicherheitsstufe.","c":true}]},{"n":"4.07","k":"I","q":"Gegen unbefugten Zugriff ist eine erlaubnispflichtige Pistole zu Hause gesichert, wenn sie…","a":[{"t":"versteckt im Bücherregal liegt.","c":false},{"t":"im abgeschlossenen Waffenkoffer im Schrank aufbewahrt wird.","c":false},{"t":"in einem Behältnis der Norm DIN/EN 1143-1 Widerstandsgrad 0 oder I aufbewahrt wird.","c":true}]},{"n":"4.08","k":"I","q":"Gegen unbefugten Zugriff ist eine erlaubnispflichtige Langwaffe gesichert, wenn sie...","a":[{"t":"sich in einem abgeschlossenen Waffenschrank der Norm DIN/EN 1143-1 Widerstandsgrad 0 oder I befindet.","c":true},{"t":"im Gewehrständer steht.","c":false},{"t":"an der Wand hängt und mit einem Schloss gesichert ist.","c":false}]},{"n":"4.09","k":"I","q":"Sind Sie in Bezug auf die sichere Verwahrung ihrer Waffe(n) oder Munition zur Auskunft gegenüber der Behörde verpflichtet?","a":[{"t":"Es besteht keine Pflicht zum Nachweis über die sichere Verwahrung.","c":false},{"t":"Ja, wer Waffen oder Munition besitzt, hat der zuständigen Behörde die zur sicheren Verwahrung getroffenen Maßnahmen nachzuweisen.","c":true},{"t":"Nein, nur wenn mehr als 10 Schusswaffen im Besitz sind.","c":false}]},{"n":"4.11","k":"I","q":"Ist die gemeinschaftliche Aufbewahrung von Waffen oder Munition durch berechtigte Personen, die in einer häuslichen Gemeinschaft leben, zulässig?","a":[{"t":"Ja","c":true},{"t":"Nein","c":false}]},{"n":"4.12","k":"I","q":"Wozu kann die nicht ordnungsgemäße Aufbewahrung von Waffen oder Munition u.a. führen?","a":[{"t":"Eine nicht ordnungsgemäße Aufbewahrung von Waffen stellt einen Straftatbestand im Sinne des Waffengesetzes dar.","c":true},{"t":"Verlust der persönlichen Eignung","c":false},{"t":"Die nicht ordnungsgemäße Aufbewahrung von Waffen stellt lediglich einen Ordnungswidrigkeitentatbestand dar.","c":false}]},{"n":"4.13","k":"I","q":"Wie können Waffen und Munition außerhalb der Wohnung, z.B. bei Hotelübernachtung anlässlich eines Wettkampfes, sicher aufbewahrt werden?","a":[{"t":"Die Schusswaffe/n ist/sind immer am Körper zu tragen.","c":false},{"t":"Ein wesentlicher Teil der Schusswaffe/n ist zu entnehmen und mit sich zu führen. Der Rest der Schusswaffe ist gegen unbefugten Zugriff zu sichern.","c":true},{"t":"Aufbewahrung in einem Transportbehältnis oder in einem verschlossenen Schrank oder einem sonstigen verschlossenen Behältnis.","c":true}]},{"n":"4.14","k":"I","q":"Wie sind bei einem Transport von Waffen und Munition in einem Fahrzeug diese bei kurzfristigem Verlassen des Fahrzeuges (Einnahme des Mittagessens, Tanken, Schüsseltreiben, Einkäufe etc.) aufzubewahren?","a":[{"t":"Waffen und Munition sind in dem verschlossenen Fahrzeug so aufzubewahren, dass keine unmittelbaren Rückschlüsse auf die Art des Inhaltes erkennbar sind.","c":true},{"t":"Die Waffe/n darf/dürfen hierbei nicht im Fahrzeug verbleiben.","c":false}]},{"n":"4.15","k":"I","q":"Wie sind erlaubnispflichtige Kurzwaffen aufzubewahren (bei dem Bestehen einer waffenrechtlichen Erlaubnis vor dem 06.07.2017 und Fortführung der Nutzung eines vorhandenen Behältnisses)?","a":[{"t":"In einer Stahlkassette der Sicherheitsstufe A nach VDMA 24992.","c":false},{"t":"In einem Sicherheitsbehältnis der Sicherheitsstufe B der Norm VDMA 24992 oder einem Behältnis der Sicherheitsstufe DIN/EN 1143- 1 Widerstandsgrad 0 oder I.","c":true},{"t":"In einer Truhe mit Schwenkriegelschloss im verschlossenen Keller.","c":false}]},{"n":"4.16","k":"I","q":"Wie sind erlaubnispflichtige Kurzwaffen aufzubewahren (Erteilung einer waffenrechtlichen Erlaubnis und dem damit verbunden Erwerb einer Schusswaffe nach dem 06.07.2017)?","a":[{"t":"In einem Sicherheitsbehältnis der Sicherheitsstufe B der Norm VDMA 24992.","c":false},{"t":"In einem Sicherheitsbehältnis der Sicherheitsstufe DIN/EN 1143-1 Widerstandsgrad 0 oder I.","c":true},{"t":"In einem Sicherheitsbehältnis der Sicherheitsstufe A der Norm VDMA 24992.","c":false}]},{"n":"4.17","k":"I","q":"Welche Mindestanforderungen gelten für die dauerhafte Aufbewahrung von Waffen und Munition?","a":[{"t":"Munition ist im Stahlbehältnis mit Schwenkriegelschloss oder gleichwertigem Behältnis aufzubewahren.","c":true},{"t":"Maximal 5 Kurzwaffen in einem Tresor mit Widerstandsgrad 0 (DIN/EN 1143- 1) bis 200 kg. Über 200 kg je 10 Kurzwaffen. Über 10 Kurzwaffen Widerstandsgrad I.","c":true},{"t":"Bis zu 10 Langwaffen je A-Schrank. Über 10 Langwaffen im B-Schrank.","c":false}]},{"n":"4.18","k":"I","q":"Wie dürfen acht erlaubnispflichtige Kurzwaffen untern anderem sicher vor unbefugtem Zugriff dauerhaft aufbewahrt werden?","a":[{"t":"In einem Tresor der Sicherheitsstufe B mit mehr als 200 Kilogramm Gewicht (VDMA 24992) (wenn der Tresor bereits vor dem 06.07.2017 rechtmäßig vom Betroffenen zur Waffenaufbewahrung genutzt wurde).","c":true},{"t":"In einem Tresor mit Widerstandsgrad 0 (DIN/EN 1143-1), dessen Gewicht mindesten 200 kg beträgt.","c":true},{"t":"In einem Tresor der Sicherheitsstufe A (VDMA 24992).","c":false}]},{"n":"4.19","k":"I","q":"Welche und wie viele erlaubnispflichtigen Schusswaffen dürfen Sie in einem Schrank der Sicherheitsstufe A nach VDMA 24992 (bei dem Bestehen einer waffenrechtlichen Erlaubnis vor dem 06.07.2017 und Fortführung der Nutzung eines vorhandenen Behältnisses) dauerhaft aufbewahren?","a":[{"t":"5 Kurzwaffen","c":false},{"t":"5 Langwaffen und 5 Kurzwaffen","c":false},{"t":"10 Langwaffen","c":true}]},{"n":"4.20","k":"I","q":"Dürfen Sie während des Urlaubes einem Vereinskameraden Ihre WBK- pflichtige Schusswaffe zur sicheren Aufbewahrung überlassen?","a":[{"t":"Ja, wenn er selbst auch eine WBK besitzt und über ein entsprechendes Behältnis verfügt.","c":true},{"t":"Nein, das ist nicht gestattet.","c":false},{"t":"Dies ist unter Vereinsmitgliedern gestattet.","c":false},{"t":"Ja, es ist ausreichend, dass er ein entsprechendes Behältnis besitzt.","c":false}]},{"n":"4.21","k":"I","q":"Wem dürfen Sie während Ihres Urlaubs eine erlaubnispflichtige Waffe vorübergehend zur sicheren Aufbewahrung überlassen?","a":[{"t":"Waffenhändler","c":true},{"t":"Dem Nachbarn, der die Waffe in seiner Werkbank im Hobbyraum lagert.","c":false},{"t":"Einem Inhaber einer Waffenbesitzkarte","c":true}]},{"n":"4.22","k":"I","q":"Wie sind erlaubnispflichtige Langwaffen aufzubewahren?","a":[{"t":"In einem Sicherheitsbehältnis der Sicherheitsstufe B der Norm VDMA 24992.","c":false},{"t":"In einem Sicherheitsbehältnis der Sicherheitsstufe DIN/EN 1143-1 Widerstandsgrad 0 oder I.","c":true},{"t":"In einem Sicherheitsbehältnis der Sicherheitsstufe A der Norm VDMA 24992.","c":false}]},{"n":"4.23","k":"I","q":"Gelten die Aufbewahrungsvorschriften des Waffengesetzes auch für sogenannte Salutwaffen?","a":[{"t":"Ja, vollumfänglich","c":false},{"t":"Nein, aber der Besitzer hat die erforderlichen Vorkehrungen zu treffen, um zu verhindern, dass diese abhanden kommen oder Dritte sie unbefugt an sich nehmen.","c":true}]},{"n":"5.03","k":"I","q":"Notwehr ist...","a":[{"t":"jede Abwehr eines gegenwärtigen und rechtswidrigen Angriffs von sich und anderen.","c":false},{"t":"jede Verteidigung, die erforderlich ist, um einen gegenwärtigen rechtswidrigen Angriff von sich oder einem anderen abzuwenden.","c":true},{"t":"jede Verteidigung, die erforderlich ist, um jeden Angriff von sich oder einem anderen abzuwenden.","c":false}]},{"n":"5.04","k":"I","q":"Gegen wen findet im Falle der Notwehr die Verteidigungshandlung statt?","a":[{"t":"Angreifer","c":true},{"t":"Zuschauer","c":false},{"t":"Angegriffener","c":false}]},{"n":"5.05","k":"I","q":"In Notwehr darf man handeln bei einem Angriff...","a":[{"t":"nur auf Leib und Leben.","c":false},{"t":"auf jedes Individual-Rechtsgut.","c":true},{"t":"nur gegen das Eigentum.","c":false}]},{"n":"5.06","k":"I","q":"Welches sind Voraussetzungen der Notwehr?","a":[{"t":"Verteidigungslage","c":true},{"t":"Verteidigungswille","c":true},{"t":"Erforderlichkeit","c":true}]},{"n":"5.07","k":"I","q":"Durch eine Notwehrhandlung entfällt die/der …?","a":[{"t":"Rechtswidrigkeit","c":true},{"t":"Vorsatz","c":false},{"t":"Schuld","c":false}]},{"n":"5.08","k":"I","q":"Notwehr mit einer Schusswaffe ist nicht gerechtfertigt...","a":[{"t":"bei Beleidigung.","c":true},{"t":"bei lebensgefährlichem tätlichem Angriff auf den Ehepartner.","c":false}]},{"n":"5.09","k":"I","q":"Schusswaffengebrauch als Notwehr kann als letztes Mittel zulässig sein,","a":[{"t":"wenn dem Angriff ausgewichen werden kann.","c":false},{"t":"wenn der Angriff mit einem Messer erfolgt.","c":true},{"t":"wenn der Angreifer mit der Faust droht.","c":false}]},{"n":"5.10","k":"I","q":"Ist ein Schusswaffengebrauch in Notwehr zulässig, wenn der Angegriffene dem Angriff ausweichen kann?","a":[{"t":"Nein, niemals","c":false},{"t":"Ist der Einsatz eines milderen Mittels zur Abwehr des Angriffs möglich, ist der Schusswaffengebrauch nicht zulässig.","c":true},{"t":"Grundsätzlich ist dem Angegriffenen ein Ausweichen nicht zumutbar, da dies seine Ehre verletzt.","c":false}]},{"n":"5.11","k":"I","q":"Soll im Notwehrfall vor dem Gebrauch der Schusswaffe gewarnt werden?","a":[{"t":"Ja, das ist Voraussetzung für einen rechtmäßigen Schusswaffengebrauch.","c":false},{"t":"Ja, soweit die Umstände es erlauben.","c":true},{"t":"Nein, das ist nicht erforderlich.","c":false}]},{"n":"5.12","k":"I","q":"Darf in einer Notwehrsituation immer von der Schusswaffe Gebrauch gemacht werden?","a":[{"t":"Nur wenn kein milderes Mittel zur Verfügung steht, um den Angriff abzuwehren.","c":true},{"t":"Der Schusswaffengebrauch ist stets als allerletzter Ausweg aus einer bedrohlichen Situation zu betrachten.","c":true},{"t":"Ja, immer","c":false}]},{"n":"5.13","k":"I","q":"Sollte im Notwehrfall der Angreifer vor dem Gebrauch der Schusswaffe gewarnt werden?","a":[{"t":"Nein","c":false},{"t":"Wenn möglich durch Zuruf und/oder Warnschuss.","c":true},{"t":"Das Zeigen der Waffe reicht aus, um den Angriff zu beenden.","c":false}]},{"n":"5.15","k":"I","q":"Dürfen Sie in jeder Notwehrsituation von der Schusswaffe Gebrauch machen?","a":[{"t":"Ja, immer","c":false},{"t":"Nein, allenfalls bei einem Angriff auf Leben, Leib oder erhebliche Rechtsgüter des Einzelnen.","c":true},{"t":"Ja, auch wenn der Angriff durch mildere Mittel abgewehrt werden kann.","c":false}]},{"n":"5.16","k":"I","q":"Wie lange besteht eine Notwehrsituation fort?","a":[{"t":"Bis der Angreifer weggelaufen ist.","c":false},{"t":"Solange der Angriff andauert.","c":true},{"t":"Bis ich den Angreifer der Polizei übergeben habe.","c":false}]},{"n":"5.17","k":"I","q":"Wie lange besteht eine Notwehrsituation fort?","a":[{"t":"Bis der Gegner bewusstlos bzw. geflüchtet ist.","c":false},{"t":"Solange der Angriff andauert.","c":true},{"t":"Bis ich gefahrlos dem Angriff ausweichen kann, wenn ich dadurch keine wesentlichen Rechtsgüter aufgeben muss.","c":true},{"t":"Auf jeden Fall bis die Polizei eintrifft.","c":false}]},{"n":"5.18","k":"I","q":"Was versteht man unter „Putativnotwehr“?","a":[{"t":"Überschreitung der Notwehr.","c":false},{"t":"Ein gegenwärtiger, rechtswidriger Angriff wird von einem anderen Angegriffenen abgewehrt.","c":false},{"t":"Irrtümliche Annahme einer Notwehrsituation.","c":true}]},{"n":"5.19","k":"I","q":"Worauf müssen Sie bei Notwehr vorrangig achten?","a":[{"t":"Die Unversehrtheit meines Eigentums.","c":false},{"t":"Die Verteidigung mit allen Mitteln.","c":false},{"t":"Eine angemessene Verteidigung. (Verhältnismäßigkeit)","c":true}]},{"n":"5.25","k":"I","q":"Welche Situation beurteilen Sie als Notstandslage?","a":[{"t":"Sie finden eine geladene Jagdwaffe im Wald.","c":false},{"t":"Sie werden durch ein herrenloses Tier angegriffen.","c":true},{"t":"Sie werden durch eine Person angegriffen.","c":false}]},{"n":"5.27","k":"I","q":"Welches sind die Voraussetzungen des rechtfertigenden Notstandes?","a":[{"t":"gegenwärtige, nicht mit geringerem Eingriff abwehrbare Gefahr für ein Rechtsgut; wesentliches Überwiegen des geschützten Interesses","c":true},{"t":"Absicht, die Gefahr nicht von sich oder einem anderen abzuwenden","c":false},{"t":"gegenwärtiger rechtswidriger Angriff","c":false}]},{"n":"5.29","k":"I","q":"Nothilfe ist diejenige Verteidigung, die erforderlich ist, um einen gegenwärtigen rechtswidrigen Angriff...","a":[{"t":"von sich selbst abzuwenden.","c":false},{"t":"von einem anderen abzuwenden.","c":true},{"t":"vom eigenen Auto abzuwenden.","c":false}]},{"n":"5.32","k":"I","q":"Wann ist ein Angriff gegenwärtig?","a":[{"t":"Wenn er abgeschlossen ist.","c":false},{"t":"Wenn er unmittelbar bevorsteht.","c":true},{"t":"Solange er andauert.","c":true}]},{"n":"5.33","k":"I","q":"Wann ist ein Angriff gegenwärtig?","a":[{"t":"Wenn zu befürchten ist, dass durch eine Drohung des Angreifers zukünftig eine Gefahr für Leib und Leben eintreten könnte.","c":false},{"t":"Wenn ein Angriff unmittelbar bevorsteht oder noch nicht beendet ist.","c":true},{"t":"Wenn der Angreifer in die Flucht geschlagen ist, aber mit einem späteren Angriff droht.","c":false}]},{"n":"5.34","k":"I","q":"Wann ist die Gefahr gegenwärtig?","a":[{"t":"Es kann jeden Augenblick ein Schaden eintreten.","c":true},{"t":"Es wird vielleicht ein Schaden eintreten.","c":false},{"t":"Es ist ein Schaden eingetreten.","c":false}]},{"n":"5.36","k":"I","q":"Was ist Ihre Pflicht nach einem abgewehrten Angriff?","a":[{"t":"Ich habe keinerlei Pflichten gegenüber dem Angreifer.","c":false},{"t":"Ich bin zum Schadensersatz verpflichtet.","c":false},{"t":"W
