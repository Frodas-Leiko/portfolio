enn die Notwendigkeit erkennbar und die Situation zumutbar ist, habe ich Hilfe zu leisten.","c":true}]},{"n":"5.37","k":"I","q":"Regelungen über Notwehr und Notstand finden Sie im...","a":[{"t":"Grundgesetz","c":false},{"t":"Waffengesetz","c":false},{"t":"Strafgesetzbuch / BGB","c":true}]},{"n":"5.38","k":"I","q":"Was sind u.a. Rechtfertigungsgründe nach dem Strafgesetzbuch?","a":[{"t":"Notwehr","c":true},{"t":"Nothilfe","c":true},{"t":"Notstand","c":true}]},{"n":"5.39","k":"I","q":"Welches ist das höchste Rechtsgut?","a":[{"t":"Freiheit","c":false},{"t":"Eigentum","c":false},{"t":"Leib / Leben","c":true}]},{"n":"5.40","k":"I","q":"Bei der Abwehr eines nicht auf Kommando angreifenden Hundes handeln Sie...","a":[{"t":"in Notwehr.","c":false},{"t":"in Nothilfe.","c":false},{"t":"in Notstand.","c":true}]},{"n":"5.42","k":"I","q":"Sie beobachten wie jemand mit einer Schusswaffe bedroht wird. Sie greifen mit Ihrer Schusswaffe ein. Dabei wird der Angreifer verletzt. Es stellt sich hinterher heraus, dass kein rechtswidriger Angriff vorlag, weil es sich um Filmaufnahmen handelte. Sie handelten in…","a":[{"t":"Putativnotwehr (scheinbare Notwehr).","c":true},{"t":"Notstand.","c":false},{"t":"Notwehrexzess.","c":false}]},{"n":"5.43","k":"I","q":"Eine Person bricht Ihren PKW auf. Sie sehen das vom Fenster Ihres Hauses aus und schießen. Die Person wird dabei verletzt. Wie ist die Situation zu beurteilen?","a":[{"t":"Der Einsatz der Schusswaffe war durch Notwehr gerechtfertigt.","c":false},{"t":"Die Notwehr wurde überschritten (Notwehrexzess).","c":true},{"t":"Der Einsatz der Schusswaffe war durch Nothilfe gerechtfertigt.","c":false}]},{"n":"II.03","k":"II","q":"Was sind die typischen Merkmale einer halbautomatischen Büchse?","a":[{"t":"Durch einmaliges Betätigen des Abzuges kann ich mehrere Schüsse hintereinander abgeben.","c":false},{"t":"Nach Abgabe eines Schusses wird die Büchse selbsttätig erneut schussbereit und es kann aus demselben Lauf durch erneute Betätigung des Abzuges jeweils ein weiterer Schuss abgegeben werden.","c":true},{"t":"Hierbei handelt es sich um eine Militärwaffe.","c":false}]},{"n":"II.04","k":"II","q":"Was ist der Unterschied zwischen Pistole und Revolver?","a":[{"t":"Die Pistole hat ein Patronenlager im Lauf, der Revolver hat mehrere Patronenlager in der Trommel, getrennt vom Lauf.","c":true},{"t":"Der Revolver hat einen Hahn, eine Pistole nicht.","c":false},{"t":"Pistolen sind leichter gebaut als Revolver.","c":false}]},{"n":"II.06","k":"II","q":"Was ist das typische Merkmal eines Revolvers?","a":[{"t":"Ein Magazin im Griffstück.","c":false},{"t":"Die Trommel ist zugleich Patronenlager und Magazin.","c":true},{"t":"Ein außenliegendes Schlagstück.","c":false}]},{"n":"II.07","k":"II","q":"Was ist ein typisches Merkmal einer halbautomatischen Pistole?","a":[{"t":"Trommel zur Aufnahme von Patronen","c":false},{"t":"Magazin zur Aufnahme von Patronen","c":true},{"t":"Lauf vom Patronenlager getrennt","c":false}]},{"n":"II.08","k":"II","q":"Welcher Unterschied besteht zwischen Büchse und Flinte?","a":[{"t":"Büchse für Kugelschuss, Flinte für Schrotschuss / Flintenlaufgeschosse.","c":true},{"t":"Büchsen haben Kammerstängel und Zylinderverschluss, Flinten haben immer einen Kipplauf.","c":false},{"t":"Keine Unterschiede.","c":false}]},{"n":"II.09","k":"II","q":"Besonderes Merkmal einer Flinte ist, dass. ..","a":[{"t":"mit ihr Flintenmunition verschossen wird.","c":true},{"t":"sie einen gezogenen Lauf besitzt.","c":false},{"t":"Sie einen Kipplauf besitzt.","c":false}]},{"n":"II.10","k":"II","q":"Was ist bei der Flinte der „Choke“?","a":[{"t":"Laufverengung im Bereich des Patronenlagers","c":false},{"t":"Laufverengung im Bereich der Mündung","c":true},{"t":"Rückstoß beim Schuss","c":false}]},{"n":"II.11","k":"II","q":"Welche der nachfolgenden Aussagen ist richtig?","a":[{"t":"Mit halbautomatischen Waffen kann man mehrere Schüsse aus demselben Lauf abgeben, ohne dass man Patronen per Hand nachladen muss.","c":true},{"t":"Mit halbautomatischen Waffen kann man durch einmaliges Betätigen des Abzugs mehrere Schüsse aus demselben Lauf abgeben.","c":false},{"t":"Mit halbautomatischen Waffen kann man einen Schuss abgeben, dann muss stets eine neue Patrone aus dem Magazin per Hand durchgeladen werden.","c":false}]},{"n":"II.12","k":"II","q":"Was versteht man unter dem Begriff „halbautomatische Waffe“?","a":[{"t":"Eine Waffe, die nach Abgabe eines Schusses selbsttätig erneut schussbereit wird und bei der durch nochmalige Betätigung des Abzuges ein weiterer Schuss aus demselben Lauf abgegeben werden kann.","c":true},{"t":"Eine Waffe, die nach Abgabe eines Schusses durch manuelles Vor- und Zurückziehen des Verschlusshebels die leere Patronenhülse auswirft und eine neue Patrone aus dem Magazin zuführt.","c":false},{"t":"Eine Waffe, bei der nach Abgabe eines Schusses die leere Patronenhülse automatisch ausgeworfen wird, eine neue Patrone aber manuell per Hand geladen werden muss.","c":false}]},{"n":"II.13","k":"II","q":"Was sind „wesentliche Teile“ von Schusswaffen?","a":[{"t":"Das Griffstück, oder sonstige Waffenteile von Kurzwaffen, soweit sie für die Aufnahme des Auslösemechanismus bestimmt sind.","c":true},{"t":"Das Gehäuse","c":true},{"t":"Der Verschluss","c":true},{"t":"Das Patronenoder Kartuschenlager (wenn dieses nicht bereits Bestandteil des Laufes ist)","c":true}]},{"n":"II.14","k":"II","q":"Aus welchen wesentlichen Teilen besteht eine Schusswaffe?","a":[{"t":"Lauf, Patronenlager, Verschluss, Gehäuse, Griffstück bei Kurzwaffen","c":true},{"t":"Patrone, Visierung, Abzug","c":false},{"t":"Magazin, Schaft, Schlagbolzen","c":false}]},{"n":"II.15","k":"II","q":"Was ist ein „wesentlicher Teil“ einer Schusswaffe?","a":[{"t":"Verschluss","c":true},{"t":"Abzug","c":false},{"t":"Magazin","c":false}]},{"n":"II.16","k":"II","q":"Welche der nachfolgenden Aussagen ist richtig?","a":[{"t":"Repetierwaffen haben immer ein Magazin.","c":true},{"t":"Revolver haben immer eine Trommel.","c":true},{"t":"Pistolen haben immer ein Magazin.","c":false}]},{"n":"II.17","k":"II","q":"Was versteht man bei Sportwaffen unter dem Begriff „Kleinkaliberwaffe“?","a":[{"t":"Eine Waffe in einem Kaliber unter 40 mm.","c":false},{"t":"Eine Waffe im Kaliber. 22lr (.22 lfB).","c":true},{"t":"Eine Waffe mit einer Mündungsenergie unter 7,5 Joule.","c":false}]},{"n":"II.18","k":"II","q":"Was ist ein Drilling?","a":[{"t":"Eine Repetierwaffe","c":false},{"t":"Eine halbautomatische Waffe","c":false},{"t":"Eine Einzellader-Schusswaffe","c":true}]},{"n":"II.21","k":"II","q":"Aus welchen Teilen besteht eine Zentralfeuerpatrone?","a":[{"t":"Zündhütchen, Treibladung, Hülse, Geschoss","c":true},{"t":"Pressling und Geschoss","c":false},{"t":"Hülse, Treibladung, Zündsatz","c":false}]},{"n":"II.22","k":"II","q":"Was versteht man unter Randfeuerpatronen?","a":[{"t":"Alle Patronen mit Rand.","c":false},{"t":"Alle Patronen mit Zündsatz im Hülsenrand.","c":true},{"t":"Alle Patronen mit speziellen Geschossen (z.B. Scharfrandgeschosse).","c":false}]},{"n":"II.23","k":"II","q":"Welche Zündarten gibt es?","a":[{"t":"Zentralfeuerzündung","c":true},{"t":"Randfeuerzündung","c":true},{"t":"Vorratszündung","c":false}]},{"n":"II.24","k":"II","q":"Was bedeutet „R“ bei der Patronenbezeichnung „7 x 57R“?","a":[{"t":"„R“ steht für „RASANT“.","c":false},{"t":"„R“ steht für Rand.","c":true},{"t":"„R“ steht für „Randfeuerzündung“.","c":false}]},{"n":"II.25","k":"II","q":"Welche sichtbaren Merkmale kennzeichnen eine Randfeuerpatrone?","a":[{"t":"Patrone ohne Zündhütchen","c":true},{"t":"Zündhütchen am Patronenboden","c":false},{"t":"Hülse aus Nickel","c":false}]},{"n":"II.26","k":"II","q":"Was ist eine Pufferpatrone?","a":[{"t":"Eine Platzpatrone.","c":false},{"t":"Eine Patrone mit besonders geringer Treibladung.","c":false},{"t":"Eine Patrone ohne Zündhütchen und ohne Ladung zum Üben.","c":true}]},{"n":"II.27","k":"II","q":"Was bedeutet die Bezeichnung „Magnum“?","a":[{"t":"Es handelt sich um eine ausländische Patrone.","c":false},{"t":"Eine in ihrer Kaliberklasse besonders starke Patrone.","c":true},{"t":"Eine Patrone mit übergroßem Durchmesser.","c":false}]},{"n":"II.29","k":"II","q":"Was bedeutet die Zahl 12 bei Schrotpatronen?","a":[{"t":"Der Durchmesser des Laufs beträgt 12 mm.","c":false},{"t":"In der Schrotpatrone befinden sich 12 gleich große Kugeln.","c":false},{"t":"Die Zahl 12 ergibt sich aus der Anzahl der Bleikugeln vom Laufinnendurchmesser, die zusammen die Masse von einem englischen Pfund (453,6g) ergeben.","c":true}]},{"n":"II.30","k":"II","q":"Schrotmunition im Kaliber 16 …","a":[{"t":"ist größer als Kaliber 12.","c":false},{"t":"ist kleiner als Kaliber 12.","c":true},{"t":"entspricht dem internationalen Kalibermaß 2 x 8 mm.","c":false}]},{"n":"II.31","k":"II","q":"Was bezeichnet die Zahl „12“ bei dem entsprechenden Flintenkaliber?","a":[{"t":"Den Innendurchmesser des Laufes in Millimetern.","c":false},{"t":"Den Innendurchmesser des Laufes in Zoll (Inch).","c":false},{"t":"Der Innendurchmesser des Laufes entspricht dem Durchmesser einer Bleikugel mit dem Gewicht eines zwölftel (1/12) Pfundes (englisches Maß, ca. 454 Gramm) Blei -> es handelt sich also um einen „Zwölftelpfünder“.","c":true}]},{"n":"II.32","k":"II","q":"Woran erkennt man die für eine Waffe zugelassene Munition?","a":[{"t":"Wenn die Angaben auf der kleinsten Verpackungseinheit mit den Angaben auf der Waffe übereinstimmen.","c":true},{"t":"Wenn man die Munition von einem Sportwaffenhändler hat.","c":false},{"t":"Wenn sie ins Patronenlager eingeführt werden kann.","c":false}]},{"n":"II.33","k":"II","q":"Welche der folgenden Aussagen über Schalldämpfer ist richtig?","a":[{"t":"Ein Schalldämpfer verringert den Mündungsknall.","c":true},{"t":"Ein Schalldämpfer kann die Mündungsgeschwindigkeit des Geschosses beeinflussen.","c":true},{"t":"Ein Schalldämpfer kann die Präzision der Waffe beeinflussen.","c":true}]},{"n":"II.34","k":"II","q":"Was bewirkt ein Schalldämpfer?","a":[{"t":"Er verringert den Mündungsknall beim Schuss.","c":true},{"t":"Er verstärkt den Rückstoß beim Schuss.","c":false},{"t":"Er verringert den Geschossknall.","c":false}]},{"n":"II.36","k":"II","q":"Was bewirkt ein Schalldämpfer nicht?","a":[{"t":"Er verringert den Mündungsknall beim","c":false},{"t":"Er verstärkt den Rückstoß beim Schuss.","c":true},{"t":"Er verringert den Geschossknall.","c":true}]},{"n":"II.37","k":"II","q":"Was versteht man unter einem Kompensator?","a":[{"t":"Eine Vorrichtung am Waffenlauf, die das Hochschlagen beim Schuss verringern soll.","c":true},{"t":"Eine Vorrichtung im Verschluss von halbautomatischen Waffen, die den Rückstoß verringern soll.","c":false},{"t":"Eine Vorrichtung am Magazin, die dessen Kapazität erhöht.","c":false}]},{"n":"II.38","k":"II","q":"Was versteht man unter einem Einstecklauf?","a":[{"t":"Wechsellauf, der anstelle des Laufes in die Verschlusshülse der Waffe eingesetzt und durch Einstecken befestigt wird.","c":false},{"t":"Ein Lauf ohne eigenen Verschluss, der in die Läufe von Waffen größeren Kalibers eingesteckt werden kann.","c":true},{"t":"Ein Lauf mit eigenem Verschluss, der in die Läufe von Waffen größeren Kalibers eingesteckt werden kann.","c":false}]},{"n":"II.39","k":"II","q":"Was versteht man unter einem Nachtzielgerät?","a":[{"t":"Ein Gerät, das mit Montagevorrichtung für Schusswaffen versehen ist und durch Bildwandler oder mittels elektronischer Verstärkung ein Zielen bei Nacht ermöglicht.","c":true},{"t":"Ein Zielfernrohr mit besonders großen Linsen, das ein Erkennen des Zieles auch bei schlechten Lichtverhältnissen ermöglicht.","c":false},{"t":"Eine selbstleuchtende oder fluoreszierende Visiereinrichtung, die ein Zielen auch bei Dunkelheit ermöglicht.","c":false}]},{"n":"II.40","k":"II","q":"Was versteht man unter Kaliber?","a":[{"t":"Den Außendurchmesser eines Laufes.","c":false},{"t":"Den Innendurchmesser des Laufes.","c":true},{"t":"Den Durchmesser des Einzelgeschosses.","c":true}]},{"n":"II.42","k":"II","q":"Was versteht man unter Kaliber?","a":[{"t":"Durchmesser der Hülse","c":false},{"t":"Innendurchmesser des Laufes","c":true},{"t":"Außendurchmesser des Laufes","c":false}]},{"n":"II.43","k":"II","q":"Darf Munition im Kaliber. 22lr auch aus Kurzwaffen verschossen werden?","a":[{"t":"Ja","c":true},{"t":"Nur mit Genehmigung des Schießleiters.","c":false},{"t":"Nein","c":false}]},{"n":"II.44","k":"II","q":"Warum ist z.B. die Munitionsbezeichnung „9 mm“ nicht ausreichend?","a":[{"t":"Weil es verschiedene 9 mm-Patronen gibt.","c":true},{"t":"Weil die Kaliberangabe in der Regel nie ganz exakt ist, sondern auf gerundeten Werten beruht.","c":false},{"t":"Weil die Kaliberangabe keine Information über die zulässigen Treibladungsmittel (Schwarzoder Nitrozellulosepulver) enthält.","c":false}]},{"n":"II.45","k":"II","q":"Was versteht man unter Double-Action-Only Pistolen?","a":[{"t":"Pistolen, deren Abzug jedes Mal vorgespannt werden muss.","c":false},{"t":"Pistolen, bei denen nur der erste Schuss mittels Spannabzug abgefeuert wird.","c":false},{"t":"Pistolen, bei denen jeder Schuss mittels Spannabzug abgefeuert wird.","c":true}]},{"n":"II.46","k":"II","q":"Welche der nebenstehenden Schusswaffen können auch halbautomatische Waffen sein?","a":[{"t":"Büchsen","c":true},{"t":"Doppelflinten","c":false},{"t":"Pistolen","c":true}]},{"n":"II.47","k":"II","q":"Was versteht man unter dem Begriff „Double-Action-Pistole“?","a":[{"t":"Eine Waffe mit Spannabzug (auch im entspannten Zustand kann durch Betätigen des Abzugs ein Schuss abgegeben werden).","c":true},{"t":"Eine Waffe, die für mindestens zwei Schießsportdisziplinen zugelassen ist.","c":false},{"t":"Eine Waffe, bei der durch Betätigen der Sicherung im gespannten Zustand sowohl der Hahn (das Schlagstück) entspannt, als auch der Schlagbolzen gesichert wird.","c":false}]},{"n":"II.48","k":"II","q":"Bei einem Teilmantelgeschoss...","a":[{"t":"liegt in der Regel an der Spitze der Bleikern frei.","c":true},{"t":"ist das Geschoss immer verkupfert.","c":false},{"t":"liegt nur am Geschossboden der Bleikern frei.","c":false}]},{"n":"II.49","k":"II","q":"Welche Läufe weisen Züge und Felder auf?","a":[{"t":"Glatte Läufe","c":false},{"t":"Gezogene Läufe","c":true},{"t":"Polygonläufe","c":false}]},{"n":"II.50","k":"II","q":"Züge und Felder sind typische Merkmale von...","a":[{"t":"gezogenen Läufen.","c":true},{"t":"glatten Läufen.","c":false},{"t":"gezogenen wie glatten Läufen.","c":false}]},{"n":"II.51","k":"II","q":"Das Feldkaliber ist im Verhältnis zum Zugkaliber…","a":[{"t":"größer.","c":false},{"t":"kleiner.","c":true},{"t":"gleich groß.","c":false}]},{"n":"II.52","k":"II","q":"Müssen Pistolen manuelle Sicherungen haben?","a":[{"t":"Auf jeden Fall.","c":false},{"t":"Nein","c":true},{"t":"Nur halbautomatische Pistolen.","c":false}]},{"n":"II.55","k":"II","q":"Wozu dient der Verschluss?","a":[{"t":"Er soll die Waffe gegen Wegnahme sichern.","c":false},{"t":"Er soll den Rückstoß mindern.","c":false},{"t":"Er soll das Patronenlager nach hinten abschließen.","c":true}]},{"n":"II.56","k":"II","q":"Bei einer halbautomatischen Waffe können mehrere Schüsse abgefeuert werden...","a":[{"t":"durch jeweiliges Betätigen des Abzuges.","c":true},{"t":"durch einmaliges Betätigen des Abzuges.","c":false},{"t":"nach erneutem manuellen Spannen.","c":false}]},{"n":"II.57","k":"II","q":"Was ist ein Einstecklauf und welchen Zweck hat er?","a":[{"t":"Ein Einstecklauf ist ein Lauf ohne eigenen Verschluss, der in einen Lauf von Waffen größeren Kalibers eingesteckt werden kann, um Munition mit einem kleineren Kaliber verschießen zu können.","c":true},{"t":"Ein Einstecklauf ist ein Lauf mit eigenem Verschluss, mit dem ein kleineres oder größeres Kaliber verschossen werden kann.","c":false}]},{"n":"II.58","k":"II","q":"Wie ist in der Regel die Schussfolge bei Bockflinten beim nicht umschaltbaren Einzelabzug?","a":[{"t":"oben / unten","c":false},{"t":"unten / oben","c":true},{"t":"rechts / links","c":false}]},{"n":"II.59","k":"II","q":"Wie groß ist die (ungefähre) Anfangsgeschwindigkeit der Geschosse mittlerer Büchsenkaliber für Zentralfeuerpatronen?","a":[{"t":"200 - 300 m/s","c":false},{"t":"700 – 1000 m/s","c":true},{"t":"1500 – 1700 m/s","c":false}]},{"n":"II.60","k":"II","q":"Was bezeichnet in der Ballistik das Kürzel „v“?","a":[{"t":"Geschossenergie","c":false},{"t":"Höchstreichweite des Geschosses","c":false},{"t":"Geschossgeschwindigkeit","c":true}]},{"n":"II.61","k":"II","q":"Was bedeutet die Bezeichnung „v “? o","a":[{"t":"Die Fluggeschwindigkeit rotierender Schrote nahe dem Nullpunkt.","c":false},{"t":"Die Geschossgeschwindigkeit reduziert sich auf Null.","c":false},{"t":"Die Geschossgeschwindigkeit beim Verlassen der Mündung.","c":true}]},{"n":"II.62","k":"II","q":"Was bedeutet der ballistische Begriff „v₁₀₀“?","a":[{"t":"Geschossgeschwindigkeit 100 Meter vor der Mündung.","c":true},{"t":"Gefahrenbereich des Geschosses bei 100 Metern.","c":false},{"t":"Geschossenergie 100 Meter vor der Mündung.","c":false}]},{"n":"II.63","k":"II","q":"Die Faustregel für die Reichweite von Schroten in Metern beträgt...","a":[{"t":"1000 x Schrotgröße in mm.","c":false},{"t":"100 x Schrotgröße in mm.","c":true},{"t":"10 x Schrotgröße in mm.","c":false}]},{"n":"II.64","k":"II","q":"Welches Geschoss hat die größte Durchschlagskraft?","a":[{"t":"Bleigeschoss","c":false},{"t":"Vollmantelgeschoss","c":true},{"t":"Teilmantelgeschoss","c":false}]},{"n":"II.65","k":"II","q":"Was versteht man unter der Höchstreichweite eines Geschosses?","a":[{"t":"Die Strecke zwischen Schützenstand und Geschossfang.","c":false},{"t":"Das Produkt aus Treibladung und Geschossgewicht.","c":false},{"t":"Die Entfernung zwischen Laufmündung und maximal entferntem Auftreffpunkt des Geschosses.","c":true}]},{"n":"II.66","k":"II","q":"Der Gefährdungsbereich von Geschossen der Patrone im Kaliber. 300 WinMag beträgt...","a":[{"t":"3000 m.","c":false},{"t":"5000 m.","c":true},{"t":"7000 m.","c":false}]},{"n":"II.67","k":"II","q":"Welche Höchstreichweite haben Geschosse der Patrone im Kaliber. 44 Rem. Mag.?","a":[{"t":"1500 m","c":false},{"t":"3000 m","c":false},{"t":"2000 m","c":true}]},{"n":"II.68","k":"II","q":"Welche Höchstreichweite haben Geschosse der Patrone im Kaliber 9mmLuger?","a":[{"t":"1500 m.","c":false},{"t":"2000 m.","c":true},{"t":"1000 m.","c":false}]},{"n":"II.69","k":"II","q":"Wie groß ist der Gefährdungsbereich der Schrote bei einer Korngröße von 2 mm Durchmesser?","a":[{"t":"150 m","c":false},{"t":"200 m","c":true},{"t":"250 m","c":false}]},{"n":"II.70","k":"II","q":"Die Höchstreichweite eines Geschosses im Kaliber. 22lr beträgt ca.. ..","a":[{"t":"1000 m.","c":false},{"t":"1500 m.","c":true},{"t":"2000 m.","c":false}]},{"n":"II.71","k":"II","q":"Die Höchstreichweite oder Reichweite von ca. 1500 m kann erreicht werden von einem Geschoss der Patrone...","a":[{"t":".22lr","c":true},{"t":".32 S&W Long N.P. (Wadcutter).","c":false},{"t":"9 mm Luger.","c":true}]},{"n":"II.72","k":"II","q":"Was versteht man unter Gefährdungsbereich eines Geschosses?","a":[{"t":"Die Höchstreichweite","c":true},{"t":"Den Streukreis","c":false},{"t":"Die günstigste Schussentfernung","c":false}]},{"n":"II.74","k":"II","q":"Welcher Begriff gehört nicht zur Ballistik?","a":[{"t":"Gasdruck","c":false},{"t":"Geschossflugbahn","c":false},{"t":"Abzugsgewicht","c":true}]},{"n":"II.75","k":"II","q":"Womit befasst sich u.a. die Außenballistik?","a":[{"t":"Mit Wettereinflüssen","c":true},{"t":"Mit der Geschossflugbahn","c":true},{"t":"Mit der Geschossform","c":true}]},{"n":"II.76","k":"II","q":"Womit befasst sich u.a. die Innenballistik?","a":[{"t":"Mit dem rotationslosen Geschossweg.","c":true},{"t":"Mit der Strecke zwischen Patronen-lager und Auftreffpunkt.","c":false},{"t":"Mit dem Gasdruckverlauf.","c":true}]},{"n":"II.77","k":"II","q":"Was versteht man unter der Streuung der Geschosse?","a":[{"t":"Eine schlechte Schießleistung.","c":false},{"t":"Die Abweichung einer Reihe von Treffern zueinander bei gleichem Haltepunkt.","c":true},{"t":"Die Verformung des Geschosses beim Aufprall.","c":false}]},{"n":"II.78","k":"II","q":"Welche Flugbahnbeschreibung ist richtig?","a":[{"t":"Das Geschoss beschreibt auf seiner Flugbahn eine ungleichförmige Kurve, die mit zunehmender Entfernung von der Mündung immer steiler abfällt.","c":true},{"t":"Das Geschoss steigt auf seiner Flugbahn bis zur Mitte auf und fällt zum Ziel ebenso ab.","c":false},{"t":"Die Visierlinie ist gleichzeitig auch die Flugbahn des Geschosses.","c":false}]},{"n":"II.79","k":"II","q":"Was bedeutet der ballistische Begriff „Steighöhe eines Geschosses“?","a":[{"t":"Die maximale Höhe eines Geschosses in der sogenannten „ballistischen Kurve“.","c":false},{"t":"Gefahrenbereich des Geschosses bei höchster Steigung.","c":false},{"t":"Die Entfernung zwischen Laufmündung und Scheitelpunkt der Geschossbahn bei senkrecht nach oben abgegebenem Schuss.","c":true}]},{"n":"II.80","k":"II","q":"Was bedeutet der ballistische Begriff „E₀“?","a":[{"t":"Geschossgeschwindigkeit auf 100 m.","c":false},{"t":"Steighöhe des Geschosses (Gefahrenbereich).","c":false},{"t":"Bewegungsenergie des Geschosses beim Verlassen des Laufes.","c":true}]},{"n":"II.81","k":"II","q":"Wovon hängt die Eindringtiefe eines Geschosses ab?","a":[{"t":"Je geringer das Geschossgewicht und die -härte, desto tiefer das Eindringen.","c":false},{"t":"Je größer die Querschnittsbelastung, je härter das Geschoss, desto tiefer das Eindringen bei gleicher Auftreffenergie und gleichem Zielmedium.","c":true},{"t":"Je schwerer und stumpfer das Geschoss, desto größer ist die Geschwindigkeit und das Eindringen.","c":false}]},{"n":"II.82","k":"II","q":"Was bewirkt der Drall?","a":[{"t":"Das Flugverhalten des Geschosses wird erheblich stabilisiert.","c":true},{"t":"Die Reichweite des Geschosses verkürzt sich erheblich.","c":false},{"t":"Die Bewegungsenergie des Geschosses erhöht sich erheblich.","c":false}]},{"n":"II.84","k":"II","q":"Was versteht man unter der Länge des Dralls?","a":[{"t":"Die Länge eines gezogenen Laufes.","c":false},{"t":"Die Strecke, auf der sich das Geschoss einmal um seine eigene Längsachse dreht.","c":true},{"t":"Die Länge eines speziell gehärteten Laufes einer Schusswaffe.","c":false}]},{"n":"II.85","k":"II","q":"Was bedeutet der ballistische Begriff „Geschossrotation“?","a":[{"t":"Fluggeschwindigkeit rotierender Schrote.","c":false},{"t":"Die mathematisch festgelegte Energie des rotierenden Geschosses bei verlassen des Laufes.","c":false},{"t":"Die Drehung des Geschosses um seine Längsachse.","c":true}]},{"n":"II.86","k":"II","q":"Wodurch wird der Geschossknall erzeugt?","a":[{"t":"Das verbrannte Pulver erzeugt den Knall im Inneren der Schusswaffe.","c":false},{"t":"Durch die Expansion der vor dem Geschoss komprimierten Luft bei überschallschnellen Geschossen.","c":true},{"t":"Das nicht vollständig verbrannte Pulvergas vermischt sich mit Sauerstoff und bewirkt den Knall.","c":false}]},{"n":"II.87","k":"II","q":"Wodurch entsteht der Mündungsknall?","a":[{"t":"Durch die mit Überschallgeschwindigkeit austretenden Gase.","c":true},{"t":"Die dem Geschoss folgenden Pulvergase stoßen auf die kalte Umgebungsluft.","c":false},{"t":"Durch das nicht vollständig verbrannte Pulver.","c":false}]},{"n":"II.88","k":"II","q":"Warum weisen Langwaffenläufe im Bereich des Patronenlagers stärkere Wandungen auf als im vorderen Laufteil?","a":[{"t":"Damit eine bessere Montage der Visiereinrichtung erfolgen kann.","c":false},{"t":"Weil in diesem Bereich der höchste Gasdruck auftritt.","c":true},{"t":"Weil in diesem Bereich Hersteller, Beschusszeichen und Nummer am besten sichtbar angebracht werden können.","c":false}]},{"n":"II.89","k":"II","q":"Was verstehen Sie unter dem Begriff „Basküle“?","a":[{"t":"Visiereinrichtung für Spezialgewehre","c":false},{"t":"Vorderschaft einer „Pump Action“","c":false},{"t":"Verschlusskasten einer Kipplaufwaffe","c":true}]},{"n":"II.91","k":"II","q":"Wie wird eine Schusswaffe dauerhaft unbrauchbar gemacht, um sie ohne Erwerbsberechtigung erwerben zu können? (sog. Dekorationswaffe)","a":[{"t":"Ein Büchsenmacher macht mehrere wesentliche Teile dauerhaft unbrauchbar und bringt sein Markenzeichen auf der Dekorationswaffe an.","c":false},{"t":"Ein Waffenhändler macht alle wesentlichen Teile vorübergehend unbrauchbar und bringt ein Beschusszeichen auf der Dekorationswaffe anbringen.","c":false},{"t":"Der Inhaber einer Waffenbearbeitungsoder Waffenherstellungserlaubnis macht alle wesentlichen Teile gemäß den Vorgaben der Durchführungsverordnung (EU) 2015/2403 (Deaktivierungsdurchführungsverordnung) unbrauchbar und lässt vom Beschussamt das Zulassungszeichen anbringen. Das Beschussamt stellt überdies eine Deaktivierungsbescheinigung aus.","c":true}]},{"n":"II.92","k":"II","q":"Wann sind Feuerwaffen oder deren wesentliche Teile dauerhaft unbrauchbar gemacht?","a":[{"t":"Wenn die Waffe mit einem Blockiersystem vorübergehend blockiert wurde.","c":false},{"t":"Wenn sie gemäß ihrem Waffentyp und in jedem wesentlichen Bestandteil den Maßgaben Durchführungsverordnung (EU) 2015/2403 (Deaktivierungsdurchführungsverordnung) entsprechen.","c":true},{"t":"Wenn der Lauf der Waffe verzogen ist.","c":false}]},{"n":"III.01","k":"III","q":"Darf eine Schusswaffe, auch wenn sie ungeladen ist, auf Menschen gerichtet werden?","a":[{"t":"Niemals","c":false},{"t":"Ja","c":false},{"t":"Nein, außer bei Notwehr.","c":true}]},{"n":"III.02","k":"III","q":"Wie soll eine Schusswaffe an eine andere Person übergeben werden?","a":[{"t":"geladen, gesichert","c":false},{"t":"geladen, ungesichert","c":false},{"t":"ungeladen","c":true}]},{"n":"III.03","k":"III","q":"Mit welchen Waffen darf man auf seinem befriedeten Grundstück schießen, wenn sichergestellt ist, dass die Geschosse das Grundstück nicht verlassen können und niemand durch Lärm behindert oder belästigt wird?","a":[{"t":"Druckluftwaffen mit dem Zulassungszeichen „F im Fünfeck“ und Softairwaffen.","c":true},{"t":"Mit Waffen für Randfeuermunition bis Kaliber. 22lr (= lfB).","c":false},{"t":"Mit Waffen (z.B. im „Kleinstkaliber“ 4 mm M20), sofern diese das Zulassungszeichen „F im Fünfeck“ und das Zulassungszeichen „PTB im Viereck“ tragen.","c":true}]},{"n":"III.04","k":"III","q":"Wie sollte man Munition im Bedarfsfall ordnungsgemäß entsorgen?","a":[{"t":"In den Hausmüll werfen.","c":false},{"t":"Beim Waffenhändler abgeben.","c":true},{"t":"In den Sondermüll geben.","c":false}]},{"n":"III.05","k":"III","q":"Welche Munition dürfen Sie aus Ihrer Waffe verschießen?","a":[{"t":"Alles, was ins Patronenlager passt.","c":false},{"t":"Munition, für die diese Waffe konstruiert und zugelassen ist.","c":true},{"t":"Nur Zentralfeuermunition","c":false}]},{"n":"III.06","k":"III","q":"Wie darf unbrauchbar gewordene Munition entsorgt werden?","a":[{"t":"Geschoss abziehen, Pulver in Wasser auflösen, Rest in Hausmüll geben.","c":false},{"t":"Als Sondermüll / Gefahrstoff bei der örtlichen Annahmestelle abgeben.","c":false},{"t":"An den Verkäufer / Hersteller oder einen Delaborierbetrieb geben.","c":true}]},{"n":"III.07","k":"III","q":"Wie viel Munition darf mit einer Waffenbesitzkarte bei entsprechender Munitionserwerbsberechtigung erworben werden (ungeachtet von Transportbeschränkungen)?","a":[{"t":"bis zu 1000 Patronen je Kauf / Lieferung","c":false},{"t":"bis zu 5 kg Nettoexplosivmasse je Kauf / Lieferung","c":false},{"t":"unbegrenzt","c":true}]},{"n":"III.09","k":"III","q":"Wie soll eine halbautomatische Pistole auf der Schießstätte an eine andere Person übergeben werden?","a":[{"t":"Die geladene Waffe ist zu sichern, der Ladezustand ist mitzuteilen.","c":false},{"t":"Aus der geladenen Waffe ist das Magazin zu entnehmen, der Ladezustand ist mitzuteilen.","c":false},{"t":"Ungeladen, mit geöffnetem Verschluss.","c":true}]},{"n":"III.10","k":"III","q":"Was sollte als erstes geschehen, wenn man eine Schusswaffe übergeben bekommt?","a":[{"t":"Die Waffe ist sofort auf ihren Ladezustand zu überprüfen.","c":true},{"t":"Es genügt die Sicherung der Waffe auf ihre Funktionssicherheit zu prüfen.","c":false},{"t":"Die Waffe ist sofort zu zerlegen und auf Beschädigungen zu prüfen. Außerdem sollten die Beschusszeichen in Augenschein genommen werden.","c":false}]},{"n":"III.11","k":"III","q":"Was haben Sie zu tun, bevor Sie mit einer Schusswaffe schießen?","a":[{"t":"Waffe auf sichtbare Beschädigungen prüfen.","c":true},{"t":"Überprüfen, ob das Patronenlager und der Lauf frei von Fremdkörpern sind.","c":true},{"t":"Prüfen, ob die bereitgestellte Munition aus dieser Waffe verschossen werden darf.","c":true}]},{"n":"III.12","k":"III","q":"Wo darf ein Sportschütze seine Waffe laden?","a":[{"t":"Nur auf dem Schützenstand.","c":true},{"t":"Auf dem gesamten Schießstand.","c":false},{"t":"Im Aufenthaltsraum.","c":false}]},{"n":"III.13","k":"III","q":"Darf ausnahmsweise eine geladene Waffe einem anderen übergeben werden?","a":[{"t":"Ja, bei Waffenstörung der verantwortlichen Aufsichtsperson.","c":true},{"t":"Nur an den Nachbarschützen.","c":false},{"t":"Nein, auf keinen Fall.","c":false}]},{"n":"III.14","k":"III","q":"Dürfen Sie mit einem Druckluftgewehr (E₀ max. 7,5 J) in Ihrem Keller schießen, wenn sichergestellt ist, dass hierbei niemand gefährdet wird?","a":[{"t":"Das ist waffenrechtlich erlaubt.","c":true},{"t":"Nein, das ist verboten.","c":false},{"t":"Nein, ich darf nur mit sogenannten Spielgeräten (Energie 0,08 J) außerhalb von Schießständen schießen.","c":false}]},{"n":"III.15","k":"III","q":"Darf mit jeder beliebigen Waffe auf Schießstätten geschossen werden?","a":[{"t":"Ja, wenn sie funktionssicher sind.","c":false},{"t":"Nein.","c":true}]},{"n":"III.16","k":"III","q":"Den Anordnungen der verantwortlichen Aufsichtsperson auf dem Schießstand ist Folge zu leisten:","a":[{"t":"Nur im Wettkampf.","c":false},{"t":"Nur bei Gefahr im Verzug.","c":false},{"t":"Immer","c":true}]},{"n":"III.17","k":"III","q":"Darf eine verantwortliche Aufsichtsperson am Schützenstand dem Schützen im Rahmen der Ausbildung eine geladene Waffe übergeben?","a":[{"t":"Ja, da er umfangreiche Fachkenntnisse besitzt.","c":false},{"t":"Nein, geladene Waffen dürfen nicht übergeben werden.","c":true},{"t":"Ja, wenn er Anfänger unterweist.","c":false}]},{"n":"III.18","k":"III","q":"Wie ist eine Kipplaufflinte auf einer Schießstätte zu tragen?","a":[{"t":"Gesichert, mit einem Tragriemen auf der Schulter.","c":false},{"t":"Ungeladen, mit geöffnetem Verschluss.","c":true},{"t":"Geschlossen und gesichert.","c":false}]},{"n":"III.19","k":"III","q":"Wie sind Kleinkalibergewehre auf dem Schießstand abzulegen?","a":[{"t":"Entladen, mit geöffnetem Verschluss, Magazin entnommen.","c":true},{"t":"Unterladen, mit der Mündung nach oben.","c":false},{"t":"Gesichert, mit geschlossenem Verschluss.","c":false}]},{"n":"III.20","k":"III","q":"Darf ich eine fremde Schusswaffe auf dem Schützenstand in die Hand nehmen?","a":[{"t":"Nur mit Erlaubnis des Besitzers.","c":true},{"t":"Nur mit Erlaubnis des Schießleiters.","c":false},{"t":"Ja, wenn sie entladen ist, immer.","c":false}]},{"n":"III.21","k":"III","q":"Dürfen Sie zur Scheibenbeobachtung eine geladene Schusswaffe ablegen?","a":[{"t":"Ja, wenn die Schusswaffe gesichert ist.","c":false},{"t":"Nur mit Erlaubnis des Schießleiters.","c":false},{"t":"Nein, nur die entladene und geöffnete Waffe darf abgelegt werden.","c":true}]},{"n":"III.22","k":"III","q":"Wann darf mit dem Schießen begonnen werden?","a":[{"t":"Wenn sich niemand mehr vor dem Ziel aufhält.","c":false},{"t":"Wenn die verantwortliche Aufsichtsperson das Schießen freigegeben hat.","c":true},{"t":"Wenn alle Schützenstände belegt sind.","c":false}]},{"n":"III.23","k":"III","q":"Darf ohne waffenrechtliche Erlaubnis Munition auf einer Schießstätte zum Schießen überlassen werden?","a":[{"t":"Ja, nur einem Mitglied des Schützenvereins.","c":false},{"t":"Ja, aber nur zum sofortigen Verbrauch.","c":true},{"t":"Nein","c":false}]},{"n":"III.24","k":"III","q":"Ist es zulässig im Aufenthaltsraum Anschlagübungen mit Schusswaffen zu machen?","a":[{"t":"Ja, dies ist nur nach Anleitung des Schießleiters zulässig.","c":false},{"t":"Ja, wenn eine entsprechende Ladeecke eingerichtet wurde.","c":false},{"t":"Nein, dies ist nur auf dem Schützenstand erlaubt.","c":true}]},{"n":"III.25","k":"III","q":"Darf einem Gastschützen, der nicht im Besitz einer waffenrechtlichen Erlaubnis ist, eine erlaubnispflichtige Schusswaffe überlassen werden?","a":[{"t":"Ja, aber nur zur Mitnahme nach Hause.","c":false},{"t":"Ja, nur zum Schießen auf einer Schießstätte.","c":true},{"t":"Nein, unter keinen Umständen.","c":false}]},{"n":"III.26","k":"III","q":"Wie sind Schusswaffen auf dem Schießstand aus der Hand zu legen?","a":[{"t":"Geladen, entspannt und gesichert.","c":false},{"t":"Entladen, nur mit leerem Magazin, Verschluss geschlossen.","c":false},{"t":"Verschluss offen, Lauf Richtung Geschoßfang, leeres Patronenlager, leeres Magazin (entfernt von Waffe).","c":true}]},{"n":"III.27","k":"III","q":"Was ist beim Schießen mit einer halbautomatischen Pistole hinsichtlich der Schussbereitschaft zu beachten?","a":[{"t":"Die Waffe ist nach jedem Schuss wieder schussbereit, solange sich Patronen im Magazin befinden.","c":true},{"t":"Nichts besonderes, wenn die Waffe eine Sicherung hat.","c":false},{"t":"Die Waffe ist sofort nach Schussabgabe zu sichern.","c":false}]},{"n":"III.28","k":"III","q":"Darf mit einem Gewehr im Kaliber. 22lr im befriedeten Besitztum geschossen werden?","a":[{"t":"Nein.","c":true},{"t":"Ja, wenn die Geschosse das Grundstück nicht verlassen können.","c":false},{"t":"Ja, wenn Personen oder Sachen nicht gefährdet werden können.","c":false}]},{"n":"III.29","k":"III","q":"Mit welchen Schusswaffen darf im befriedeten Besitztum außerhalb von Schießstätten ohne Schießerlaubnis geschossen werden?","a":[{"t":"Nur mit schallgedämpften Waffen (Immissionsschutz).","c":false},{"t":"Mit allen, vorausgesetzt es ist ein ausreichender Kugelfang vorhanden, so dass die Geschosse das Besitztum nicht verlassen können.","c":false},{"t":"Mit bauartzugelassenen Schusswaffen, deren Geschossen eine Energie von max. 7,5 Joule erteilt wird und die Geschosse das Besitztum nicht verlassen können.","c":true}]},{"n":"III.30","k":"III","q":"Was ist beim sportlichen Schießen auf Schießstätten zu beachten?","a":[{"t":"Es darf nur unter Aufsicht geschossen werden (ausgenommen die zur Aufsichtsführung befähigte Person schießt alleine).","c":true},{"t":"Es darf nur mit für den Stand zugelassenen Waffen und Munition geschossen werden.","c":true},{"t":"Sportliches Schießen liegt dann vor, wenn nach festen Regeln einer genehmigten Sportordnung geschossen wird.","c":true}]},{"n":"III.31","k":"III","q":"Welche Voraussetzungen müssen erfüllt sein, bevor der Schießbetrieb aufgenommen werden darf?","a":[{"t":"Eine verantwortliche Aufsichtsperson muss anwesend sein.","c":true},{"t":"Die Waffen müssen geladen werden.","c":false},{"t":"Waffen und Munition müssen der Standzulassung entsprechen.","c":true}]},{"n":"III.32","k":"III","q":"Darf unter Alkoholeinfluss geschossen werden?","a":[{"t":"Nein","c":true},{"t":"Ja, weil Alkohol beim Zielen hilft.","c":false},{"t":"Ja, aber nur mit Langwaffen.","c":false}]},{"n":"III.33","k":"III","q":"Wie sind Schusswaffen und Munition während des Aufenthaltes auf Schießstätten außerhalb des Schießens aufzubewahren?","a":[{"t":"Auf Schießstätten ist eine Aufbewahrung nicht zu beachten.","c":false},{"t":"Ungeladen und getrennt von der Munition.","c":true},{"t":"So, dass sie nicht in den Besitz Unberechtigter gelangen können.","c":true}]},{"n":"III.34","k":"III","q":"Was besagt der Begriff Gefahrenbereich?","a":[{"t":"In diesem Bereich darf auf dem Schießstand nicht geschossen werden.","c":false},{"t":"Schützen, die mit großkalibrigen Waffen schießen, haben einen Gefahrenbereich von 4 m. In diesem Bereich darf sich kein Zuschauer aufhalten.","c":false},{"t":"Es handelt sich hierbei um die Höchstreichweite von aus Schusswaffen abgefeuerten Geschossen.","c":true}]},{"n":"III.35","k":"III","q":"Was versteht man unter Gefahrenbereich?","a":[{"t":"Die Höchstreichweite von aus Schusswaffen abgefeuerten Geschossen.","c":true},{"t":"Der Bereich, in dem Menschen oder Sachen gefährdet werden können.","c":true},{"t":"Der unmittelbare Bereich hinter dem Schützen.","c":false}]},{"n":"III.36","k":"III","q":"Darf mit einem Gewehr (im Kaliber. 308Win) mit Einstecklauf (im Kaliber. 22lr) auf einem 50 m KK-Stand geschossen werden?","a":[{"t":"Ja, aber nur mit Zentralfeuerpatronen.","c":false},{"t":"Nein","c":false},{"t":"Ja, wenn der Einstecklauf bauartzugelassen ist.","c":true}]},{"n":"III.37","k":"III","q":"Eine halbautomatische Pistole entlade ich, indem ich. ..","a":[{"t":"den Verschluss öffne und das Magazin entleere.","c":false},{"t":"den Verschluss öffne, das Patronenlager entferne, den Verschluss schließe und das Magazin entnehme.","c":false},{"t":"das Magazin entnehme, den Verschluss öffne und das Patronenlager entleere.","c":true}]},{"n":"III.38","k":"III","q":"In welcher Reihenfolge werden halbautomatische Waffen entladen?","a":[{"t":"Erst nachsehen, ob das Patronenlager frei ist, dann das Magazin entnehmen und durch Abdrücken das Schlagstück entspannen.","c":false},{"t":"Erst das Magazin entnehmen, Verschluss öffnen, dann das Patronenlager überprüfen; wenn leer, die Waffe, soweit möglich, mit offenem Verschluss ablegen.","c":true},{"t":"Erst entspannen, sichern, das Magazin entnehmen, ablegen.","c":false}]},{"n":"III.39","k":"III","q":"Wie ist ein Revolver im Kaliber. 357 Mag. zu entladen?","a":[{"t":"Trommel ausbauen","c":false},{"t":"1.Trommel ausschwenken bzw. Ladeklappe öffnen 2. alle Kammern entleeren","c":true},{"t":"Trommel ausschwenken und eine volle Patrone entnehmen","c":false}]},{"n":"III.40","k":"III","q":"Was ist hinsichtlich der Schussbereitschaft mehrläufiger Waffen zu beachten?","a":[{"t":"Wegen der automatischen Sicherung nichts.","c":false},{"t":"Eine weitere Schussbereitschaft nach Abgabe eines Schusses ist möglich.","c":true},{"t":"Ein erneutes Entsichern ist erforderlich.","c":false}]},{"n":"III.41","k":"III","q":"Dürfen aus Schusswaffen mit Beschusszeichen „SP“ oder „PN“ auch Nitro-Cellulose-Treibladungen verschossen werden?","a":[{"t":"Nein","c":true},{"t":"Ja","c":false},{"t":"Nur, wenn die Waffe auch das Zeichen „J“ trägt.","c":false}]},{"n":"III.42","k":"III","q":"Halbautomatische Pistolen mit Sicherung dürfen auf dem Schützenstand abgelegt werden...","a":[{"t":"gesichert und gespannt.","c":false},{"t":"entladen und mit geöffnetem Verschluss.","c":true},{"t":"mit sichtbarer Sicherung.","c":false}]},{"n":"III.43","k":"III","q":"Wie verhalten Sie sich beim Versagen einer Patrone Ihres Kleinkalibergewehres?","a":[{"t":"Die Waffe mit der Mündung mindestens 10 Sekunden in Richtung Geschossfang halten, dann die Waffe entladen.","c":true},{"t":"Waffe öffnen und Patrone weit wegwerfen.","c":false},{"t":"Waffe nach oben halten und auf das Brechen des Schusses warten.","c":false}]},{"n":"III.44","k":"III","q":"Wie wird eine Repetierbüchse beim Öffnen des Verschlusses auf dem Schützenstand gehalten?","a":[{"t":"Die Mündung der Waffe ist in Richtung Scheibe / Geschossfang zu richten.","c":true},{"t":"Die Waffe ist senkrecht nach unten zu richten.","c":false},{"t":"Beliebig, um eine möglichst bequeme Handhabung zu ermöglichen.","c":false}]},{"n":"III.45","k":"III","q":"Wie ist die Schusswaffe beim Laden zu halten?","a":[{"t":"Mit der Mündung zum Geschossfang.","c":true},{"t":"So wie es die Schießaufsicht gerade möchte.","c":false},{"t":"Fest in der Hand, damit der Rückschlag nicht die Waffe aus der Hand schlägt.","c":false}]},{"n":"III.46","k":"III","q":"Welche Sicherheitsregeln hat jeder Schütze immer zu beachten?","a":[{"t":"Keine Sicherung ist als absolut zuverlässig zu betrachten.","c":true},{"t":"Waffen sind stets entladen zu transportieren und aufzubewahren.","c":true},{"t":"Schusswaffen sind immer als geladen zu betrachten, solange man sich nicht persönlich vom Gegenteil überzeugt hat.","c":true},{"t":"Der Lauf von Schusswaffen darf nie auf einen Menschen gerichtet werden.","c":true}]},{"n":"III.47","k":"III","q":"Woran erkennen Sie, dass die von Ihnen zu erwerbende Munition zu Ihrer Schusswaffe passt?","a":[{"t":"Kennzeichnung auf Schusswaffe und Munitionsverpackung / Patronenhülse identisch.","c":true},{"t":"An den Beschussund Prüfzeichen auf Waffe und Munitionsverpackung.","c":false},{"t":"An der Gebrauchsanleitung des Waffenhändlers.","c":false}]},{"n":"III.48","k":"III","q":"Wann dürfen Schützen mit dem Schießen beginnen?","a":[{"t":"Sobald die Aufsichtsperson den Schießstand öffnet.","c":false},{"t":"Wenn die verantwortliche Aufsichtsperson das Schießen freigegeben hat.","c":true},{"t":"Sobald Munition und Scheiben vorhanden sind.","c":false}]},{"n":"III.49","k":"III","q":"Wer darf den freien Raum unmittelbar hinter dem Schützen betreten?","a":[{"t":"Zuschauer","c":false},{"t":"Aufsicht","c":true},{"t":"Schießleiter","c":true}]},{"n":"IV.04","k":"IV","q":"Was darf zur pyrotechnischen Notsignalgebung verwendet werden?","a":[{"t":"Die Signalpistole Kaliber 4 (26,5 mm)","c":true},{"t":"Signalwaffen mit Zulassung der Physikalisch-Technischen Bundesanstalt (PTB)","c":true},{"t":"die von der Bundesanstalt für Materialforschung und -prüfung (BAM) zugelassenen sonstigen Notsignale.","c":true}]},{"n":"IV.05","k":"IV","q":"Welche Arten von Zündern werden bei Not-Handfackeln gewöhnlich verwendet und wie funktionieren sie?","a":[{"t":"Reibkopf-Zündung – funktioniert wie ein Streichholz, zündet mit einer Verzögerung direkt den Leuchtsatz (nicht mehr im deutschen Handel)","c":true},{"t":"Luntenzünder – durch das Entzünden einer Lunte wird nach gewisser Zeit der eigentlichen Signalsatz gezündet.","c":false},{"t":"Reißzünder – ein Draht im Inneren wird durch einen reibempfindlichen pyrotechnischen Anzündsatz gezogen, der dann den eigentlichen Signalsatz zündet.","c":true}]},{"n":"IV.07","k":"IV","q":"Was ist sicherheitstechnisch bei der Verwendung einer Seenot-Handfackel zu beachten?","a":[{"t":"Die brennende Fackel nach Lee waagerecht so halten, dass versprühter Abbrand keine Verletzungen (Hand, Augen) verursacht oder das Boot/Schiff beschädigt.","c":true},{"t":"Die brennende Fackel nach Luv waagerecht so halten, dass versprühter Abbrand keine Verletzungen (Hand, Augen) verursacht oder das Boot/Schiff beschädigt.","c":false},{"t":"Gebrauchsanweisung beachten.","c":true}]},{"n":"IV.08","k":"IV","q":"Was ist bei der Verwendung von Seenot-Rauchsignalen zu beachten?","a":[{"t":"Rauchsignale nur am Tage und bei geringen Windstärken verwenden.","c":true},{"t":"Die Anzündung erfolgt durch eine Reißschnur, die unter einer abschraubbaren Schutzkappe liegt.","c":true},{"t":"Nach der Zündung ist das Rauchsignal zur Leeseite außenbords zu werfen.","c":true}]},{"n":"IV.09","k":"IV","q":"Welche pyrotechnischen Seenot-Signalmittel werden an Bord verwendet?","a":[{"t":"Signalraketen und Fallschirmraketen","c":true},{"t":"Rauchtöpfe und Bengalische Feuer","c":false},{"t":"Handfackeln und Rauchsignale","c":true}]},{"n":"IV.10","k":"IV","q":"Zu welchem Zweck, außer der Signalgebung, kann die „Signalwaffe“ im Kaliber 4 (26,5 mm) noch verwendet werden?","a":[{"t":"An Silvester zum Abschuss von Leuchtfeuerwerk.","c":false},{"t":"Als Abschussgerät für einen Trägerkörper zur Herstellung einer ersten Leinenverbindung.","c":true},{"t":"Die Verwendung als Startpistole ist im Rahmen von Regatten erlaubt, wenn eine Schießerlaubnis vorliegt","c":true}]},{"n":"IV.12","k":"IV","q":"Welche Farbe ist bei Signalraketen international als Notsignal zu verwenden?","a":[{"t":"Rot","c":true},{"t":"Weiß","c":false},{"t":"Grün","c":false}]},{"n":"IV.13","k":"IV","q":"Wann dürfen Notsignale verwendet werden?","a":[{"t":"In Notfällen, wenn unter anderem Leib und Leben von Personen in Gefahr sind und dringend fremde Hilfe benötigt wird.","c":true},{"t":"In Notfällen, wenn bedeutende Sachwerte in Gefahr sind und dringend fremde Hilfe benötigt wird.","c":true},{"t":"Ausschließlich wenn alle anderen Kommunikationsmittel ausgefallen sind.","c":false}]},{"n":"IV.14","k":"IV","q":"Wie lang ist die Verbrauchsdauer pyrotechnischer Notsignale bei sachgemäßer Lagerung?","a":[{"t":"Die Verbrauchsdauer ist unbegrenzt.","c":false},{"t":"Soweit auf dem einzelnen Gegenstand nichts anderes vermerkt ist, max. 3 Jahre.","c":true},{"t":"Maximal 10 Jahre","c":false}]},{"n":"IV.15","k":"IV","q":"Was verkürzt die durch den Hersteller vorgegebene Verbrauchsdauer pyrotechnischer Notsignale oder beeinträchtigt ihre sichere Verwendung?","a":[{"t":"Feuchtigkeit und Korrosion","c":true},{"t":"hohe Lagertemperaturen","c":true},{"t":"mechanische Beschädigung","c":true}]},{"n":"IV.16","k":"IV","q":"Was machen Sie mit überlagerten pyrotechnischen Notsignalen?","a":[{"t":"Können über den Hausmüll entsorgt werden.","c":false},{"t":"Über den Munitionshandel zurückgeben oder Delaborierbetrieben übergeben.","c":true},{"t":"Können auch als Feuerwerkskörper verwenden werden.","c":false}]},{"n":"IV.17","k":"IV","q":"Wie lange dürfen Sie Signalmunition verwenden?","a":[{"t":"Drei Jahre ab Kauf im Fachhandel.","c":false},{"t":"Fünf Jahre ab Herstellung im Werk.","c":false},{"t":"Das Verfallsdatum ist auf der Munition und/oder der Verpackung angebracht.","c":true}]},{"n":"IV.18","k":"IV","q":"Wie darf Signalmunition entsorgt werden?","a":[{"t":"Durch Rückgabe an den Fachhandel.","c":true},{"t":"Durch Abgabe bei einer Sondermüllund Gefahrstoffsammelstelle.","c":false},{"t":"Öffnen der Patrone, Durchfeuchten des Inhaltes mit Wasser, dann wie b).","c":false}]},{"n":"IV.19","k":"IV","q":"Wie ist pyrotechnische Munition während der Liegezeit im Hafen zu lagern?","a":[{"t":"Keine bestimmte Lagerung erforderlich.","c":false},{"t":"Möglichst originalverpackt, kühl und trocken in einem Metallbehältnis mit Schwenkriegelschloss.","c":true},{"t":"Die Munition darf keinesfalls an Bord gelagert werden.","c":false}]},{"n":"IV.20","k":"IV","q":"Wie ist an Bord eines seegehenden Schiffes im Hafen eine Signalpistole im Kaliber 4 (26,5 mm) aufzubewahren?","a":[{"t":"In einem mit dem Schiffskörper sicher verankertem Behältnis aus Stahlblech. Die Tür muss mindestens 4mm dick und elektronisch oder mechanisch verriegelt sein (sog. Hamburger Kasten).","c":true},{"t":"Die Signalpistole kann frei zugänglich an Bord gelagert werden.","c":false},{"t":"Die Signalpistole darf keinesfalls an Bord gelagert werden.","c":false}]},{"n":"IV.21","k":"IV","q":"Wem kann zum Zweck der sicheren Aufbewahrung an Land die Signalpistole im Kaliber 4 (26,5 mm) übergeben werden?","a":[{"t":"Einer Person mit bestandener Sachkundeprüfung.","c":false},{"t":"Nur einem Berechtigten, z.B. mit Waffenbesitzkarte.","c":true},{"t":"Einer zuverlässigen Person, die mindestens 18 Jahre alt ist.","c":false}]},{"n":"IV.22","k":"IV","q":"Wie ist an Land eine Signalpistole im Kaliber 4 (26,5 mm) aufzubewahren?","a":[{"t":"In einem Behältnis der Sicherheitsstufe A (VDMA 24992).","c":false},{"t":"In einem Behältnis der Sicherheitsstufe DIN/EN 1143-1 Widerstandsgrad 0 oder I. Bei Fortführung einer Nutzung eines Behältnisses der Sicherheitsstufe B nach VDMA 24992, die vor dem 06.07.2017 begründet werden, kann dieses Behältnis weitergenutzt werden.","c":true},{"t":"In einem Stahlblechschrank mit Schwenkriegelschloss.","c":false}]},{"n":"IV.23","k":"IV","q":"Wie ist eine Signalpistole im Kaliber 4 (26,5 mm) aufzubewahren, wenn sich die Yacht im Winterlager befindet?","a":[{"t":"Eine Aufbewahrung an Bord ist nur mit einer speziellen behördlichen Erlaubnis möglich.","c":true},{"t":"Eine Aufbewahrung an Land in einem Behältnis der Sicherheitsstufe DIN/EN 1143-1 Widerstandsgrad 0 oder I. Bei Fortführung einer Nutzung eines Behältnisses der Sicherheitsstufe B nach VDMA 24992, die vor dem 06.07.2017 begründet werden, kann dieses Behältnis weitergenutzt werden.","c":true},{"t":"In einem Stahlblechschrank mit Schwenkriegelschloss.","c":false}]},{"n":"IV.24","k":"IV","q":"Wie ist an Land erlaubnispflichtige Munition aufzubewahren?","a":[{"t":"Munition darf nicht an Land aufbewahrt werden.","c":false},{"t":"Es gibt keine Auflagen für die Aufbewahrung von pyrotechnischer Munition.","c":false},{"t":"Mindestens in einem Stahlblechbehältnis (klassifizierungsfrei), das mit einem Schwenkriegelschloss oder einem gleichwertigen Verschluss gesichert ist, oder in einem gleichwertigen Behältnis.","c":true}]},{"n":"IV.26","k":"IV","q":"Wie ist die Signalmunition während der Fahrt zu lagern?","a":[{"t":"Wie bei einem längeren Aufenthalt im Hafen.","c":false},{"t":"Zugriffsbereit in der Nähe der Signalwaffe.","c":true},{"t":"Nicht zugriffsbereit, in größerer Entfernung zur Signalwaffe.","c":false}]},{"n":"IV.27","k":"IV","q":"Wozu berechtigt eine Waffenbesitzkarte (ausgestellt für das Bedürfnis als Inhaber eines seegehenden Schiffes)?","a":[{"t":"Mit entsprechendem Voreintrag zum Erwerb, sowie zum Besitz einer Signalpistole.","c":true},{"t":"Zum Führen der Waffe an Land.","c":false},{"t":"Zum Erwerb der zur Signalpistole gehörigen Munition bei entsprechendem Eintrag.","c":true}]},{"n":"IV.29","k":"IV","q":"Welche Signalwaffen darf der Inhaber eines Kleinen Waffenscheins führen?","a":[{"t":"Alle","c":false},{"t":"Nur amtlich beschossene Signalwaffen im Kaliber unter 12 mm.","c":false},{"t":"Nur Signalwaffen mit dem Zulassungszeichen „PTB im Kreis“.","c":true}]},{"n":"IV.30","k":"IV","q":"Was haben Sie nach dem Erwerb einer erlaubnispflichtigen Signalpistole zu tun?","a":[{"t":"Innerhalb von 2 Wochen nach dem Erwerb habe ich der zuständigen Behörde den Erwerb schriftlich oder in elektronischer Form anzuzeigen.","c":true},{"t":"Waffenbesitzkarte der zuständigen Behörde zur Eintragung des Erwerbs mit entsprechenden Erwerbsnachweisen (Kaufvertrag, Überlassungsvertrag etc.) vorlegen.","c":true},{"t":"Es ist keine weitere Handlung erforderlich.","c":false}]},{"n":"IV.32","k":"IV","q":"Welche Voraussetzungen müssen gegeben sein, um eine Waffenbesitzkarte für eine Signalpistole, Kaliber 4 (26,5 mm), erwerben zu können?","a":[{"t":"Der Antragsteller muss das 18. Lebensjahr vollendet haben.","c":true},{"t":"Der Antragsteller muss zuverlässig, sachkundig und persönlich geeignet sein, und ein amts- oder fachärztliches oder fachpsychologisches Zeugnis vorlegen, sofern das 25. Lebensjahr noch nicht vollendet ist.","c":true},{"t":"Es muss ein Bedürfnis vorliegen (Inhaber eines seegängigen Wasserfahrzeugs).","c":true}]},{"n":"IV.33","k":"IV","q":"Wie kann ein Wassersportler nachweisen, dass ein Bedürfnis für den Erwerb einer Signalpistole vorliegt?","a":[{"t":"Durch Vorlage von Unterlagen, aus denen der Besitz eines seegängigen Wasserfahrzeugs (Kaufvertrag, Chartervertrag, Versicherungspolice, Standerschein, Internationaler Bootsschein usw.)","c":true},{"t":"Durch Vorlage eines Sportbootführerscheins.","c":false},{"t":"Durch Vorlage von Unterlagen, aus denen die Notwendigkeit für Lehrund Prüfungszwecke hervorgeht.","c":true}]},{"n":"IV.34","k":"IV","q":"Welche amtlichen Dokumente berechtigen zum Erwerb von erlaubnispflichtiger pyrotechnischer Munition?","a":[{"t":"Die Waffenbesitzkarte mit entsprechender Munitionserwerbsberechtigung.","c":true},{"t":"Ein entsprechender Munitionserwerbsschein.","c":true},{"t":"Ein Kleiner Waffenschein.","c":false}]},{"n":"IV.35","k":"IV","q":"Welche pyrotechnischen Seenotsignale können erlaubnisfrei erworben, aufbewahrt und verwendet werden von Personen, die das 18. Lebensjahr vollendet haben?","a":[{"t":"Die der Unterklasse P1, d.h. „Handfackeln rot“ und bestimmte Rauchsignale, Abschussgeräte ohne Schusswaffeneigenschaft.","c":true},{"t":"Seenotsignalgeber mit einer Steighöhe von bis etwa 60 Metern (Signalgeber und ihre Munition, die nicht dem WaffG unterliegen)","c":true},{"t":"Die der Unterklasse T2, d.h. „Signalraketen rot“, „Fallschirmsignalraketen rot“ und bestimmte Rauchsignale.","c":false}]},{"n":"IV.38","k":"IV","q":"Darf mit einem Bootsführerschein mit eingetragenem Befreiungsvermerk nach dem Waffenund Sprengstoffgesetz Seenotsignalmunition im Kaliber 4 erworben werden?","a":[{"t":"Nein, hierfür ist eine Waffenbesitzkarte mit eingetragener Munitionserwerbsberechtigung für das Kaliber 4 erforderlich.","c":true},{"t":"Nein, hierfür ist eine Waffenbesitzkarte mit einer eingetragenen Signalwaffe im Kaliber 4 erforderlich.","c":false},{"t":"Ja, die Waffenbesitzkarte wird nur für den Waffenerwerb benötigt und dient als Legitimation für den Waffenbesitz.","c":false}]},{"n":"IV.39","k":"IV","q":"Welches ist das Zulassungszeichen für pyrotechnische Munition nach § 10 BeschG?","a":[{"t":"PTB im Kreis (Physikalisch-Technischen Bundesanstalt)","c":false},{"t":"BAM-Zeichen (Bundesanstalt für Materialforschung und –prüfung)","c":true},{"t":"Bundesadler, B (Böllerbeschuss)","c":false}]},{"n":"IV.40","k":"IV","q":"Neben dem Zulassungszeichen (BAM) folgt zusätzlich eine Klasseneinteilung. Welche Klassen gibt es?","a":[{"t":"P 1 (Bsp.: Handfackeln)","c":true},{"t":"SM 1 (Signalmunition der Klasse 1)","c":false},{"t":"P 2 (Bsp.: Signalraketen bzw. Fallschirmsignalraketen mit einer Steighöhe von bis zu 300 Metern)","c":true}]},{"n":"IV.42","k":"IV","q":"Welche Farben haben pyrotechnische Notsignale?","a":[{"t":"Leuchtsignale rot","c":true},{"t":"Rauchsignale orange","c":true},{"t":"Leuchtsignal gelb","c":false}]},{"n":"IV.44","k":"IV","q":"Was ist bei steigenden Notsignalen zu beachten?","a":[{"t":"freies Schussfeld","c":true},{"t":"Windrichtung und Abschusswinkel","c":true},{"t":"keine entflammbaren Gegenstände im Gefahrenbereich","c":true}]},{"n":"IV.46","k":"IV","q":"Woraufhin sind pyrotechnische Seenotsignale ständig zu überwachen, damit die Funktionsfähigkeit gewährleistet ist?","a":[{"t":"Verbrauchsdauer/Verfallsdatum beachten.","c":true},{"t":"Auf Korrosion oder Beschädigung prüfen.","c":true}]},{"n":"IV.48","k":"IV","q":"Welche Steighöhe und Leuchtdauer haben Fallschirmsignalpatronen?","a":[{"t":"Steighöhe mindestens 300 m, Leuchtdauer mindestens 30 Sekunden.","c":true},{"t":"Steighöhe mindestens 100 m, Leuchtdauer mindestens 10 Sekunden.","c":false},{"t":"Steighöhe mindestens 50 m, Leuchtdauer mindestens 50 Sekunden.","c":false}]},{"n":"IV.50","k":"IV","q":"Wer darf pyrotechnische Notsignale der Klasse T verwenden?","a":[{"t":"Jeder, der damit anzeigen will, dass ein Seenotfall vorliegt, d. h. unter anderem, dass Gefahr für Leib oder Leben der Besatzung und daher die Notwendigkeit zur Hilfe besteht.","c":true},{"t":"An Silvester dürfen die Signale uneingeschränkt verwendet werden.","c":false},{"t":"Jeder, der damit anzeigen will, dass ein Seenotfall vorliegt, obwohl keine Notwendigkeit zur Hilfe mehr besteht.","c":false}]},{"n":"IV.51","k":"IV","q":"Wie lang ist die Brenndauer einer Seenot-Handfackel?","a":[{"t":"5-10 Sekunden","c":false},{"t":"5 Minuten","c":false},{"t":"30 bis 60 Sekunden","c":true}]},{"n":"IV.53","k":"IV","q":"Fallschirmsignalraketen und Handfackeln sind bei klarem Wetter unterschiedlich weit zu sehen. Welche Aussage/n ist/sind richtig.","a":[{"t":"Fallschirmsignalraketen werden verwendet, um weit entfernte Helfer auf eine Notlage aufmerksam zu machen und grob in die Richtung einzuweisen.","c":true},{"t":"Handfackeln werden verwendet, um die genaue Position bei Annäherung kenntlich zu machen.","c":true},{"t":"Handfackeln sind ausschließlich Nachts zu verwenden.","c":false}]},{"n":"IV.55","k":"IV","q":"Was bedeutet die Zahl „4“ bei der Kaliberangabe der Signalpistole?","a":[{"t":"Die Waffe verschießt Patronen mit einer Hülsenlänge von 4“ (Zoll).","c":false},{"t":"Die Waffe verschießt Munition mit einem Geschossdurchmesser von 4 cm.","c":false},{"t":"Die Zahl „4“ bezeichnet die Anzahl der Bleikugeln vom Laufdurchmesser, die zusammen ein englisches Pfund (453,6 Gramm) wiegen. Das entspricht einem Laufinnendurchmesser von ca. 26,5 mm.","c":true}]},{"n":"IV.56","k":"IV","q":"Wann muss eine Signalpistole durch ein Beschussamt erneut geprüft werden?","a":[{"t":"Alle 3 Jahre","c":false},{"t":"Alle 10 Jahre","c":false},{"t":"Wenn wesentliche Waffenteile ausgetauscht oder instand gesetzt wurden","c":true}]},{"n":"IV.57","k":"IV","q":"Wie hoch steigen Seenotsignalraketen bei senkrechtem Abschuss-winkel?","a":[{"t":"Bis zu 50 Metern","c":false},{"t":"Bis zu 300 Metern","c":true},{"t":"Bis zu 200 Metern","c":false}]},{"n":"IV.58","k":"IV","q":"Dürfen Sie den Lauf der Signalpistole mittels eines Stahlrohrs zur Leistungssteigerung verlängern?","a":[{"t":"Nein","c":true},{"t":"Ja, ich muss die Signalwaffe dann aber durch ein Beschussamt neu beschießen lassen.","c":false},{"t":"Ja, sofern der Rohrinnendurchmesser um mindestens dreizehntel (3/10) Millimeter größer ist als das Munitionskaliber und zudem das Rohr eine Wandstärke von mindestens 2 Millimetern aufweist und gasdicht ist.","c":false}]},{"n":"IV.59","k":"IV","q":"Brennen pyrotechnische Geschosse weiter, wenn Sie ins Wasser fallen?","a":[{"t":"Nein","c":false},{"t":"Nur, wenn es sich um militärische Munition handelt.","c":false},{"t":"Ja","c":true}]},{"n":"IV.60","k":"IV","q":"Dürfen Sie pyrotechnische Gegenstände selbst herstellen und bearbeiten?","a":[{"t":"Personen mit bestandener Sachkundeprüfung dürfen pyrotechnische Gegenstände bearbeiten.","c":false},{"t":"Nein, nur als Inhaber einer entsprechenden Erlaubnis nach dem Sprengstoffgesetz.","c":true},{"t":"Jeder darf herstellen und bearbeiten.","c":false}]},{"n":"IV.61","k":"IV","q":"Welche pyrotechnischen Notsignale unterliegen dem Waffengesetz?","a":[{"t":"Die Signalpistole (Kaliber 4) und die hierfür bestimmte Munition (nur mit WBK).","c":true},{"t":"Seenotsignalgeber mit einer Steighöhe von bis etwa 60 Metern (frei erwerblich ab 18 Jahre)","c":false},{"t":"Handfackeln (frei erwerblich ab 18 Jahre)","c":false}]},{"n":"IV.62","k":"IV","q":"Was kann die missbräuchliche Verwendung von Notsignalmitteln für Folgen haben?","a":[{"t":"Die missbräuchliche Verwendung stellt in Deutschland nur eine Ordnungswidrigkeit dar.","c":false},{"t":"Die missbräuchliche Verwendung stellt in Deutschland ein Vergehen dar (Missbrauch von Notzeichen gemäß § 145 StGB und/oder Verstoß gemäß Waffengesetz).","c":true},{"t":"Der Missbrauch kann auch weltweit enorme Schadenersatzforderungen nach sich ziehen.","c":true}]},{"n":"IV.63","k":"IV","q":"Welche pyrotechnischen Seenotsignale unterliegen dem Sprengstoff-gesetz?","a":[{"t":"Alle pyrotechnischen Seenotsignale, die nicht aus einer Signalpistole abgefeuert werden, wie Signalraketen, Handsignalraketen mit Fallschirm, Handfackeln und Rauchsignale.","c":true},{"t":"Nur die Signale, in denen explosive Stoffe verwendet wurden.","c":false},{"t":"Signalmunition im Kaliber 4","c":false}]},{"n":"IV.64","k":"IV","q":"Welche pyrotechnische Gegenstände (Zulassungsklasse) unterliegen dem Waffengesetz?","a":[{"t":"BAM P I","c":false},{"t":"BAM PM I","c":true},{"t":"BAM PM II","c":true}]},{"n":"IV.70","k":"IV","q":"Welche pyrotechnischen Signalmittel unterliegen dem Waffengesetz?","a":[{"t":"Alle Leuchtraketen, die einen eigenen Treibsatz beinhalten.","c":false},{"t":"Alle Signalpistolen und Abschussvorrichtungen, sowie die für diese bestimmte Munition.","c":true},{"t":"Alle steigenden Signale, die einen Durchmesser von mehr als 12 mm aufweisen.","c":false}]},{"n":"IV.71","k":"IV","q":"Welche pyrotechnischen Signalmittel unterliegen dem Sprengstoffgesetz?","a":[{"t":"Handfackeln und Rauchkörper","c":true},{"t":"Handsignalraketen mit Fallschirm","c":true},{"t":"Blitz-Knall-Patronen im Kaliber 4","c":false}]},{"n":"IV.73","k":"IV","q":"Was ist zu tun, wenn die Patrone in der Signalpistole nach Abzugsbetätigung nicht gezündet hat?","a":[{"t":"Sofort eine neue Patrone laden und erneut versuchen zu schießen.","c":false},{"t":"Waffe einem anderen Besatzungsmitglied geben, damit eine Fehlbedienung ausgeschlossen werden kann. Waffe nach frühestens 5 Minuten entladen.","c":false},{"t":"Waffe in Schussrichtung belassen, über Kopf erneut spannen und nochmals abdrücken, bei erneutem Versagen die Waffe mit nach oben gerichtetem Lauf frühestens nach 1 Minute nach außenbords öffnen und den Versager herausgleiten lassen.","c":true}]},{"n":"IV.74","k":"IV","q":"Was machen Sie mit Munition, die beim versuchten Verschießen aus der Signalwaffe nicht gezündet hat (Versager)?","a":[{"t":"Wieder in die Originalverpackung zurücklegen.","c":false},{"t":"An einer freien Stelle über Deck lagern.","c":false},{"t":"Über Bord werfen.","c":true}]},{"n":"IV.77","k":"IV","q":"Wie ist eine Signalpistole an Land zu transportieren?","a":[{"t":"entladen, entspannt, gesichert","c":false},{"t":"entladen, entspannt, von der Munition getrennt","c":false},{"t":"entladen, verpackt, von der Munition getrennt","c":true}]},{"n":"IV.78","k":"IV","q":"Wem dürfen Seenotsignalmittel dauerhaft überlassen werden?","a":[{"t":"Nur berechtigten Personen im Sinne des Waffenoder Sprengstoffrechts.","c":true},{"t":"Nur Waffenhändlern.","c":false},{"t":"Jeder natürlichen Person.","c":false}]},{"n":"IV.79","k":"IV","q":"Wem dürfen Sie ohne Erlaubnis die Signalpistole im Kaliber 4 (26,5 mm) nebst Munition vorübergehend überlassen?","a":[{"t":"Volljährigen Personen meines Vertrauens zur sicheren Aufbewahrung.","c":false},{"t":"Feuerwehrleute","c":false},{"t":"Charterern von seegehenden Wasserfahrzeugen, sofern der Besitz über die Waffe nach den Weisungen des berechtigten Überlassers erfolgt.","c":true}]},{"n":"IV.81","k":"IV","q":"Darf an Silvester mit Signalmunition Kaliber 4 (26,5 mm) geschossen werden?","a":[{"t":"Ja, aber nur durch den Erlaubnisinhaber selbst innerhalb der amtlich zugelassenen „Abbrennzeit“ (meist 18.00 – 02.00 Uhr), wenn keine brennbaren Objekte in der Nähe sind.","c":false},{"t":"Ja, aber nur wie unter a) beschrieben. Zusätzlich muss der Schütze Inhaber des Kleinen Waffenscheins sein.","c":false},{"t":"Nein, dieses Schießen bedarf einer besonderen waffenrechtlichen Erlaubnis.","c":true}]},{"n":"IV.82","k":"IV","q":"Wer darf während der Fahrt auf einem Gewässer oder See die Signalwaffe am Körper tragen (führen)?","a":[{"t":"Jedes Besatzungsmitglied.","c":false},{"t":"Alle Inhaber einer Waffensachkundeprüfung.","c":false},{"t":"Der verantwortliche Führer des Wasserfahrzeugs.","c":true}]},{"n":"IV.83","k":"IV","q":"Wer darf in Seenotfällen mit einer Signalwaffe schießen?","a":[{"t":"Jeder","c":true},{"t":"Nur Inhaber einer Waffensachkundeprüfung.","c":false},{"t":"Nur der verantwortliche Führer des betroffenen Wasserfahrzeuges.","c":false}]},{"n":"IV.85","k":"IV","q":"Für den Erwerb und Besitz welcher Signalwaffe benötigen Sie eine Erlaubnis der zuständigen Behörde?","a":[{"t":"Signalpistole Kaliber 4 (26,5 mm).","c":true},{"t":"Für Signalwaffen (SRS-Waffen), die kein Bauartzulassungszeichen „PTB im Kreis“ (Physikalisch-Technische Bundesanstalt) tragen.","c":true},{"t":"Signalwaffen (SRS-Waffen), die die Bauartzulassungszeichen „PTB im Kreis“ (Physikalisch-Technische Bundesanstalt) tragen.","c":false}]},{"n":"IV.86","k":"IV","q":"Wodurch verliert ein Bootseigentümer das Bedürfnis zum Besitz einer Signalpistole im Kaliber 4 (26,5 mm)?","a":[{"t":"Wenn das Eigentum an einem seegehenden Boot/Schiff nicht mehr nachgewiesen werden kann.","c":true},{"t":"Wenn der Sportbootführerschein seine Gültigkeit verliert.","c":false},{"t":"Wenn er ins Ausland verzieht.","c":false}]},{"n":"IV.89","k":"IV","q":"Welche Behörde prüft pyrotechnische Seenotsignale und lässt sie zu?","a":[{"t":"Die Physikalisch-Technische Bundesanstalt (PTB)","c":false},{"t":"Die Bundesanstalt für Materialforschung und -prüfung (BAM).","c":true},{"t":"Der Technische Überwachungsverein (TÜV)","c":false}]}];
/* =========================================================
   QUIZ-MODUS (MC-Fragenkatalog § 7 WaffG)
   ========================================================= */

const QUIZ_KEY = 'waffg_quiz_v1';

function loadQuizState() {
  try {
    const raw = localStorage.getItem(QUIZ_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return {
    seenIds: {},         // n -> { tried: n, correct: n, lastVerdict: 'green'|'red' }
    tried: 0,
    correct: 0,
    streak: 0,
    filters: null,       // null = alle
    order: [],           // queue der noch nicht heute gesehenen Fragen
    todayDate: new Date().toDateString(),
    todayTried: 0,
    todayCorrect: 0,
  };
}
function saveQuizState() { localStorage.setItem(QUIZ_KEY, JSON.stringify(quizState)); }
let quizState = loadQuizState();

// Tages-Reset
const _today = new Date().toDateString();
if (quizState.todayDate !== _today) {
  quizState.todayDate = _today;
  quizState.todayTried = 0;
  quizState.todayCorrect = 0;
  saveQuizState();
}

// Themen-Label
function topicLabel(n, k) {
  if (k === 'I') {
    const prefix = n.split('.')[0];
    const map = {
      '1': 'I.1 · Begriffe',
      '2': 'I.2 · Rechte & Pflichten',
      '3': 'I.3 · Kennzeichnung',
      '4': 'I.4 · Aufbewahrung',
      '5': 'I.5 · Notwehr & Notstand',
    };
    return map[prefix] || `I.${prefix}`;
  }
  if (k === 'II') return 'II · Waffentechnik';
  if (k === 'III') return 'III · Handhabung';
  if (k === 'IV') return 'IV · Not-/Seenotsignal';
  return k;
}
function allTopics() {
  const set = new Set(MC_DATA.map(q => topicLabel(q.n, q.k)));
  const desired = ['I.1 · Begriffe','I.2 · Rechte & Pflichten','I.3 · Kennzeichnung',
                   'I.4 · Aufbewahrung','I.5 · Notwehr & Notstand',
                   'II · Waffentechnik','III · Handhabung','IV · Not-/Seenotsignal'];
  return desired.filter(d => set.has(d));
}

if (!quizState.filters || !Array.isArray(quizState.filters) || !quizState.filters.length) {
  quizState.filters = [...allTopics()];
  saveQuizState();
}

function activeMcQuestions() {
  const filt = new Set(quizState.filters || allTopics());
  return MC_DATA.filter(q => filt.has(topicLabel(q.n, q.k)));
}

function shuffled(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function nextQuestion() {
  const pool = activeMcQuestions();
  if (!pool.length) return null;
  // Strategie: bevorzuge Fragen, die noch nicht heute beantwortet wurden
  // ODER zuletzt falsch waren
  const todayMap = quizState.seenIds || {};
  const fresh = pool.filter(q => !todayMap[q.n] || todayMap[q.n].lastVerdict === 'red');
  const candidates = fresh.length > 0 ? fresh : pool;
  return candidates[Math.floor(Math.random() * candidates.length)];
}

let currentQuiz = null;
let selectedAnswers = new Set();
let quizLocked = false;

const quizMain = document.getElementById('quiz-main');

function refreshQuizStats() {
  const tried = quizState.tried || 0;
  const correct = quizState.correct || 0;
  document.getElementById('q-stat-correct').textContent = correct;
  document.getElementById('q-stat-total').textContent = tried;
  document.getElementById('q-d-tried').textContent = tried;
  document.getElementById('q-d-correct').textContent = correct;
  document.getElementById('q-d-rate').textContent = tried > 0 ? Math.round(100 * correct / tried) + '%' : '—';
  document.getElementById('q-d-streak').textContent = quizState.streak || 0;
}

function renderQuiz() {
  if (!quizState.filters || quizState.filters.length === 0) {
    quizMain.innerHTML = `<div class="done-state"><h2>Kein Thema ausgewählt.</h2><p>Öffne die Einstellungen und wähle mindestens ein Thema für das Quiz.</p></div>`;
    return;
  }
  currentQuiz = nextQuestion();
  if (!currentQuiz) {
    quizMain.innerHTML = `<div class="done-state"><h2>Keine Fragen verfügbar.</h2></div>`;
    return;
  }
  selectedAnswers = new Set();
  quizLocked = false;

  const correctCount = currentQuiz.a.filter(a => a.c).length;
  const topic = topicLabel(currentQuiz.n, currentQuiz.k);

  quizMain.innerHTML = `
    <div class="quiz-meta">
      <span>${topic} · Frage ${currentQuiz.n}</span>
      <span>${correctCount > 1 ? 'mehrere richtig' : 'eine richtig'}</span>
    </div>
    <div class="quiz-question">${escapeHtml(currentQuiz.q)}</div>
    <div id="quiz-options"></div>
    <div id="quiz-feedback-container"></div>
    <div class="quiz-controls">
      <button class="primary-btn" id="quiz-action">Antwort prüfen</button>
    </div>
  `;
  renderOptions();
  bindQuizActions();
}

function renderOptions() {
  const cont = document.getElementById('quiz-options');
  const letters = ['a','b','c','d','e','f','g','h'];
  cont.innerHTML = currentQuiz.a.map((ans, i) => {
    const letter = letters[i];
    const isSelected = selectedAnswers.has(i);
    let cls = 'quiz-option';
    let mark = '';
    if (quizLocked) {
      cls += ' locked';
      if (ans.c && isSelected) { cls += ' r-correct'; mark = '✓'; }
      else if (!ans.c && isSelected) { cls += ' r-incorrect'; mark = '✗'; }
      else if (ans.c && !isSelected) { cls += ' r-missed'; mark = '!'; }
    } else if (isSelected) {
      cls += ' selected'; mark = '✓';
    }
    return `
      <div class="${cls}" data-idx="${i}">
        <div class="quiz-checkbox">${mark}</div>
        <div class="quiz-letter">${letter})</div>
        <div class="quiz-text">${escapeHtml(ans.t)}</div>
      </div>
    `;
  }).join('');

  if (!quizLocked) {
    cont.querySelectorAll('.quiz-option').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.dataset.idx, 10);
        if (selectedAnswers.has(idx)) selectedAnswers.delete(idx);
        else selectedAnswers.add(idx);
        renderOptions();
      });
    });
  }
}

function bindQuizActions() {
  document.getElementById('quiz-action').addEventListener('click', () => {
    if (!quizLocked) {
      // Prüfen
      const correctIdx = currentQuiz.a.map((a,i) => a.c ? i : -1).filter(i => i >= 0);
      const correctSet = new Set(correctIdx);
      // Richtig wenn: alle richtigen ausgewählt UND keine falschen
      const allCorrectSelected = correctIdx.every(i => selectedAnswers.has(i));
      const noWrongSelected = [...selectedAnswers].every(i => correctSet.has(i));
      const isRight = allCorrectSelected && noWrongSelected && selectedAnswers.size > 0;

      quizLocked = true;
      // Statistik
      quizState.tried = (quizState.tried || 0) + 1;
      quizState.todayTried = (quizState.todayTried || 0) + 1;
      if (isRight) {
        quizState.correct = (quizState.correct || 0) + 1;
        quizState.todayCorrect = (quizState.todayCorrect || 0) + 1;
        quizState.streak = (quizState.streak || 0) + 1;
      } else {
        quizState.streak = 0;
      }
      // Pro Frage merken
      const sk = quizState.seenIds || {};
      const prev = sk[currentQuiz.n] || { tried: 0, correct: 0 };
      prev.tried++;
      if (isRight) prev.correct++;
      prev.lastVerdict = isRight ? 'green' : 'red';
      sk[currentQuiz.n] = prev;
      quizState.seenIds = sk;
      saveQuizState();
      refreshQuizStats();

      // Feedback
      const fb = document.getElementById('quiz-feedback-container');
      const correctLetters = correctIdx.map(i => ['a','b','c','d','e','f','g','h'][i]).join(', ');
      fb.innerHTML = `
        <div class="quiz-feedback ${isRight ? 'correct' : 'incorrect'}">
          <span class="verdict">${isRight ? '✓ Richtig' : '✗ Falsch'}</span>
          ${isRight
            ? `Du hast ${correctIdx.length === 1 ? 'die richtige Antwort' : 'alle richtigen Antworten'} markiert.`
            : `Richtig wäre: <strong>${correctLetters}</strong>.`}
        </div>
      `;
      renderOptions();
      document.getElementById('quiz-action').textContent = 'Nächste Frage';
    } else {
      // Nächste Frage
      renderQuiz();
    }
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* Quiz-Filter-Chips */
function buildQuizFilterChips() {
  const topics = allTopics();
  const cont = document.getElementById('quiz-filter-chips');
  const allActive = quizState.filters.length === topics.length;
  cont.innerHTML = `<button class="chip chip-all" data-action="all">${allActive ? 'Alle abwählen' : 'Alle wählen'}</button>` +
    topics.map(t => {
      const cnt = MC_DATA.filter(q => topicLabel(q.n, q.k) === t).length;
      return `<button class="chip" data-quiz-filter="${t}">${t} <span style="opacity:.5;font-size:10px">${cnt}</span></button>`;
    }).join('');
  cont.querySelector('[data-action="all"]').addEventListener('click', () => {
    quizState.filters = allActive ? [] : [...topics];
    saveQuizState();
    buildQuizFilterChips();
    refreshQuizChips();
    if (currentTab === 'quiz') renderQuiz();
  });
  cont.querySelectorAll('[data-quiz-filter]').forEach(c => {
    c.addEventListener('click', () => {
      const t = c.dataset.quizFilter;
      const idx = quizState.filters.indexOf(t);
      if (idx >= 0) quizState.filters.splice(idx, 1);
      else quizState.filters.push(t);
      saveQuizState();
      buildQuizFilterChips();
      refreshQuizChips();
      if (currentTab === 'quiz') renderQuiz();
    });
  });
}
function refreshQuizChips() {
  const active = new Set(quizState.filters);
  document.querySelectorAll('#quiz-filter-chips [data-quiz-filter]').forEach(c => {
    c.classList.toggle('active', active.has(c.dataset.quizFilter));
  });
}

/* Reset */
document.getElementById('quiz-reset-btn').addEventListener('click', () => {
  if (confirm('Quiz-Statistik wirklich zurücksetzen?')) {
    quizState = { seenIds: {}, tried: 0, correct: 0, streak: 0,
                  filters: quizState.filters, order: [],
                  todayDate: new Date().toDateString(), todayTried: 0, todayCorrect: 0 };
    saveQuizState();
    refreshQuizStats();
    if (currentTab === 'quiz') renderQuiz();
  }
});

/* TAB SWITCHING */
let currentTab = 'cards';
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  if (tab === 'cards') {
    document.getElementById('main').classList.remove('hidden');
    document.getElementById('quiz-main').classList.add('hidden');
    document.getElementById('cards-stats').classList.remove('hidden');
    document.getElementById('quiz-stats').classList.add('hidden');
  } else {
    document.getElementById('main').classList.add('hidden');
    document.getElementById('quiz-main').classList.remove('hidden');
    document.getElementById('cards-stats').classList.add('hidden');
    document.getElementById('quiz-stats').classList.remove('hidden');
    if (!currentQuiz) renderQuiz();
  }
}
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => switchTab(t.dataset.tab));
});

buildQuizFilterChips();
refreshQuizChips();
refreshQuizStats();

</script>
