<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>WaffG Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #0d0d0c; --bg-card: #161614; --bg-elev: #1f1f1c; --line: #2a2a26;
  --text: #f0ebe0; --text-dim: #8a8676; --text-faint: #56544a;
  --accent: #c9844a; --green: #7fb069; --yellow: #e8b339; --red: #c95a4f;
  --mono: 'JetBrains Mono', ui-monospace, monospace;
  --serif: 'Fraunces', Georgia, serif;
}
html, body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 16px; height: 100%; overflow: hidden; overscroll-behavior: none; }
body { display: flex; flex-direction: column; padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
.header-left { display: flex; align-items: center; gap: 10px; }
a.back-btn {
  text-decoration: none;
  border: none;
  font-size: 22px;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}
.brand { font-family: var(--serif); font-weight: 700; font-size: 18px; letter-spacing: -0.02em; }
.brand .ampersand { color: var(--accent); font-style: italic; }
.stats { display: flex; gap: 14px; font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }
.stat-num { color: var(--text); font-weight: 700; }
.stat-num.due { color: var(--accent); }
.icon-btn { background: none; border: 1px solid var(--line); color: var(--text-dim); width: 36px; height: 36px; border-radius: 6px; font-family: inherit; font-size: 18px; cursor: pointer; display: grid; place-items: center; transition: all 0.15s; }
.icon-btn:active { background: var(--bg-elev); color: var(--text); }
main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; padding: 28px 22px 22px; -webkit-overflow-scrolling: touch; }
.deck-tag { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 14px; }
.direction-tag { display: inline-block; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); border: 1px solid var(--accent); padding: 3px 8px; border-radius: 3px; margin-bottom: 22px; opacity: 0.85; }
.question { font-family: var(--serif); font-size: 38px; line-height: 1.15; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 32px; word-break: break-word; }
.question.smaller { font-size: 26px; }
.input-wrap { margin-bottom: 18px; }
.answer-input { width: 100%; background: var(--bg-card); border: 1px solid var(--line); color: var(--text); font-family: var(--mono); font-size: 17px; padding: 16px 18px; border-radius: 6px; outline: none; transition: border-color 0.15s; }
.answer-input:focus { border-color: var(--text-dim); }
.answer-input.r-green { border-color: var(--green); background: rgba(127, 176, 105, 0.08); }
.answer-input.r-yellow { border-color: var(--yellow); background: rgba(232, 179, 57, 0.08); }
.answer-input.r-red { border-color: var(--red); background: rgba(201, 90, 79, 0.08); }
.primary-btn { width: 100%; background: var(--accent); color: var(--bg); border: none; padding: 16px; font-family: var(--mono); font-size: 14px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; border-radius: 6px; cursor: pointer; transition: opacity 0.15s; }
.primary-btn:active { opacity: 0.8; }
.primary-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.reveal { margin-top: 8px; padding: 18px; background: var(--bg-card); border: 1px solid var(--line); border-radius: 6px; }
.reveal-label { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 8px; }
.reveal-term { font-family: var(--serif); font-size: 22px; font-weight: 600; margin-bottom: 8px; color: var(--text); letter-spacing: -0.01em; }
.reveal-term.green { color: var(--green); }
.reveal-desc { font-size: 14px; line-height: 1.5; color: var(--text-dim); }
.reveal-details { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--line); font-size: 13px; line-height: 1.6; color: var(--text-dim); white-space: pre-line; }
.reveal-details strong { color: var(--text); font-weight: 600; }
.rate-primary { margin-top: 14px; display: flex; flex-direction: column; gap: 4px; align-items: center; }
.rate-primary .primary-label { display: flex; align-items: baseline; gap: 10px; }
.rate-primary .primary-hint { font-size: 10px; font-weight: 400; letter-spacing: 0.04em; text-transform: none; opacity: 0.7; }
.rate-primary[data-verdict="green"] { background: var(--green); }
.rate-primary[data-verdict="yellow"] { background: var(--yellow); }
.rate-primary[data-verdict="red"] { background: var(--red); color: var(--text); }
.overrides { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 8px; }
.rate-btn-small { background: transparent; border: 1px solid var(--line); color: var(--text-dim); padding: 10px 4px; font-family: var(--mono); font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; border-radius: 6px; cursor: pointer; display: flex; flex-direction: column; gap: 2px; align-items: center; transition: all 0.15s; }
.rate-btn-small:active { transform: scale(0.96); border-color: var(--text-dim); color: var(--text); }
.rate-btn-small .interval-hint { font-size: 9px; font-weight: 400; color: var(--text-faint); letter-spacing: 0.02em; text-transform: none; }
.override-label { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-faint); margin-top: 16px; margin-bottom: 6px; text-align: center; }
.done-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px 20px; }
.done-state h2 { font-family: var(--serif); font-size: 28px; margin-bottom: 12px; font-weight: 600; letter-spacing: -0.02em; }
.done-state p { color: var(--text-dim); font-size: 14px; line-height: 1.5; }
.sheet-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 10; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.sheet-bg.open { opacity: 1; pointer-events: auto; }
.sheet { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); border-top: 1px solid var(--line); border-radius: 16px 16px 0 0; padding: 14px 22px calc(28px + env(safe-area-inset-bottom)); z-index: 11; transform: translateY(100%); transition: transform 0.25s ease-out; max-height: 88vh; overflow-y: auto; }
.sheet.open { transform: translateY(0); }
.sheet-handle { width: 38px; height: 4px; background: var(--line); border-radius: 2px; margin: 0 auto 18px; }
.sheet h2 { font-family: var(--serif); font-size: 22px; font-weight: 600; margin-bottom: 22px; letter-spacing: -0.01em; }
.section-label { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-faint); margin: 16px 0 8px; }
.chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
.chip { background: transparent; border: 1px solid var(--line); color: var(--text-dim); padding: 8px 12px; font-family: var(--mono); font-size: 12px; font-weight: 500; letter-spacing: 0.02em; border-radius: 6px; cursor: pointer; transition: all 0.15s; }
.chip.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
.chip:active { transform: scale(0.96); }
.chip.chip-all { border-color: var(--text-faint); color: var(--text-dim); font-style: italic; }
.detail-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin: 8px 0 14px; }
.detail-stat { background: var(--bg-card); border: 1px solid var(--line); padding: 10px 12px; border-radius: 6px; }
.detail-stat .label { font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 4px; }
.detail-stat .value { font-family: var(--serif); font-size: 20px; font-weight: 600; color: var(--text); }
.danger-btn { width: 100%; background: transparent; border: 1px solid var(--red); color: var(--red); padding: 12px; font-family: var(--mono); font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; border-radius: 6px; cursor: pointer; margin-top: 8px; }
.danger-btn:active { background: rgba(201, 90, 79, 0.1); }
.hidden { display: none !important; }

/* TABS */
.tabs { display: flex; gap: 4px; background: var(--bg-card); border: 1px solid var(--line); border-radius: 6px; padding: 3px; }
.tab { background: none; border: none; color: var(--text-dim); font-family: var(--mono); font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 6px 10px; border-radius: 4px; cursor: pointer; transition: all 0.15s; }
.tab.active { background: var(--accent); color: var(--bg); }
.tab:active { transform: scale(0.96); }

.header-stats { display: flex; justify-content: flex-end; padding: 8px 18px; border-bottom: 1px solid var(--line); }

/* QUIZ */
.quiz-meta { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 14px; display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
.quiz-question { font-family: var(--serif); font-size: 22px; line-height: 1.3; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 24px; }
.quiz-option { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; background: var(--bg-card); border: 1.5px solid var(--line); border-radius: 6px; margin-bottom: 8px; cursor: pointer; transition: all 0.15s; }
.quiz-option:active { transform: scale(0.99); }
.quiz-option.selected { border-color: var(--accent); background: rgba(201, 132, 74, 0.08); }
.quiz-option.locked { cursor: default; }
.quiz-option.locked:active { transform: none; }
.quiz-option.r-correct { border-color: var(--green); background: rgba(127, 176, 105, 0.12); }
.quiz-option.r-incorrect { border-color: var(--red); background: rgba(201, 90, 79, 0.12); }
.quiz-option.r-missed { border-color: var(--yellow); background: rgba(232, 179, 57, 0.10); }
.quiz-checkbox { flex-shrink: 0; width: 22px; height: 22px; border: 1.5px solid var(--text-faint); border-radius: 4px; display: grid; place-items: center; font-size: 14px; font-weight: 700; margin-top: 1px; }
.quiz-option.selected .quiz-checkbox { background: var(--accent); border-color: var(--accent); color: var(--bg); }
.quiz-option.r-correct .quiz-checkbox { background: var(--green); border-color: var(--green); color: var(--bg); }
.quiz-option.r-incorrect .quiz-checkbox { background: var(--red); border-color: var(--red); color: var(--text); }
.quiz-option.r-missed .quiz-checkbox { border-color: var(--yellow); color: var(--yellow); background: transparent; }
.quiz-letter { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--text-faint); margin-right: 4px; min-width: 14px; }
.quiz-option.selected .quiz-letter { color: var(--accent); }
.quiz-text { flex: 1; font-size: 14px; line-height: 1.4; color: var(--text); }
.quiz-feedback { margin-top: 18px; padding: 14px 16px; border-radius: 6px; font-size: 13px; line-height: 1.5; }
.quiz-feedback.correct { background: rgba(127, 176, 105, 0.12); border: 1px solid var(--green); color: var(--green); }
.quiz-feedback.incorrect { background: rgba(201, 90, 79, 0.12); border: 1px solid var(--red); color: var(--red); }
.quiz-feedback .verdict { font-family: var(--serif); font-size: 18px; font-weight: 600; margin-bottom: 6px; display: block; }
.quiz-feedback .hint { color: var(--text-dim); font-size: 12px; margin-top: 6px; }
.quiz-controls { display: flex; gap: 8px; margin-top: 18px; }
.quiz-controls .primary-btn { flex: 1; }
.skip-btn { background: transparent; border: 1px solid var(--line); color: var(--text-dim); padding: 16px; font-family: var(--mono); font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; border-radius: 6px; cursor: pointer; min-width: 100px; }
.skip-btn:active { background: var(--bg-elev); }

@media (min-width: 720px) {
  main { padding: 48px 64px 32px; max-width: 720px; width: 100%; margin: 0 auto; }
  .question { font-size: 48px; }
  .question.smaller { font-size: 32px; }
  .quiz-question { font-size: 26px; }
  .sheet { max-width: 540px; margin: 0 auto; right: auto; left: 50%; transform: translate(-50%, 100%); border-radius: 16px 16px 0 0; }
  .sheet.open { transform: translate(-50%, 0); }
}

</style>
</head>
<body>
<header>
  <div class="header-left">
    <a class="icon-btn back-btn" href="../index.html" aria-label="Zur Startseite">←</a>
    <div class="brand">WaffG <span class="ampersand">·</span> Trainer</div>
  </div>
  <div class="tabs">
    <button class="tab active" data-tab="cards">Karten</button>
    <button class="tab" data-tab="quiz">Quiz</button>
  </div>
  <button class="icon-btn" id="open-settings" aria-label="Einstellungen">⚙</button>
</header>
<div class="header-stats">
  <div class="stats" id="cards-stats">
    <div><span class="stat-num due" id="stat-due">0</span> fällig</div>
    <div><span class="stat-num" id="stat-total">0</span> gesamt</div>
  </div>
  <div class="stats hidden" id="quiz-stats">
    <div><span class="stat-num due" id="q-stat-correct">0</span> richtig</div>
    <div><span class="stat-num" id="q-stat-total">0</span> versucht</div>
  </div>
</div>
<main id="main"></main>
<main id="quiz-main" class="hidden"></main>
<div class="sheet-bg" id="sheet-bg"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <h2>Einstellungen</h2>
  <div class="section-label">Modus</div>
  <div class="chip-row" id="mode-chips">
    <button class="chip" data-mode="forward">Paragraph → Begriff</button>
    <button class="chip" data-mode="reverse">Begriff → Paragraph</button>
    <button class="chip" data-mode="both">Beide</button>
  </div>
  <div class="section-label">Filter Abschnitt</div>
  <div class="chip-row" id="filter-chips"></div>
  <div class="section-label">Statistik</div>
  <div class="detail-stats">
    <div class="detail-stat"><div class="label">Neu</div><div class="value" id="d-new">0</div></div>
    <div class="detail-stat"><div class="label">Lernend</div><div class="value" id="d-learn">0</div></div>
    <div class="detail-stat"><div class="label">Gefestigt</div><div class="value" id="d-mature">0</div></div>
    <div class="detail-stat"><div class="label">Heute gelernt</div><div class="value" id="d-today">0</div></div>
  </div>
  <div class="section-label">Reset</div>
  <button class="danger-btn" id="reset-btn">Karten-Fortschritt zurücksetzen</button>

  <div class="section-label" id="quiz-section-label" style="margin-top:24px">Quiz · Themenfilter</div>
  <div class="chip-row" id="quiz-filter-chips"></div>
  <div class="section-label" style="margin-top:14px">Quiz · Statistik</div>
  <div class="detail-stats">
    <div class="detail-stat"><div class="label">Versucht</div><div class="value" id="q-d-tried">0</div></div>
    <div class="detail-stat"><div class="label">Richtig</div><div class="value" id="q-d-correct">0</div></div>
    <div class="detail-stat"><div class="label">Quote</div><div class="value" id="q-d-rate">—</div></div>
    <div class="detail-stat"><div class="label">Streak</div><div class="value" id="q-d-streak">0</div></div>
  </div>
  <button class="danger-btn" id="quiz-reset-btn">Quiz-Statistik zurücksetzen</button>
</div>

<script>
/* =========================================================
   WaffG — Karten, nach Abschnitten gegliedert
   Format: [front, "term — Untertitel", details]
   Section ergibt sich automatisch (siehe sectionOf()).
   ========================================================= */
const RAW = [

/* ===== 1 · Allgemeines (§§ 1–3) ===== */

["§ 1 WaffG","Gegenstand und Zweck — was Waffe ist und welche Umgangsarten erfasst sind","Zweck (Abs. 1): Regelung des Umgangs unter Berücksichtigung öffentlicher Sicherheit und Ordnung.\n\nWaffen sind (Abs. 2):\n1. Schusswaffen oder ihnen gleichgestellte Gegenstände\n2. Tragbare Gegenstände, die\n   a) ihrem Wesen nach Angriffs-/Abwehrfähigkeit beseitigen/herabsetzen (Hieb- und Stoßwaffen)\n   b) ohne diese Bestimmung dazu geeignet sind UND im Gesetz genannt sind\n\nUmgang (Abs. 3): erwerben, besitzen, überlassen, führen, verbringen, mitnehmen, schießen, herstellen, bearbeiten, instand setzen, Handel — bei Schusswaffe auch unbrauchbar machen.\n\nDetaildefinitionen in Anlage 1."],

["§ 2 WaffG","Drei Grundsätze — 18 Jahre, Erlaubnis, Verbot","Drei zentrale Grundsätze:\n• ALTER (Abs. 1): Umgang nur ab vollendetem 18. Lebensjahr\n• ERLAUBNISPFLICHT (Abs. 2): Waffen/Munition aus Anlage 2 Abschnitt 2 — Erlaubnis nötig\n• VERBOT (Abs. 3): Waffen/Munition aus Anlage 2 Abschnitt 1 — Umgang verboten\n\nAnlage 2 Abschnitt 3: Waffen, auf die das Gesetz ganz oder teilweise NICHT anzuwenden ist.\n\nZweifelsfall (Abs. 5): zuständige Behörde entscheidet auf Antrag — Bekanntmachung im Bundesanzeiger.\n\n§ 2 ist der Eingangsknoten: alles Folgende konkretisiert entweder die Erlaubnisseite (§§ 4–28a) oder die Verbotsseite (§§ 40–42c)."],

["§ 3 WaffG","Kinder und Jugendliche — Ausnahmen vom 18-Jahre-Grundsatz","Drei Ausnahmen:\n• Abs. 1: Jugendliche dürfen im Ausbildungs-/Arbeitsverhältnis unter Aufsicht eines weisungsbefugten Waffenberechtigten umgehen\n• Abs. 2: Jugendliche dürfen geprüfte Reizstoffsprühgeräte verwenden\n• Abs. 3: Behörde kann Ausnahmen für Kinder/Jugendliche zulassen — besondere Gründe + keine entgegenstehenden öffentlichen Interessen\n\nWeiterführend: § 27 (Minderjährige auf Schießstätten)."],

/* ===== 2 · Voraussetzungen (§§ 4–9) ===== */

["§ 4 WaffG","Voraussetzungen — fünf Punkte + Versicherung 1 Mio €","Fünf Voraussetzungen (Abs. 1):\n1. Vollendetes 18. Lebensjahr\n2. Zuverlässigkeit (§ 5) UND persönliche Eignung (§ 6)\n3. Sachkunde (§ 7)\n4. Bedürfnis (§ 8)\n5. Bei Waffenschein/Schießerlaubnis: Haftpflichtversicherung 1 Mio € pauschal (Personen + Sach)\n\nVersagung möglich, wenn gewöhnlicher Aufenthalt nicht seit mind. 5 J. im Inland (Abs. 2).\n\nÜberprüfung:\n• Zuverlässigkeit + Eignung: mindestens alle 3 Jahre (Abs. 3)\n• Bedürfnis: alle 5 Jahre (Abs. 4)\n\nPersönliches Erscheinen kann verlangt werden (Abs. 5). Behördenrecherche in öffentlichen Quellen (Abs. 6).\n\nBewachung: § 28 III prüft nur Nr. 1 bis 3 von § 4 I."],

["§ 5 WaffG","Zuverlässigkeit — absolut (Abs. 1) und Regel-Unzuverlässigkeit (Abs. 2)","ABSOLUTE Unzuverlässigkeit (Abs. 1):\n1. Verurteilung\n   a) wegen Verbrechens\n   b) wegen sonstiger vorsätzlicher Straftat zu Freiheitsstrafe ≥ 1 Jahr\n   c) ≥ 90 Tagessätze wegen Staatsschutzdelikten (§§ 80a, 83 II, 84-89c, 91, 95-100a, 129, 129a-b StGB)\n   Frist: 10 Jahre nach Rechtskraft\n2. Tatsachen-Annahme: missbräuchliche/leichtfertige Verwendung, unvorsichtiger Umgang, unsorgfältige Verwahrung, Überlassen an Nichtberechtigte\n\nREGEL-Unzuverlässigkeit (Abs. 2):\n1. Verurteilung ≥ 60 Tagessätze (oder 2× geringere Geldstrafe), Frist 5 Jahre wegen\n   a) vorsätzlicher Straftat\n   b) fahrlässiger Straftat im Waffen-/Munitions-/Sprengstoffzusammenhang oder fahrlässige gemeingefährliche Tat\n   c) Straftat nach WaffG/KWKG/SprengG/BJagdG\n2. Mitgliedschaft in verbotenem Verein / verfassungswidriger Partei — 10 Jahre\n3. Verfassungsfeindliche Bestrebungen in letzten 5 Jahren\n4. Mehr als einmal in 5 J. wegen Gewalttätigkeit im Präventivgewahrsam\n5. Wiederholte/gröbliche Verstöße gegen WaffG-Gesetze\n\nPflichtabfragen (Abs. 5): BZR, Staatsanwaltschaft, Polizei + BKA + Zoll, Verfassungsschutz."],

["§ 6 WaffG","Persönliche Eignung — Geschäftsfähigkeit, Sucht, Gutachten unter 25","Fehlt bei Tatsachen-Annahme:\n1. Geschäftsunfähigkeit\n2. Abhängigkeit von Alkohol/Drogen, psychische Krankheit, Debilität\n3. In der Person liegende Umstände → unvorsichtiger Umgang oder Fremd-/Selbstgefährdung\n\nRegel-Nichteignung bei beschränkter Geschäftsfähigkeit.\n\nStellungnahmen-Pflichten: Landespolizei/LKA, Polizeidienststellen letzter 10 J. Wohnsitze, Bundespolizei, Zollkriminalamt.\n\nGutachten (Abs. 2): bei Zweifeln, amts-/fachärztlich oder fachpsychologisch, auf Kosten der Person.\n\nGUTACHTEN UNTER 25 (Abs. 3): bei ERSTMALIGER Erlaubnis zum Erwerb/Besitz von Schusswaffen verpflichtend — Ausnahme: § 14 I 2-Sportschützen.\n\nJäger: § 13 II setzt § 6 III 1 außer Kraft."],

["§ 6a WaffG","Nachbericht — laufende Mitteilungspflicht der Sicherheitsbehörden","Verfassungsschutz/Polizei/sonstige Sicherheitsbehörden müssen nach Erteilung erhaltene Erkenntnisse unverzüglich der Waffenbehörde mitteilen.\n\nDatenspeicherung der Personendaten in gemeinsamen Dateien nach BVerfSchG.\n\nLöschung:\n• Bei Ablehnung/Rücknahme/Widerruf: sofort\n• Sonst: 3 Monate nach Ende der regelmäßigen Gültigkeitsdauer der Zuverlässigkeitsüberprüfung\n\nFunktion: Sicherheitsbehörden begleiten den Erlaubnisinhaber dauerhaft — die Erlaubnis ist nicht endgültig."],

["§ 6b WaffG","Mitteilungspflicht der Waffenbehörden an Jagdbehörden","Bei Wegfall der Zuverlässigkeit (§ 5) oder Eignung (§ 6) eines Jägers informiert die Waffenbehörde die zuständige Jagdbehörde unverzüglich.\n\nFunktion: Kopplung Waffen- ↔ Jagdrecht — wer waffenrechtlich unzuverlässig wird, soll auch den Jagdschein verlieren."],

["§ 7 WaffG","Sachkunde — Prüfung oder Tätigkeit/Ausbildung","Sachkundenachweis durch:\n• Prüfung vor der dafür bestimmten Stelle, ODER\n• Tätigkeit/Ausbildung\n\nKonkretisierung durch Rechtsverordnung (Abs. 2): waffentechnische + waffenrechtliche Kenntnisse, Prüfung, Prüfungsausschüsse.\n\nQuerverbindungen: § 13 II (Jäger ohne Sachkundenachweis), § 39b II (Salutwaffen ohne Sachkunde), § 28a III (Bewachung Seeschiff — abweichende Anforderungen)."],

["§ 8 WaffG","Bedürfnis — anerkannte Personengruppen + Geeignetheit","Bedürfnis erbracht, wenn gegenüber öffentlicher Sicherheit/Ordnung GLAUBHAFT GEMACHT sind:\n\n1. Besonders anzuerkennende persönliche oder wirtschaftliche Interessen — vor allem als:\n   • Jäger (§ 13)\n   • Sportschütze (§ 14)\n   • Brauchtumsschütze (§ 16)\n   • Sammler (§ 17)\n   • Sachverständiger (§ 18)\n   • Gefährdete Person (§ 19)\n   • Hersteller/Händler (§ 21)\n   • BEWACHUNGSUNTERNEHMER (§ 28) ★\n\nUND\n\n2. Geeignetheit + Erforderlichkeit der Waffen/Munition für den beantragten Zweck\n\nFunktion: Abstrakte Norm — §§ 13-20 und 21-28a konkretisieren je Personengruppe."],

["§ 9 WaffG","Inhaltliche Beschränkungen — Befristung, Auflagen, Anordnungen","Drei Steuerungsinstrumente:\n• Inhaltliche Beschränkung zur Gefahrenabwehr (Abs. 1)\n• Befristung oder Auflagen — nachträglich änderbar (Abs. 2)\n• Anordnungen gegenüber erlaubnisfreien Akteuren (Abs. 3)\n\nVerstoß gegen vollziehbare Auflagen/Anordnungen: § 53 I Nr. 4 — Bußgeld."],

/* ===== 3 · Erlaubnisarten (§§ 10–12) ===== */

["§ 10 WaffG","Erlaubnisarten — WBK, Munitionserwerbsschein, Waffenschein, Erlaubnisschein","Vier Erlaubnisformen:\n\n1. WAFFENBESITZKARTE (WBK) — Erwerb + Besitz\n   • Erwerb: 1 Jahr; Besitz: in der Regel unbefristet\n   • Art, Anzahl, Kaliber anzugeben\n   • Auch für Mehrere oder Vereine als juristische Person (mit benannter verantwortlicher Person)\n\n2. MUNITIONSERWERBSSCHEIN (Abs. 3) — wenn keine WBK\n   • Erwerb: 6 Jahre; Besitz: unbefristet; Nachlauf: 6 Monate\n\n3. WAFFENSCHEIN (Abs. 4) — Führen\n   • Höchstens 3 Jahre, 2× um je 3 Jahre verlängerbar\n   • Auf Anlässe/Gebiete beschränkt, wenn Bedürfnis nicht weitergeht\n   • KLEINER WAFFENSCHEIN für Schreckschuss-/Reizstoff-/Signalwaffen\n\n4. ERLAUBNISSCHEIN (Abs. 5) — Schießen\n\nBewachung: § 28 IV — Zusatz im Waffenschein, dass Mitarbeiter weisungsgebunden führen dürfen."],

["§ 11 WaffG","Erwerb mit EU-Bezug — EU-Ausländer, Kategorie B-Zustimmung","Person mit gewöhnlichem Aufenthalt im EU-Ausland: Erlaubnis nur bei Selbstverbringung oder Erklärung des Verbleibs im Inland.\n\nKategorie B (Anlage 1 Abschnitt 3): vorherige Zustimmung des anderen Mitgliedstaates erforderlich.\n\nInländer für Erwerb in EU-Mitgliedstaat (Kat. B): Erlaubnis bei § 4 I Nr. 2 (Zuverlässigkeit/Eignung)."],

["§ 12 WaffG","Ausnahmen von der Erlaubnispflicht — vorübergehend, Schießstätte, Reise","Erwerb/Besitz OHNE Erlaubnis (Abs. 1):\n1. WBK-Inhaber von Berechtigtem:\n   a) vorübergehend, max. 1 Monat, für Bedürfniszweck\n   b) zur sicheren Verwahrung/Beförderung\n2. Gewerbsmäßige Beförderung/Lagerung/Veredelung\n3. Erwerb mit Weisungsbindung (Arbeit/Ausbildung, jagdliche/sportliche/Brauchtumsvereinigung, § 55-Stelle, Charterer Seeschiffe)\n4. Rückerwerb\n5. Auf Schießstätte (§ 27) vorübergehend zum Schießen dort\n6. Auf Reise nach § 32 berechtigt mitgenommen\n\nFühren OHNE Erlaubnis (Abs. 3):\n1. Mit Hausrecht-Zustimmung in Wohnung/Geschäft/Besitztum/Schießstätte\n2. NICHT SCHUSSBEREIT UND NICHT ZUGRIFFSBEREIT von Ort zu Ort für Bedürfniszweck\n3. Langwaffe nicht schussbereit beim Sportwettkampf\n4. Signalwaffe (Bergsteigen, Wasserfahrzeug, Not-/Rettungsübung)\n5. Schreckschuss/Signalwaffe als Start/Stopp Sport\n6. Wesentliches Teil bei vorübergehender Aufbewahrung\n\nSchießen OHNE Erlaubnis (Abs. 4): auf Schießstätte + Hausrecht (≤ 7,5 J oder § 7 BeschG-Bauart oder Kartuschen) + Sportwettkampf + Theater/Vogel + Not-/Rettungsübung + Sportveranstaltung."],

/* ===== 4 · Personengruppen (§§ 13–20) ===== */

["§ 13 WaffG","Jäger — Jagdschein begründet Bedürfnis, Privilegien für Jahresjagdschein","Bedürfnis bei Inhabern eines gültigen Jagdscheines anerkannt:\n1. Glaubhaftmachung Jagdausübung/Training\n2. Waffe/Munition nicht nach BJagdG verboten\n\nPrivilegien (Abs. 2):\n• § 6 III 1 (Gutachten unter 25) gilt nicht\n• Jahresjagdscheininhaber: keine Prüfung Bedürfnis + Sachkunde für Langwaffen + 2 Kurzwaffen\n\nAbs. 3: Jahresjagdscheininhaber bedürfen keiner Erlaubnis für Langwaffen-Erwerb. WBK-Antrag binnen 2 Wochen.\nAbs. 4: Jagdschein steht WBK gleich für vorübergehenden Erwerb (§ 12 I Nr. 1).\nAbs. 5: Munition für Langwaffen — keine Erlaubnis.\nAbs. 6: Führen + Schießen mit Jagdwaffen bei befugter Jagdausübung, Einschießen im Revier, Hundeausbildung, Jagd-/Forstschutz — ohne Erlaubnis.\nAbs. 7: Jugendjagdscheininhaber — keine Eigentumserlaubnis, nur befristete Nutzung."],

["§ 14 WaffG","Sportschützen — Mitgliedschaft + Sportordnung + Bescheinigung","Bedürfnis bei Mitgliedern anerkannter schießsportlicher Vereine (§ 15) und Sportordnung nach § 15a.\n\nBescheinigung des Schießsportverbands über regelmäßige Sportausübung.\n\nGrundkontingent geregelt. Verlängerung nur bei fortdauerndem Bedürfnis.\n\nQuerverbindung: § 6 III 1 (Gutachten unter 25) gilt nicht für § 14 I 2-Waffen."],

["§ 15 WaffG","Schießsportverbände + Vereine — Anerkennung durch BVA","Anerkennung schießsportlicher Verbände durch das Bundesverwaltungsamt:\n• Mindestmitgliederzahl\n• Räumliche Verbreitung\n• Sportordnung (§ 15a)\n• Sachgerechte Disziplinen\n\nNur durch anerkannten Verband kann Sportschützen-Bedürfnis nach § 14 begründet werden.\n\n§ 15a: Sportordnungen — Genehmigung durch BVA.\n§ 15b: Fachbeirat Schießsport berät BMI."],

["§ 16 WaffG","Brauchtumsschützen — Mitgliedschaft im Brauchtumsverein","Bedürfnis bei Mitgliedern von Brauchtumsschützenvereinen — eingeschränkte Erlaubnisse für Erwerb, Besitz und ggf. Führen.\n\nBrauchtumspflege: traditionelle Schützenfeste, historische Aufzüge, Schützenbruderschaften.\n\nKonkretisierungen: Schießen bei genehmigten Brauchtumsveranstaltungen.\n\nQuerverbindung: § 42 IV-Ausnahmen vom Veranstaltungsverbot."],

["§ 17 WaffG","Sammler — Sammlungskonzept + kulturhistorische Bedeutung","Bedürfnis bei Sammlungskonzept mit kulturhistorischer, technisch-wissenschaftlicher oder historischer Bedeutung.\n\nEintragung in WBK.\n\nKann mit vollziehbaren Auflagen verbunden werden.\n\nVerstoß gegen Auflage: § 53 I Nr. 4 — Bußgeld."],

["§ 18 WaffG","Sachverständige — waffentechnische/-rechtliche Expertise","Bedürfnis bei waffentechnischen oder waffenrechtlichen Sachverständigen — z. B. Gerichtsgutachter, Beschussstellen, Forscher.\n\nKann mit Auflagen verbunden werden.\n\nVerstoß gegen Auflage: § 53 I Nr. 4 — Bußgeld."],

["§ 19 WaffG","Gefährdete Personen — wesentlich mehr als Allgemeinheit gefährdet","Bedürfnis bei Personen, die wesentlich mehr als die Allgemeinheit gefährdet sind.\n\nKonkrete Gefahrenlage für Leib oder Leben, die nicht durch andere Schutzmaßnahmen abgewendet werden kann.\n\nWaffenbesitz und Führen (Waffenschein) bewilligbar.\n\nQuerverbindung Bewachung: § 28 I — Bedürfnis des Bewachungsunternehmers wird anerkannt, wenn Aufträge zur Sicherung einer GEFÄHRDETEN PERSON I. S. § 19 oder eines gefährdeten Objektes wahrgenommen werden."],

["§ 20 WaffG","Erben — Privileg ohne Bedürfnisnachweis, aber Blockierauflage","Beim Erwerb durch Erbfall:\n• WBK/Eintragung binnen 1 Monat beantragen (Verstoß = § 53 I Nr. 7)\n• Bedürfnis muss NICHT nachgewiesen werden — Erbprivileg\n• Bei fehlendem eigenen Bedürfnis: WBK mit BLOCKIERAUFLAGE (Sicherungssystem oder Unbrauchbarmachung)\n\nFunktion: Erbe »erbt das Eigentum, nicht die Schießberechtigung« — praktische Nutzung wird unterbunden.\n\nVoraussetzungen § 4 I Nr. 1-3 gelten weiter (Alter, Zuverlässigkeit, Eignung). Sachkunde + Bedürfnis fallen weg."],

/* ===== 5 · Gewerbe (§§ 21–28a) ===== */

["§ 21 WaffG","Gewerbsmäßige Waffenherstellung + Waffenhandel — Erlaubnispflicht","Wer gewerbsmäßig Schusswaffen/Munition herstellt, bearbeitet, instand setzt oder Handel treibt: Erlaubnispflichtig.\n\nVoraussetzungen:\n• § 4-Voraussetzungen (Alter, Zuverlässigkeit, Eignung, Bedürfnis)\n• Fachkunde nach § 22\n• Geeignete Räume\n• Ggf. Berufshaftpflicht\n\nVerstoß: § 52 I Nr. 2 c — Freiheitsstrafe 6 Monate bis 5 Jahre."],

["§ 21a WaffG","Stellvertretungserlaubnis","Für Erlaubnisinhaber nach § 21, die einen Stellvertreter einsetzen.\n\nVoraussetzungen: Stellvertreter muss § 4-Voraussetzungen + Fachkunde § 22 erfüllen.\n\nFunktion: Vertretung bei Abwesenheit/Geschäftsführung — ohne dass der Vertreter eine eigene § 21-Vollerlaubnis braucht."],

["§ 22 WaffG","Fachkunde — Prüfung/Tätigkeit/Ausbildung für Hersteller/Händler","Für Waffenhersteller/-händler — höhere Anforderungen als § 7-Sachkunde, weil komplexe Produktverantwortung.\n\nNachweis durch Prüfung, Tätigkeit oder Ausbildung; konkretisiert durch Rechtsverordnung.\n\nBewachung Seeschiff: § 28a III — abweichende Sachkundeanforderungen."],

["§ 24 WaffG","Kennzeichnungspflicht — Herstellerzeichen, Seriennummer, Jahr, Kaliber","Hersteller müssen Schusswaffen kennzeichnen:\n• Herstellerzeichen\n• Fortlaufende Seriennummer\n• Herstellungsjahr\n• Kaliber\n\nWesentliche Teile (Lauf, Verschluss, Gehäuse) ebenfalls.\n\nMunition: besondere Kennzeichnung nach RVO.\n\nVerstoß: § 53 I Nr. 9 — Bußgeld."],

["§ 25 WaffG","Verordnungsermächtigung Kennzeichnung","BMI wird ermächtigt, durch Rechtsverordnung Vorschriften über Kennzeichnung zu erlassen — Art, Stelle, Zeichen, Verfahren der Anbringung.\n\nKonkretisierung von § 24."],

["§ 25a WaffG","Anordnungen zur Kennzeichnung — Einzelfallweise Korrekturen","Behörde kann im Einzelfall Anordnungen erlassen — bei fehlender oder unzureichender Kennzeichnung.\n\nVerstoß: § 53 I Nr. 4 — Bußgeld."],

["§ 26 WaffG","Nichtgewerbsmäßige Waffenherstellung — Privatbau eingeschränkt","Wer NICHT gewerbsmäßig Schusswaffen herstellt/bearbeitet/instand setzt, braucht eine Erlaubnis — sehr eingeschränkt, nur bei besonderem Bedürfnis (Sammler, Sachverständiger).\n\n§ 4-Voraussetzungen + Sachkunde.\n\nVerstoß: § 52 III Nr. 3 — bis 3 Jahre / Geldstrafe."],

["§ 27 WaffG","Schießstätten — Erlaubnis, Aufsicht, Minderjährige","Errichtung/Betrieb gewerbsmäßiger Schießstätten: Erlaubnis nötig.\n\nAufsichtsperson erforderlich.\n\nMINDERJÄHRIGE (Abs. 3):\n• Kinder ab 12 J. nur mit Druckluft/Federdruck ≤ 7,5 J\n• Jugendliche unter 14: kein Großkaliber\n• Aufsicht + schriftliche Einwilligung des Sorgeberechtigten\n• Eine Aufsichtsperson bedient nur einen Schützen (Abs. 6)\n\nUnterlagenpflicht.\n\nVerstoß: § 53 I Nr. 11-14 — Bußgeld."],

["§ 27a WaffG","Sicherheitstechnische Prüfung — alle 4/6 Jahre + Mängelfolgen","Schießstätten müssen geprüft werden:\n• Vor erster Inbetriebnahme + bei wesentlichen Änderungen\n• Mit erlaubnispflichtigen Schusswaffen: zusätzlich alle 4 Jahre\n• Mit nur erlaubnisfreien Schusswaffen: höchstens alle 6 Jahre\n\nMängelfolge (Abs. 2): Behörde kann weitere Benutzung untersagen — Betrieb dann verboten.\n\nGrundlage: Schießstandrichtlinien des BMI im Bundesanzeiger.\n\nKosten des Sachverständigen trägt der Betreiber."],

["§ 28 WaffG","Bewachungsunternehmer — BEDÜRFNIS bei gefährdeter Person/Objekt ★","KERNNORM für die Bewachung.\n\nAbs. 1 — Bedürfnis:\nBei Bewachungsunternehmer nach § 34a GewO anerkannt, wenn glaubhaft gemacht wird:\n• Bewachungsaufträge werden/sollen wahrgenommen werden\n• die aus Gründen der Sicherung\n  - einer GEFÄHRDETEN PERSON im Sinne des § 19 ODER\n  - eines GEFÄHRDETEN OBJEKTES\n• Schusswaffen erfordern\n\nGilt entsprechend für Wachdienste als Teil wirtschaftlicher Unternehmungen. Umfasst auch Munition.\n\nAbs. 2 — Tragebeschränkung:\nSchusswaffe darf NUR BEI DER TATSÄCHLICHEN DURCHFÜHRUNG EINES KONKRETEN AUFTRAGES nach Abs. 1 geführt werden. Unternehmer hat dies bei seinem Personal sicherzustellen.\n\nAbs. 3 — Wachpersonal-Verfahren:\n• Wachpersonen, die kraft Arbeitsverhältnis Schusswaffen besitzen/führen sollen, sind der Behörde zur Prüfung zu benennen\n• Vorherige Information über Datenverarbeitung\n• Überlassung erst nach Behördenzustimmung\n• Zustimmung zu versagen, wenn:\n  - § 4 I Nr. 1-3 (18 J., Zuverlässigkeit, Eignung) nicht erfüllt ODER\n  - Haftpflichtversicherung das Schusswaffen-Risiko NICHT umfasst\n\nAbs. 4 — Waffenschein-Zusatz:\nIn Waffenschein (§ 10 IV) kann aufgenommen werden, dass benannte Personen die überlassenen Waffen nach Weisung führen dürfen.\n\nVerstöße: § 52 III Nr. 5 (Führen außerhalb Auftrag), Nr. 6 (Überlassen ohne Zustimmung)."],

["§ 28a WaffG","Bewachung auf Seeschiffen — § 31 GewO mit Modifikationen","Spezialregelung für Bewachungsunternehmen mit § 31 I GewO-Aufgaben auf Seeschiffen unter deutscher Flagge.\n\nVerweis auf § 28 mit Modifikationen:\n• Bedürfnis bei Unternehmen mit § 31 I GewO-Zulassung\n• Statt Einzelzustimmung: Erlaubnis mit Auflagen (Personal nach § 4 I Nr. 1-3, Benennung, Nachweise)\n• Befristung auf Dauer der § 31-Zulassung, verlängerbar\n• Einschließt Verbringen an Bord nach § 29 I\n• Behörde kann auf Erkenntnisse der § 31-Behörde zurückgreifen\n• Abweichende Sachkundeanforderungen für Seeschiff-Einsatz\n\nErteilung durch nach § 48 I 2 bestimmte Behörde im Benehmen mit der für gewerbliche Hauptniederlassung zuständigen Behörde."],

/* ===== 6 · Verbringen (§§ 29–33) ===== */

["§ 29 WaffG","Verbringen — Transport über die Grenze mit Besitzwechsel","Verbringen von Waffen/Munition in/durch/aus dem Geltungsbereich: Erlaubnispflicht.\n\nDefinition (Anlage 1 Abschnitt 2 Nr. 5): Transport über die Grenze zum dortigen Verbleib oder mit dem Ziel des Besitzwechsels.\n\nKategorien A 1.2 bis C strikter geregelt. Für gewerbliche Akteure kann § 21-Erlaubnis das Verbringen einschließen.\n\nVerstoß: § 52 I Nr. 2 d / § 52 III Nr. 4."],

["§ 30 WaffG","Allgemeine Verbringungserlaubnis — innerhalb der EU","Allgemeine Erlaubnis für Verbringen aus dem Geltungsbereich in andere Mitgliedstaaten.\n\nFunktion: Erleichterung des innereuropäischen Waffenverkehrs für berechtigte Akteure (Händler, Hersteller).\n\nAnzeigepflicht beim Bundesverwaltungsamt nach Maßgabe der Regelung.\n\nVerstoß § 30 S. 3: § 53 I Nr. 8 — Bußgeld."],

["§ 32 WaffG","Mitnahme — vorübergehende Reise ohne Besitzwechsel + Europäischer Feuerwaffenpass","Definition (Anlage 1 Abschnitt 2 Nr. 6): vorübergehender Transport über die Grenze ohne Besitzwechsel — auf einer Reise.\n\nGrundsätzlich erlaubnispflichtig — Vereinfachungen für:\n• Jäger (bis zu 3 Langwaffen Kat. C)\n• Sportschützen (bis zu 6 Schusswaffen Kat. B oder C)\n\nFür EU-Mitnahme: EUROPÄISCHER FEUERWAFFENPASS erforderlich (Kat. A 1.2 bis C).\n\nMitführpflicht nach § 38 I."],

["§ 33 WaffG","Anmelde- und Nachweispflichten beim Grenzverkehr","Überwachungsbehörden (Zoll, Bundespolizei) können:\n• Beförderungsmittel + -behälter anhalten\n• Lade- und Verpackungsmittel prüfen\n\nBei Verstößen: Personalien erheben + Sachverhalt erfassen + Übermittlung.\n\nPostsendungen: nur bei zureichenden tatsächlichen Anhaltspunkten für Straftat.\n\nArt. 10 GG (Brief-/Postgeheimnis) wird insoweit eingeschränkt.\n\nVerstoß § 33 I 1: § 53 I Nr. 15."],

/* ===== 7 · Pflichten (§§ 34–39c) ===== */

["§ 34 WaffG","Überlassen — nur an Berechtigte, offensichtlich oder nachgewiesen","Abs. 1: Waffen/Munition dürfen NUR BERECHTIGTEN überlassen werden. Berechtigung OFFENSICHTLICH ODER NACHGEWIESEN.\n\nHändler (§ 21) können elektronisch beim Nationalen Waffenregister (NWR) prüfen lassen.\n\nAbs. 2: Gewerbsmäßige Beförderung — ordnungsgemäße Beförderung + Schutz vor Abhandenkommen. Munition gewerblich nur in verschlossenen Packungen.\n\nAbs. 4: Bei Überlassen ins EU-Ausland (Kat. B/C) — unverzügliche schriftliche Anzeige beim Bundesverwaltungsamt.\n\nVerstöße:\n• § 52 I Nr. 2 a — Erwerb zum Überlassen an Nichtberechtigte\n• § 52 III Nr. 7 — Überlassen erlaubnispflichtiger Waffen an Nichtberechtigte\n• § 53 I Nr. 16 — Überlassen erlaubnisfreier Waffen an Nichtberechtigte"],

["§ 35 WaffG","Werbung, Hinweispflichten, Handelsverbote — keine Volksfeste/Märkte","Hinweispflichten in Anzeigen/Werbeschriften (Abs. 1):\n• Erlaubnispflichtig: »Abgabe nur an Inhaber einer Erwerbserlaubnis«\n• Nicht erlaubnispflichtig + sonstige: »Abgabe nur an Personen mit vollendetem 18. Lebensjahr«\n• Verboten: »Abgabe nur an Inhaber einer Ausnahmegenehmigung«\nPlus Name, Anschrift, ggf. eingetragene Marke.\n\nAbs. 2: Beim Einzelhandel — Hinweis auf Waffenschein/Schießerlaubnis. Bei Schreckschuss/Reizstoff/Signal — Hinweis auf Kleiner Waffenschein-Strafbarkeit + Protokoll.\n\nAbs. 3 — HANDELSVERBOTE:\n1. Reisegewerbe (außer § 55b GewO)\n2. Messen/Ausstellungen/Märkte (außer Bestellungen auf Messen/Ausstellungen)\n3. Volksfeste, Schützenfeste, Sammlertreffen (außer Schießstätten, Sammlermunition)\n\nVerstöße: § 52 I Nr. 3 (Reisegewerbe — Straftat), § 53 I Nr. 17/18 (Bußgeld)."],

["§ 36 WaffG","Aufbewahrung — Vorkehrungen + Nachweis + Zutritt ★","Abs. 1: ERFORDERLICHE VORKEHRUNGEN, um zu verhindern, dass\n• Gegenstände abhanden kommen\n• Dritte unbefugt zugreifen\n\nAbs. 3: Bei erlaubnispflichtigen Schusswaffen, Munition oder verbotenen Waffen:\n• Maßnahmen sind der Behörde nachzuweisen\n• ZUTRITT zu Aufbewahrungsräumen gestatten\n• Wohnräume gegen Willen nur zur Verhütung dringender Gefahren\n• Art. 13 GG (Unverletzlichkeit der Wohnung) wird insoweit eingeschränkt\n\nAbs. 4: Übergangsregelung für Sicherheitsbehältnisse vor 6.7.2017.\n\nAbs. 5: BMI legt durch RVO Standards fest — technische Sicherungssysteme, Nachrüstung, biometrische Sicherungen.\n\nAbs. 6: Einzelfall-Anordnung höherer Sicherheitsstandards möglich.\n\nVerstöße:\n• § 52 III Nr. 7a — Aufbewahrungsverstoß mit konkreter Gefahr: STRAFTAT bis 3 Jahre\n• § 53 I Nr. 4 — Verstoß gegen § 36-Anordnung: Bußgeld"],

["§ 37 WaffG","Anzeigepflichten Hersteller/Händler — elektronisch","§ 21-Erlaubnisinhaber hat der Behörde unverzüglich ELEKTRONISCH anzuzeigen:\n1. Herstellung (erst nach Fertigstellung)\n2. Überlassung\n3. Erwerb\n4. Bearbeitung durch\n   a) Umbau\n   b) Austausch eines wesentlichen Teils\n\nFunktion: lückenlose Rückverfolgbarkeit jeder Schusswaffe.\n\nVerstoß: § 53 I Nr. 8 — Bußgeld."],

["§ 37a WaffG","Anzeigepflichten WBK-Inhaber — Erwerb, Überlassung","WBK-Inhaber + Inhaber gleichgestellter Erlaubnisse + nichtgewerbsmäßige Hersteller müssen anzeigen:\n• Erwerb\n• Überlassung\n• ggf. weitere Umgangsarten\n\nElektronisch im Nationalen Waffenregister.\n\nVerstoß: § 53 I Nr. 8 — Bußgeld."],

["§ 37b WaffG","Anzeige — Vernichtung, Unbrauchbarmachung, Abhandenkommen","Unverzügliche Anzeige bei:\n• Vernichtung einer Schusswaffe\n• Unbrauchbarmachung (Deaktivierung)\n• Abhandenkommen (Verlust, Diebstahl)\n\nFunktion: lückenlose Bestandserfassung im NWR. Abhandenkommen löst zusätzliche polizeiliche Folgen aus.\n\nVerstoß: § 53 I Nr. 8 — Bußgeld."],

["§ 37c WaffG","Anzeige bei Inbesitznahme — z.B. nach Erbfall","Wer eine Schusswaffe in Besitz nimmt (außerhalb der gewöhnlichen Erwerbswege), muss anzeigen — typisch bei Erbfall, Fund.\n\nVerbindung § 20 (Erben) — Antragsfrist 1 Monat.\n\nVerstoß: § 53 I Nr. 4 (Anordnung) + Nr. 8."],

["§ 37d WaffG","Anzeige unbrauchbar gemachter Schusswaffen","Anzeigepflicht beim Umgang mit unbrauchbar gemachten Schusswaffen — trotz reduzierter Erlaubnispflicht.\n\nFunktion: Trotz Deaktivierung bleibt die Waffe registriert — Reaktivierungsversuche werden erschwert.\n\nVerbindung Anlage 1 Nr. 1.4 — Dekorationswaffen mit EU-VO 2015/2403-Bescheinigung."],

["§§ 37e–37i WaffG","Ausnahmen, Inhalt, WBK-Eintragung, Bescheinigung, Auslandsumzug","Technische Anzeige- und Mitteilungsregeln:\n\n• § 37e — Ausnahmen von der Anzeigepflicht\n• § 37f — Inhalt der Anzeigen (Pflichtangaben)\n• § 37g — Eintragungen in die WBK durch die Behörde\n• § 37h — Anzeigebescheinigung der Behörde (Unbrauchbarmachung, Magazinbesitz § 58 XVII)\n• § 37i — Mitteilungspflicht bei Umzug ins Ausland und bei Umzug im Ausland — neue Anschrift beim Bundesverwaltungsamt\n\nFunktion: lückenlose administrative Erfassung des Lebenswegs jeder erlaubnispflichtigen Waffe.\n\nVerstoß § 37i: § 53 I Nr. 6 — Bußgeld."],

["§ 38 WaffG","Ausweispflichten beim Führen — Perso + Erlaubnis + Hilfsdokumente ★","Wer eine Waffe FÜHRT, muss mit sich führen:\n1. PERSONALAUSWEIS oder Pass UND\n   a) WBK (bei Erwerb-Erfordernis), WAFFENSCHEIN (bei Führen-Erfordernis)\n   b) Beim Verbringen § 29: Erlaubnisschein\n   c) Beim Verbringen § 30: Erlaubnisschein/Ablichtung + Anzeigebestätigung BVA\n   d) Bei Mitnahme aus Drittstaat § 32 I: Erlaubnisschein + ggf. Grund-Beleg\n   e) Bei Mitnahme aus EU (Kat. A 1.2 - C): Erlaubnisschein + Europäischer Feuerwaffenpass\n   f) Bei vorübergehender Berechtigung (§ 12 I Nr. 1, 2 oder § 28 IV): Beleg (Überlasser, Besitzberechtigter, Datum)\n   g) Beim Schießen mit Schießerlaubnis § 10 V: diese\n2. In Fällen § 13 VI: Jagdschein\n\nAbs. 2: Aushändigung an Polizei oder andere zur Personenkontrolle Befugte AUF VERLANGEN.\n\nVerstoß: § 53 I Nr. 20 — Bußgeld bis 10 000 €."],

["§ 39 WaffG","Auskunfts- und Vorzeigepflicht, Nachschau — auch beim Bewachungsunternehmer","Abs. 1 — Auskunftspflicht für:\n• Waffenhersteller/-händler\n• Schießstätten\n• BEWACHUNGSUNTERNEHMER\n• Ausbildner Verteidigungsschießen\n• Sonstige Waffen-/Munitionsbesitzer\n• Personen mit § 41-Verbot\n\nVerweigerungsrecht bei Selbst-/Angehörigenbelastung (§ 383 I Nr. 1-3 ZPO).\n\nAbs. 2 — Nachschau:\n• Betriebsgrundstücke + Geschäftsräume während Betriebs-/Arbeitszeit betreten\n• Prüfungen, Besichtigungen, Probennahme, Geschäftsunterlagen einsehen\n• Bei DRINGENDER GEFAHR auch außerhalb dieser Zeiten + Wohnräume\n• Art. 13 GG insoweit eingeschränkt\n\nAbs. 3: Vorlageanordnung — erlaubnispflichtige + verbotene Waffen binnen angemessener Frist vorlegen.\n\nVerstöße: § 53 I Nr. 4 (Anordnung), Nr. 21 (Auskunft)."],

["§ 39a WaffG","Verordnungsermächtigung Ersatzdokumentation","BMI ermächtigt zu Vorschriften über Inhalt, Führung, Aufbewahrung, Vorlage der Ersatzdokumentation — Durchführung des § 37e II 3 und IIa 3.\n\nTechnische Konkretisierung der Nachweisführung bei Anzeige-Ausnahmen.\n\nVerstoß: § 53 I Nr. 23 — Bußgeld bei Verweis."],

["§ 39b WaffG","Salutwaffen — Sondererlaubnis für Theater/Film/Brauchtum, OHNE Sachkunde","Abs. 1: Bedürfnis bei Salutwaffen (Anlage 1 Nr. 1.5) anerkannt bei:\n1. Theateraufführungen\n2. Foto-/Film-/TV-Aufnahmen\n3. Kulturelle/Brauchtums-Veranstaltungen\n\nAbs. 2: Kein Sachkundenachweis nach § 7 erforderlich.\n\nAbs. 3: § 36 III, IV und VI NICHT anwendbar. Salutwaffen werden bei Aufbewahrung wie erlaubnisfreie Waffen behandelt.\n\nFunktion: Erleichterte Erlaubnis für künstlerische/kulturelle Nutzung — Salutwaffen können nicht scharf schießen."],

["§ 39c WaffG","Unbrauchbarmachung — Verordnungsermächtigung","BMI wird ermächtigt, durch Rechtsverordnung Regelungen zur Unbrauchbarmachung zu erlassen:\n• Dokumentationen und Mitteilungen\n• Vor Inkrafttreten unbrauchbar gemachte Schusswaffen\n• Bestimmte Umgangsarten verbieten oder unter Genehmigung stellen\n• Anzeigen oder Begleitdokumente vorschreiben\n\nKonkretisierung der EU-VO 2015/2403.\n\nVerstoß: § 53 I Nr. 23."],

/* ===== 8 · Verbote (§§ 40–42c) ===== */

["§ 40 WaffG","Verbotene Waffen — Anlage 2 Abschnitt 1, Ausnahmen durch BKA","Abs. 1: Umgang mit Waffen/Munition aus Anlage 2 Abschnitt 1 verboten — auch Anleitung/Aufforderung zur Herstellung von Gegenständen nach 1.3.4.\n\nAbs. 2: Nicht bei gerichtlichem/behördlichem Auftrag.\n\nAbs. 3 — Spezielle Ausnahmen:\n• Jagdrechtl. Erlaubnis + Leder-/Pelzberufe: Faustmesser (1.4.2)\n• Sprengstoffrechtl. Erlaubnis + Befähigungsscheine + Lehrgänge: explosionsgefährliche Stoffe (1.3.4)\n• Jahresjagdscheininhaber: Nachtsichtvorsätze/-aufsätze (1.2.4.2)\n\nAbs. 4: BUNDESKRIMINALAMT kann Ausnahmen zulassen — bei überwiegenden Interessen (Ausfuhr, Wissenschaft, kulturhistorische Sammlung).\n\nAbs. 5: Anzeige bei Inbesitznahme (Erbe/Finder) unverzüglich. Behörde kann sicherstellen oder Unbrauchbarmachung/Überlassung anordnen.\n\nVerstöße: § 52 I Nr. 1 / 4, § 52 III Nr. 1."],

["§ 41 WaffG","Waffenverbote für den Einzelfall — auch für erlaubnisfreie Waffen","Abs. 1: Behörde kann ERLAUBNISFREIEN Besitz/Erwerb untersagen, wenn:\n1. Gefahrenverhütung/Kontrolle geboten ODER\n2. Alkohol/Drogen, psychische Krankheit, Debilität, fehlende Eignung/Zuverlässigkeit\n\nTatsachen für Unzuverlässigkeit (Satz 2):\n1. Verurteilung wegen vorsätzlicher Körperverletzung oder Gewaltstraftat ≥ 90 Tagessätze, Frist 5 J.\n2. Verurteilung nach WaffG/KWKG/SprengG/BJagdG ≥ 90 Tagessätze, Frist 5 J.\nHinweis auf Möglichkeit, durch fachärztliches Gutachten zu widerlegen.\n\nAbs. 2: Untersagung ERLAUBNISPFLICHTIGEN Besitzes zur Gefahrenverhütung/Kontrolle.\n\nAbs. 3: Behörde unterrichtet örtliche Polizeidienststelle.\n\nVerstoß: § 52 III Nr. 8 — Strafe."],

["§ 42 WaffG","Verbot des Führens bei öffentlichen Veranstaltungen — auch Messer","Abs. 1: Wer an öffentlichen Vergnügungen, Volksfesten, Sportveranstaltungen, Messen, Ausstellungen, Märkten oder ähnlichen öffentlichen Veranstaltungen teilnimmt, darf KEINE WAFFEN i. S. v. § 1 II FÜHREN. Auch bei Eintrittsgeld, Theater, Kino, Diskothek, Tanzveranstaltungen.\n\nAbs. 2 — Ausnahmen durch Behörde:\n1. Zuverlässigkeit + Eignung\n2. Nachweis, dass auf Waffen bei Veranstaltung nicht verzichtet werden kann\n3. Keine Gefahr für öffentliche Sicherheit/Ordnung\n\nAbs. 3: Berechtigter muss Ausnahmebescheid mitführen.\n\nAbs. 4 — NICHT anwendbar:\n1. Theatermitwirkende mit Kartuschen/§ 1 II Nr. 2-Waffen\n2. Schießen auf Schießstätten (§ 27)\n3. Schießerlaubnis § 10 V\n4. Gewerbliches Ausstellen auf Messen\n\nAbs. 4a — MESSER: Verbot gilt entsprechend. Ausnahmen: Anlieferverkehr, Berufsausübung, nicht zugriffsbereit, Hausrecht, Messen/Märkte gewerblich, Rettung, Film/Theater, Brauchtum/Jagd/Sport, Gastronomie, allgemein anerkannte Zwecke.\n\nAbs. 5: Landesregierungen können VERBOTSZONEN erlassen — Straftatenhäufung, Menschenansammlungen, Verkehrsmittel, Jugendeinrichtungen, angrenzende Straßen.\n\nVerstöße § 42 I: § 52 III Nr. 9 (Waffen) / § 53 I Nr. 21a (Messer)."],

["§ 42a WaffG","Verbot — Anscheinswaffen, Hieb-/Stoßwaffen, Einhandmesser, Klinge > 12 cm","Abs. 1: Verboten zu führen:\n1. ANSCHEINSWAFFEN\n2. Hieb- und Stoßwaffen nach Anlage 1 Abschnitt 1 UA 2 Nr. 1.1\n3. Messer mit einhändig feststellbarer Klinge (EINHANDMESSER) ODER feststehende Messer mit KLINGENLÄNGE ÜBER 12 cm\n\nAbs. 2 — Ausnahmen:\n1. Foto/Film/TV/Theater\n2. Transport im VERSCHLOSSENEN BEHÄLTNIS\n3. Bei Nr. 2 und 3: berechtigtes Interesse\n\nAbs. 3 — Berechtigtes Interesse: insbesondere Berufsausübung, Brauchtumspflege, Sport, allgemein anerkannter Zweck.\n\nVerstoß: § 53 I Nr. 21b — Bußgeld bis 10 000 €.\n\nQuerverbindung Anscheinswaffen: Anlage 1 Nr. 1.6."],

["§ 42b WaffG","Verbot des Führens im öffentlichen Personenfernverkehr","Abs. 1: Verboten in Verkehrsmitteln + seitlich umschlossenen Einrichtungen des öffentlichen PERSONENFERNVERKEHRS:\n1. Waffen i. S. v. § 1 II\n2. Messer\n\nAusnahmen:\n• § 42 V Satz 3 Nr. 1 a, b, d (waffenrechtliche Erlaubnis, nicht zugriffsbereit, Rettung/Zivilschutz)\n• § 42 IVa Satz 2 (Messer-Ausnahmen)\n• Personen mit Zustimmung des Verkehrsunternehmens\n\nAbs. 2: Für Bahnanlagen des Bundes — BMI kann durch RVO (ohne Bundesratszustimmung) weitere Verbote erlassen. Übertragbar auf Bundespolizeipräsidium.\n\nVerstoß: § 53 I Nr. 21c — Bußgeld.\n\nUnterschied: § 42b nur Fernverkehr, ÖPNV-Hausrechtsbereiche fallen unter § 42 V Nr. 3."],

["§ 42c WaffG","Kontrollbefugnis — Anhalten, Befragen, Augenschein, Durchsuchung","Behörde kann zur Durchsetzung der Verbote nach § 42 I, § 42 IVa, § 42b I + Verbotszonen § 42 V:\n• Personen kurzzeitig ANHALTEN\n• BEFRAGEN\n• mitgeführte Sachen in AUGENSCHEIN nehmen\n• Personen DURCHSUCHEN\n\nDie Auswahl der Person muss NICHT auf vorherigem Verdacht beruhen — anlasslose Kontrollen in den Verbotsräumen zulässig.\n\nFunktion: Operative Durchsetzungsbefugnis ohne Einzelverdacht — funktionsähnlich § 42 BPolG."],

/* ===== 9 · Sonstiges (§§ 43–49) ===== */

["§ 43 WaffG","Erhebung und Übermittlung personenbezogener Daten","Erhebung + Übermittlung personenbezogener Daten in Erlaubnis-, Überprüfungs- und Kontrollverfahren.\n\nDatenschutzrechtliche Grundlage für die laufende Verwaltung.\n\nKonkretisiert in §§ 44 (Meldebehörden), 6a (Nachbericht)."],

["§ 44 WaffG","Übermittlung an und von Meldebehörden","Mitteilungspflichten zwischen Waffenbehörde und Meldebehörden — Personendaten, Wohnsitzwechsel, Behördenwechsel.\n\nFunktion: Waffenbehörde wird bei Umzügen, Sterbefällen zeitnah informiert.\n\n§ 44a: Behördliche Aufbewahrungspflichten."],

["§ 45 WaffG","Rücknahme und Widerruf — Wegfall der Voraussetzungen","RÜCKNAHME: nachträglich erkannte Mängel bei Erteilung.\nWIDERRUF: wenn Voraussetzungen entfallen — insbesondere:\n• Wegfall Zuverlässigkeit (§ 5)\n• Wegfall Eignung (§ 6)\n• Wegfall Versicherung (§ 4 I Nr. 5)\n• Wegfall Bedürfnis (§ 8)\n\nFolge: Erlaubnis erlischt. Verbunden mit § 46.\n\nBewachung: Wenn Wachperson nach § 28 III die Voraussetzungen verliert, wird die Behördenzustimmung widerrufen."],

["§ 46 WaffG","Weitere Maßnahmen — Rückgabe, Sicherstellung, Verwertung","Folgen von Rücknahme/Widerruf:\n• Rückgabe der Erlaubnisurkunde\n• Sicherstellung der Waffen\n• Verwertung nach Ablauf einer Frist\n• Notveräußerung\n\nVerstoß § 46 I 1: § 53 I Nr. 22 — Bußgeld.\n\nOperatives Instrument zur Durchsetzung der Widerrufsentscheidung."],

["§ 47 WaffG","Verordnungen für internationale Vereinbarungen / EU-Recht","Ermächtigung zum Erlass von Rechtsverordnungen zur Erfüllung internationaler Vereinbarungen oder zur Angleichung an EU-Gemeinschaftsrecht.\n\nFunktion: Flexible Anpassung an völkerrechtliche Verpflichtungen und EU-Richtlinien — ohne Gesetzesänderung.\n\nVerstoß: § 53 I Nr. 23."],

["§ 48 WaffG","Sachliche Zuständigkeit — Länder + Bundesbehörden","Landesregierungen bestimmen die zuständigen Behörden.\n\nBundesbehörden für besondere Aufgaben:\n• Bundesamt für Wirtschaft und Ausfuhrkontrolle (BAFA)\n• Bundesverwaltungsamt (BVA)\n• Physikalisch-Technische Bundesanstalt\n• Bundeskriminalamt (z. B. § 40 IV — Ausnahmen)\n• Hauptzollämter (§ 53 Ia)\n\nFöderal: Vollzug grundsätzlich Länder, zentrale Bundesfunktionen für grenzüberschreitende/spezialisierte Aufgaben."],

["§ 49 WaffG","Örtliche Zuständigkeit","Örtliche Zuständigkeit nach Wohnsitz/gewöhnlichem Aufenthalt des Antragstellers/Erlaubnisinhabers.\n\nFür Gewerbetreibende: Sitz des Gewerbebetriebs.\n\nKonkretisierungen für Vereine, Auslandswohnsitze."],

/* ===== 10 · Strafen (§§ 51–54) ===== */

["§ 51 WaffG","Strafvorschriften I — Vollautomat / Vorderschaftrepetierflinte = Verbrechen","Freiheitsstrafe 1 bis 5 Jahre (VERBRECHEN) wer entgegen § 2 III i. V. m. Anlage 2 Abschnitt 1 Nr. 1.2.1.1 oder 1.2.1.2 (Vollautomat / Vorderschaftrepetierflinte mit Kurzgriff oder < 95 cm / Lauf < 45 cm) eine dort genannte Schusswaffe zum Verschießen von Patronenmunition erwirbt, besitzt, überlässt, führt, verbringt, mitnimmt, herstellt, bearbeitet, instand setzt oder damit Handel treibt.\n\nAbs. 2 — Besonders schwer: 1-10 Jahre. Regelbeispiel: gewerbsmäßig / Bande.\nAbs. 3 — Minder schwer: bis 3 Jahre / Geldstrafe.\nAbs. 4 — Fahrlässig: bis 2 Jahre / Geldstrafe.\n\n§ 54 I — Einziehung obligatorisch."],

["§ 52 WaffG","Strafvorschriften II — Anlage 2, Bewachung, § 42, Aufbewahrung","Abs. 1 — Freiheitsstrafe 6 Monate bis 5 Jahre:\n1. Anlage 2 Abschnitt 1 Nr. 1.1 / 1.3.4 Verstöße\n2. Ohne Erlaubnis:\n   a) Erwerb zum Überlassen an Nichtberechtigte\n   b) Halbautomatische Kurzwaffe\n   c) Gewerblich (§ 21/21a)\n   d) Verbringen (§ 29/§ 32)\n3. Reisegewerbeverstoß § 35 III\n4. Anleitung zur Herstellung 1.3.4\n\nVersuch strafbar.\n\nAbs. 3 — Bis 3 Jahre / Geldstrafe:\n1. Andere Anlage-2-Verstöße\n2. Schusswaffe ohne Erlaubnis erwerben/besitzen/führen\n3. § 26-Verstoß (Privatherstellung)\n4. Verbringen ohne § 29 I / § 32 Ia\n5. § 28 II — Schusswaffe AUSSERHALB konkreten Auftrags geführt ★\n6. § 28 III 2 — Überlassen ohne Behördenzustimmung ★\n7. § 34 I 1 — Überlassen erlaubnispflichtiger Waffen an Nichtberechtigte ★\n7a. § 36 I + RVO — Aufbewahrungsverstoß MIT Gefahr ★\n8. § 41-Verbot-Verstoß\n9. § 42 I — Führen bei öffentlicher Veranstaltung ★\n10. § 57 V 1 — Kriegswaffenbesitz\n\nFahrlässig: gemildert. Besonders schwer: 1-10 J. Minder schwer: bis 3 J./Geldstrafe."],

["§ 53 WaffG","Bußgeldvorschriften — bis 10 000 € + zentrale OWi-Tatbestände","Ordnungswidrig (vorsätzlich/fahrlässig), Auswahl:\n\nNr. 1 § 2 I — erlaubnisfreie Waffe ohne Altersgrenze\nNr. 3 — Schießen ohne Erlaubnis\nNr. 4 — Verstoß gegen vollziehbare Auflage/Anordnung\nNr. 6 § 10 II 4 / § 37i — Mitteilung\nNr. 7 § 13 III 2 / § 20 I — WBK-Antrag\nNr. 8 — Anzeigepflicht-Verstöße (§§ 21, 24, 27, 30, 34, 37, 37a-d, 40, 58)\nNr. 9 § 24 I — Kennzeichnung\nNr. 11 § 27 I 1 — Schießstätte ohne Erlaubnis\nNr. 16 § 34 I 1 — Überlassen erlaubnisfreier Waffen an Nichtberechtigte ★\nNr. 17 § 35 I 4 — Werbe-Urkunden\nNr. 18 § 35 II — Hinweispflichten\nNr. 19 § 37g I — Dokumentvorlage\nNr. 20 § 38 I/II — DOKUMENTE NICHT MITFÜHREN / NICHT AUSHÄNDIGEN ★\nNr. 21 § 39 I 1 — Auskunftspflicht\nNr. 21a § 42 IVa — Messer bei öff. Veranstaltung\nNr. 21b § 42a I — Anscheinswaffe/große Klinge\nNr. 21c § 42b I — Waffe/Messer im Fernverkehr\nNr. 22 § 46 I 1 — Rückgabe Erlaubnisurkunde\nNr. 23 — RVO-Verstöße mit Verweis\n\nAbs. 2: Geldbuße bis 10 000 €."],

["§ 54 WaffG","Einziehung — obligatorisch bei §§ 51, 52 I/II/III Nr. 1-3/V; sonst möglich","Abs. 1 — OBLIGATORISCH bei Straftat nach §§ 51, 52 I, II, III Nr. 1-3 oder V — Einziehung von Gegenständen:\n1. auf die sich die Straftat bezieht\n2. die hervorgebracht oder zur Begehung/Vorbereitung gebraucht/bestimmt waren\n\nAbs. 2 — MÖGLICH bei sonstiger Straftat nach § 52 oder OWi nach § 53.\n\nAbs. 3: § 74a StGB + § 23 OWiG anwendbar (Drittbeteiligte).\n\nAbs. 4 — Alternative: Anweisung an Behörde zur Erlaubnisentscheidung (§ 10) oder Überlassung an Berechtigten.\n\nFunktion: Waffe dauerhaft aus dem Verkehr ziehen."],

/* ===== 11 · Ausnahmen (§§ 55–57) ===== */

["§ 55 WaffG","Ausnahmen — BW, Polizei, Zoll, oberste Behörden","Abs. 1: Gesetz NICHT anzuwenden auf:\n1. Oberste Bundes- und Landesbehörden + Bundesbank\n2. BUNDESWEHR + stationierte ausländische Streitkräfte\n3. POLIZEIEN des Bundes und der Länder\n4. ZOLLVERWALTUNG\n\nUnd deren Bedienstete, soweit dienstlich tätig.\n\nFür Polizei + Zoll mit Vollzugsaufgaben: gilt auch für Besitz + Führen außerhalb des Dienstes — soweit Dienstvorschriften ermächtigen.\n\nAbs. 2: Erheblich gefährdete Hoheitsträger — Bescheinigung statt WBK/WS/Ausnahmebewilligung. Befristet auf Gefährdungsdauer. BMI/bestimmte Stelle erteilt.\n\nAbs. 3: Bedienstete anderer Staaten — bei zwischenstaatlicher Vereinbarung / Zustimmung.\n\nAbs. 4: § 40 nicht anwendbar bei Verbringung/Herstellung für § 55 I-Stellen.\n\nAbs. 5: Bundesregierung kann durch RVO weitere Bundesbehörden gleichstellen."],

["§ 56 WaffG","Sondervorschriften für Staatsgäste und andere Besucher","Sonderregelungen für Staatsgäste und sonstige offizielle Besucher — Befreiungen vom WaffG bei Aufenthalt im Inland.\n\nFunktion: Diplomatisch motivierte Ausnahmen — Sicherheitspersonal eines Staatsgastes braucht keine formelle WBK/Waffenschein."],

["§ 57 WaffG","Kriegswaffen — KWKG hat Vorrang","Kriegswaffenrecht (KrWaffG/KWKG) hat Vorrang vor dem WaffG.\n\nKriegswaffen sind in der Kriegswaffenliste (Anlage zum KrWaffG) aufgeführt.\n\nÜberschneidungen werden im Zweifel zugunsten des KWKG geklärt.\n\nVerstoß § 57 V 1: § 52 III Nr. 10."],

/* ===== 12 · Anlage 1 ===== */

["Anl. 1 Nr. 1.1","Schusswaffen — Geschosse durch einen Lauf, definierte Zwecke","Schusswaffen sind Gegenstände, die zum Angriff/zur Verteidigung, zur Signalgebung, zur Jagd, zur Distanzinjektion, zur Markierung, zum Sport oder zum Spiel BESTIMMT sind und bei denen Geschosse durch einen LAUF getrieben werden.\n\nKernkriterien:\n• Bestimmung für einen der genannten Zwecke\n• Antrieb durch einen Lauf\n\nKein Lauf = keine Schusswaffe nach 1.1, aber ggf. gleichgestellt nach 1.2."],

["Anl. 1 Nr. 1.2","Gleichgestellte Gegenstände — Industriegeräte, Armbrüste, Pfeilschießer","Tragbare Gegenstände, die den Schusswaffen GLEICHSTEHEN:\n\n1.2.1: zum Abschießen von Munition für 1.1-Zwecke bestimmt\n1.2.2: industrielle Schussgeräte (Schlachten, Bolzensetzen) nach Maschinen-RL 2006/42/EG — wenn nicht zertifiziert\n1.2.3: Gegenstände, die feste Körper mit gespeicherter Energie verschießen (Armbrüste, Pfeilabschussgeräte). Ausgenommen: Spielzeug mit Saugnapf, max. 0,16 J/cm².\n\nFunktion: Verhindert Umgehung der Erlaubnispflicht durch Umetikettierung."],

["Anl. 1 Nr. 1.3","Wesentliche Teile + Schalldämpfer — Lauf, Verschluss, Lager, Gehäuse","Wesentliche Teile stehen den Schusswaffen GLEICH.\n\n1.3.1 — Liste:\n1.3.1.1 Lauf / Gaslauf — Geschoss-Führung mind. 2× Kaliber\n1.3.1.2 Verschluss — Patronen-/Kartuschenlager nach hinten abschließend; teilbar: Verschlusskopf + Verschlussträger\n1.3.1.3 Patronen-/Kartuschenlager (wenn nicht im Lauf)\n1.3.1.4 Verbrennungskammer + Gemischerzeugung (Gas-/Flüssig)\n1.3.1.5 Antriebsvorrichtung, wenn fest verbunden\n1.3.1.6 Gehäuse — nimmt Lauf, Abzugsmechanik, Verschluss auf; bei Kurzwaffen: GRIFFSTÜCK\n1.3.1.7 Vorgearbeitete Teile + Reststücke, soweit mit allgemein gebräuchlichen Werkzeugen fertigstellbar\n\n1.3.2 FÜHRENDES wesentliches Teil:\nGehäuse → Gehäuseunterteil/Griffstück → Verschluss → Lauf (Hierarchie)\n\n1.3.3 Schalldämpfer — wesentliche Dämpfung des Mündungsknalls."],

["Anl. 1 Nr. 1.4","Unbrauchbar gemachte Schusswaffen — Dekorationswaffen mit EU-Bescheinigung","Schusswaffen sind unbrauchbar gemacht (DEKORATIONSWAFFEN), wenn:\n• zuständige Behörde eines EU-Mitgliedstaates eine Bescheinigung nach Art. 3 IV EU-DurchführungsVO 2015/2403 ausgestellt hat UND\n• die zuständige Behörde die Schusswaffen gemäß Art. 5 dieser VO gekennzeichnet hat\n\nFolge: Reduzierte Erlaubnispflicht — siehe § 39c und Anlage 2.\n\nNicht jede defekte Waffe ist unbrauchbar — nur EU-zertifizierte Deaktivierung."],

["Anl. 1 Nr. 1.5","Salutwaffen — veränderte Langwaffen für Theater/Film/Brauchtum","Salutwaffen sind:\n\n1.5.1: veränderte Langwaffen, wenn:\n• Patronenlager dauerhaft so verändert, dass keine Patronen-/pyrotechnische Munition geladen werden kann\n• Lauf hat im ersten Drittel mind. 6 kalibergroße offene Bohrungen\n• Lauf vor Bohrungen mit gehärtetem Stahlstift dauerhaft verschlossen\n• Lauf fest mit Gehäuse verbunden\n• Änderungen nicht mit allgemein gebräuchlichen Werkzeugen rückgängig\n• Verschluss trägt Kennzeichen nach Abb. 11 Anlage II BeschV\n\n1.5.2: Vor 1.4.1976 nach § 3 erste WaffenG-VO veränderte Schusswaffen.\n\nQuerverbindung: § 39b — vereinfachte Erlaubnis, ohne Sachkundenachweis."],

["Anl. 1 Nr. 1.6","Anscheinswaffen — sehen aus wie Feuerwaffen, aber ohne heiße Gase","Anscheinswaffen sind:\n1.6.1: Schusswaffen mit Gesamterscheinungsbild einer Feuerwaffe, aber OHNE heiße Gase zum Antrieb\n1.6.2: Nachbildungen mit Aussehen einer Schusswaffe nach 1.6.1\n1.6.3: unbrauchbar gemachte Schusswaffen mit Aussehen nach 1.6.1\n\nAUSNAHMEN:\n• Erkennbar zum Spiel oder für Brauchtum: insbesondere Größe ±50 %, neonfarben oder ohne Kennzeichnung\n• Teil einer kulturhistorisch bedeutsamen Sammlung (§ 17)\n• Schusswaffen mit § 10 IV-Erlaubnis\n\nFolge: § 42a I Nr. 1 — Führen verboten (Bußgeld § 53 I Nr. 21b)."],

["Anl. 1 Nr. 2","Arten von Schusswaffen — Feuerwaffe, Vollautomat, Halbautomat, Lang/Kurz","Schlüsselbegriffe:\n\n2.1 FEUERWAFFEN: Schusswaffen mit heißen Gasen\n2.2 Automatische Schusswaffen — selbsttätig wieder schussbereit\n   • VOLLAUTOMAT: mehrere Schüsse je Abzugsbetätigung\n   • HALBAUTOMAT: ein Schuss je Abzugsbetätigung\n   • Double-Action-Revolver ist KEIN Halbautomat\n   • Auch Halbautomaten gelten als Vollautomat, wenn mit allgemein gebräuchlichen Werkzeugen umbaubar\n2.3 REPETIERWAFFEN: Mechanik VON HAND zwischen den Schüssen\n2.4 EINZELLADER: ohne Magazin, vor jedem Schuss von Hand laden\n2.5 LANGWAFFEN: Lauf + Verschluss zusammen > 30 cm UND Gesamtlänge > 60 cm; KURZWAFFEN: alle anderen\n2.6 Schreckschuss: Kartuschenlager + Kartuschenmunition\n2.7 Reizstoffwaffen: Reiz-/Wirkstoffe\n2.8 Signalwaffen: pyrotechnische Munition\n2.9 Druckluft/Federdruck/CO₂: keine heißen Gase"],

["Anl. 1 Nr. 3","Weitere Begriffe — Austausch-, Wechsel-, Einsteckläufe + Systeme","3.1 Austauschläufe: ohne Nacharbeit auswechselbar\n3.2 Wechselläufe: mit Einpassung\n3.3 Einsteckläufe: ohne eigenen Verschluss in größere Kaliber gesteckt\n3.4 Wechseltrommeln: für Revolver, ohne Nacharbeit\n3.5 Wechselsysteme: Austauschlauf + Verschluss + Gehäuseteile (ohne eigenständige Waffenfunktion)\n3.6 Einstecksysteme: Einstecklauf + Verschluss + Gehäuseteile\n3.7 Einsätze: für kleinere Munition im Patronenlager\n\nFunktion: Erfasst Manipulationsmöglichkeiten — Wechsellauf-Tricks werden ausgeschlossen."],

["Anl. 1 Nr. 4","Sonstige Vorrichtungen — Zielscheinwerfer, Laser, Nachtsicht, Magazine","4.1 Zielscheinwerfer — beleuchten das Ziel (sichtbar oder infrarot)\n4.2 Laser/Zielpunktprojektoren — markieren das Ziel mit projiziertem Zielpunkt\n4.3 Nachtsicht-/Nachtzielgeräte — elektronische Verstärkung oder Bildwandler mit Schusswaffen-Montage; einschließlich Nachtsichtvorsätze/-aufsätze für Zielfernrohre\n4.4 MAGAZINE — Munitionsbehältnisse:\n   • 4.4.1 Eingebaut: beim Befüllen mit Waffe verbunden\n   • 4.4.2 Wechselmagazin: zum Befüllen getrennt\n   • 4.4.3 Magazingehäuse: Bestandteil zur Patronenaufnahme\n\nMagazinkapazitäten sind Kriterien für Anlage 1 Abschnitt 3 (Kategorien)."],

["Anl. 1 Nr. 5–6","Reizstoffe + Nachbildungen — Augenreiz, Form ohne Funktion","Nr. 5 — REIZSTOFFE:\nStoffe, die bei bestimmungsgemäßer Anwendung auf den Menschen eine belästigende Wirkung durch Haut- und Schleimhautreizung (insb. Augenreiz) ausüben und resorptiv nicht giftig wirken.\n\nNr. 6 — NACHBILDUNGEN von Schusswaffen:\n• nicht als Schusswaffen hergestellt\n• haben die äußere Form einer Schusswaffe\n• aus denen NICHT geschossen werden kann\n• nicht mit allgemein gebräuchlichen Werkzeugen umbaubar\n\nNachbildungen sind ANSCHEINSWAFFEN (1.6.2) — Führverbot § 42a I Nr. 1."],

["Anl. 1 UA 2","Tragbare Gegenstände — Hieb-/Stoßwaffen, Reizstoffsprüher, Messer","Tragbare Gegenstände nach § 1 II Nr. 2:\n\nBUCHSTABE A (Wesensbestimmung):\n• 1.1 HIEB- und STOSSWAFFEN — Muskelkraft, Hieb/Stoß/Stich/Schlag/Wurf\n• 1.2 Andere Verletzungsmittel:\n  - 1.2.1 Elektroimpulsgeräte (nicht-mechanische Energie)\n  - 1.2.2 Reizstoffsprühgeräte (Reichweite bis 2 m)\n  - 1.2.3 Geräte ab 2 m (Reizstoff oder elektromagnetische Strahlung)\n  - 1.2.4 Flammenwerfer (Flamme > 20 cm)\n  - 1.2.5 Schlagbrand-/Explosionsgeräte\n  - 1.2.6 Drosselgeräte\n• 1.3 PRÄZISIONSSCHLEUDERN mit Armstütze\n\nBUCHSTABE B (Eignungsbestimmt — im Gesetz genannt):\n• 2.1 MESSER:\n  - 2.1.1 Springmesser (Knopfdruck)\n  - 2.1.2 Fallmesser (Schwerkraft/Schleuderbewegung)\n  - 2.1.3 Faustmesser (querer Griff zur Faust)\n  - 2.1.4 Butterflymesser (zweigeteilte Schwenkgriffe)\n• 2.2 Tierverletzende Energiegeräte (außer Tierhaltung/Hundeausbildung)"],

["Anl. 1 UA 3","Munition + Geschosse — Patronen, Kartuschen, pyrotechnisch","Nr. 1 — MUNITION ist zum Verschießen aus Schusswaffen bestimmt:\n• 1.1 PATRONENMUNITION (Hülse mit Ladung + Geschoss; Geschosse mit Eigenantrieb)\n• 1.2 KARTUSCHENMUNITION (Hülse mit Ladung, OHNE Geschoss)\n• 1.3 Hülsenlose Munition\n• 1.4 PYROTECHNISCHE Munition — Licht/Schall/Rauch/Nebel/Heiz/Druck/Bewegung, OHNE Durchschlagskraft\n  - 1.4.1 pyrotechnische Patronenmunition\n  - 1.4.2 unpatronierte pyrotechnische Munition\n  - 1.4.3 fest mit Antriebsvorrichtung verbundene\n\nNr. 2 — LADUNGEN: Hauptenergieträger zum Antrieb oder zur Schall-/Lichterzeugung\n\nNr. 3 — GESCHOSSE:\n• 3.1 feste Körper\n• 3.2 gasförmige/flüssige/feste Stoffe in Umhüllungen"],

["Anl. 1 Absch. 2","Waffenrechtliche Begriffe — erwerben, besitzen, überlassen, führen ★","Schlüsseldefinitionen (jede Norm im WaffG knüpft daran an):\n\n1. ERWERB: Erlangung der tatsächlichen Gewalt\n2. BESITZ: Ausübung der tatsächlichen Gewalt\n3. ÜBERLASSEN: Einräumung der tatsächlichen Gewalt einem anderen\n4. FÜHREN: Ausüben der tatsächlichen Gewalt AUSSERHALB der eigenen Wohnung/Geschäftsräume/befriedeten Besitztums oder einer Schießstätte\n5. VERBRINGEN: Transport über die Grenze zum Verbleib oder Besitzwechsel\n6. MITNEHMEN: vorübergehender Transport über die Grenze ohne Besitzwechsel\n7. SCHIESSEN: Geschosse durch Lauf, Kartuschen, Reizstoffe oder pyrotechn. Munition\n\n8.1 HERSTELLEN: aus Rohteilen zum Endprodukt oder wesentliche Teile, oder Austausch des führenden wesentlichen Teils\n8.1a FERTIGGESTELLT: ab amtlichem Beschusszeichen\n8.2 BEARBEITEN:\n• 8.2.1 Umbau (verkürzt, Schussfolge, anderes Kaliber)\n• 8.2.2 Austausch wesentlicher Teile mit Nacharbeit\n• 8.2.3 Instandsetzung mit Beschusspflicht\n8.3 UNBRAUCHBAR MACHEN nach EU-VO 2015/2403\n\n9. WAFFENHANDEL: gewerbsmäßig — Ankauf, Feilhalten, Bestellungen, Überlassen, Vermittlung"],

["Anl. 1 Absch. 2 Nr. 10–14","Personen und Zustände — Kinder, Jugendliche, schussbereit, zugriffsbereit ★","Schlüsselbegriffe für Bewachungspraxis:\n\n10. KINDER: unter 14 Jahre\n11. JUGENDLICHE: 14 bis 17 Jahre (noch nicht 18)\n\n12. SCHUSSBEREIT: Waffe ist geladen — Munition/Geschosse in der Trommel, im eingefügten Magazin oder im Patronen-/Geschosslager. Auch wenn sie nicht gespannt ist.\n\n13. ZUGRIFFSBEREIT: Schusswaffe kann unmittelbar in Anschlag gebracht werden. NICHT zugriffsbereit: im VERSCHLOSSENEN BEHÄLTNIS. Messer: nicht zugriffsbereit, wenn nur mit MEHR ALS DREI HANDGRIFFEN erreichbar.\n\n14. MITGLIEDSTAATEN: EU-Mitgliedstaaten + Vertragsstaaten des Schengener Übereinkommens.\n\nBewachungsrelevant: § 12 I 3 Nr. 2 — Führen ohne Erlaubnis NICHT SCHUSSBEREIT UND NICHT ZUGRIFFSBEREIT von Ort zu Ort."],

["Anl. 1 Absch. 3","EU-Kategorien A bis C — Schusswaffen + Munition","Kategorisierung nach Richtlinie 91/477/EWG:\n\nKATEGORIE A (verboten/restriktiv):\n• 1.1 Kriegsschusswaffen\n• 1.2 Vollautomaten\n• 1.3 als anderer Gegenstand getarnt\n• 1.4 Expansivgeschoss-Munition (außer berechtigte Jäger/Sportschützen)\n• 1.5 panzerbrechende/Spreng-/Brand-/Leuchtspur-Munition\n• 1.6 zu Halbautomat umgebaute Vollautomat\n• 1.7 bestimmte halbautomatische Zentralfeuer mit großen Magazinen (Kurz > 20+1; Lang > 10+1)\n• 1.8 kürzbare halbautomatische Lang < 60 cm (Klappschaft etc.)\n• 1.9 für Kartuschen/Salut umgebaute A-Waffen\n\nKATEGORIE B:\n• 2.1 kurze Repetier\n• 2.2/2.3 kurze Einzellader (Zentralfeuer / Randfeuer < 28 cm)\n• 2.4 halbautomatische Lang > 3 Patronen\n• 2.5 halbautomatische Kurz (außer 1.7.1)\n• 2.6 halbautomatische Lang nach 1.7.2 mit ≤ 3 Patronen\n• 2.7 lange Repetier-/Halbautomaten mit glattem Lauf bis 60 cm\n• 2.8 umgebaute B-Waffen\n• 2.9 zivile Halbautomaten in Vollautomatenoptik\n\nKATEGORIE C:\n• 3.1 andere lange Repetier (≠ 2.7)\n• 3.2 lange Einzellader mit gezogenem Lauf\n• 3.3 andere halbautomatische Lang (≠ A/B)\n• 3.4 kurze Einzellader Randfeuer ab 28 cm\n• 3.5 umgebaute C-Waffen\n• 3.6 nach EU-VO 2015/2403 deaktivierte Waffen aus A/B/C\n• 3.7 lange Einzellader glatter Lauf ab 14.9.2018"],

["Anl. 2 Absch. 1","Verbotene Waffen — Vollautomat, getarnte Waffen, große Messer","Umgang VERBOTEN (außer Unbrauchbarmachung) mit:\n\n• 1.1 Waffen der Kriegswaffenliste (KWKG) nach Verlust der Kriegswaffeneigenschaft (außer halbautomatische tragbare Schusswaffen)\n\n• 1.2 Schusswaffen, die\n  - 1.2.1.1 VOLLAUTOMATEN\n  - 1.2.1.2 VORDERSCHAFTREPETIERFLINTEN mit Kurzwaffengriff / Gesamtlänge < 95 cm / Lauflänge < 45 cm\n  - 1.2.2 als anderer Gegenstand getarnt (Koppelschloss-Pistole, Schießkugelschreiber, Stockgewehr, Taschenlampenpistole)\n  - 1.2.3 über Jagd-/Sport-übliches Maß zusammenklappbar/zerlegbar\n  - 1.2.4 mit verbotenem Zubehör\n\n• 1.3 weitere Schusswaffen-Gruppen + Anleitungsverbot (1.3.4)\n\n• 1.4 bestimmte MESSER (Springmesser, Fallmesser, Faustmesser, Butterflymesser — soweit nicht ausgenommen)\n\n• 1.5 weitere Gruppen\n\nVerstoß: § 51 (1.2.1.1, 1.2.1.2) — Verbrechen; § 52 (übrige) — bis 5 J. / bis 3 J."],

["Anl. 2 Absch. 2","Erlaubnispflichtige Waffen — Schusswaffen + Munition mit Erlaubnis","Anlage 2 Abschnitt 2 enthält alle ERLAUBNISPFLICHTIGEN Schusswaffen und Munition.\n\nGestaffelt nach Umgangsart in mehreren Unterabschnitten:\n• Erwerb / Besitz\n• Führen\n• Schießen\n\nJede Umgangsart hat eigene Voraussetzungen — geregelt durch §§ 4 ff.\n\nKLEINER WAFFENSCHEIN: Erlaubnis zum Führen von Schreckschuss-/Reizstoff-/Signalwaffen nach Anlage 2 Abschnitt 2 UA 3 Nr. 2 + 2.1.\n\nVerstoß: § 52 III Nr. 2 (Schusswaffe ohne Erlaubnis erwerben/besitzen/führen) — bis 3 Jahre / Geldstrafe."],

["Anl. 2 Absch. 3","Nicht oder teilweise erfasste Waffen — Ausnahme vom WaffG","Anlage 2 Abschnitt 3: Waffen, auf die das WaffG GANZ ODER TEILWEISE NICHT anzuwenden ist.\n\nTypischerweise:\n• Bestimmte historische Waffen\n• Spielzeug- und Sportgegenstände unterhalb bestimmter Energieschwellen\n• Bestimmte alte Sammlungsstücke\n\nFunktion: Reduktion des Anwendungsbereichs in Bereichen ohne nennenswerte Sicherheitsrisiken — entlastet Behörden und Bürger."],
